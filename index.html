<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Adventure | 雲端單字學習平台</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
    }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px) rotate(-3deg); } 40%, 80% { transform: translateX(5px) rotate(3deg); } }
    .anim-shake { animation: shake 0.4s ease-in-out; }
    @keyframes popOut { 0% { transform: scale(1); } 50% { transform: scale(1.15) translateY(-5px); background-color: #4ade80; color: white; border-color: #16a34a; } 100% { transform: scale(1); background-color: #4ade80; color: white; border-color: #16a34a; } }
    .anim-pop { animation: popOut 0.5s ease-in-out forwards; }
    @keyframes slideUp { 0% { transform: translate(-50%, 20px); opacity: 0; } 100% { transform: translate(-50%, 0); opacity: 1; } }
    @keyframes quizCorrect { 0% { transform: scale(1); } 50% { transform: scale(1.05); background-color: #4ade80; color: white; } 100% { transform: scale(1); background-color: #4ade80; color: white; } }
    .quiz-correct { animation: quizCorrect 0.5s ease forwards; border-color: #16a34a !important; }
    .quiz-wrong { background-color: #fee2e2 !important; color: #ef4444 !important; border-color: #fca5a5 !important; animation: shake 0.4s ease-in-out; opacity: 0.6; pointer-events: none; }
    .wood-bg { background-color: #fef3c7; background-image: radial-gradient(#fde68a 2px, transparent 2px), radial-gradient(#fde68a 2px, transparent 2px); background-size: 32px 32px; background-position: 0 0, 16px 16px; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -80%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -150%) scale(1); } }
    .anim-float-up { animation: floatUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; pointer-events: none; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useCallback, useRef } = React;
    const { 
      Upload, Volume2, RefreshCcw, Image: ImageIcon, Lightbulb, Star, 
      Trophy, Heart, Clock, XCircle, CheckCircle, HelpCircle, Rocket, 
      Type, MousePointerClick, BookOpen, ArrowRight, ArrowLeft, Home, 
      Shuffle, Edit3, ImagePlus, Ear, CheckSquare, VolumeX, Database,
      Settings, Trash2, Save, Play, AlertTriangle
    } = window.LucideReact || {};

    // ==========================================
    // 1. Firebase 初始化設定 (已接上你的金鑰)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDC-slEwIqWT6l8U8DubOChLIWQAOX_DKE",
      authDomain: "voc-test-e8783.firebaseapp.com",
      projectId: "voc-test-e8783",
      storageBucket: "voc-test-e8783.firebasestorage.app",
      messagingSenderId: "866197218174",
      appId: "1:866197218174:web:680acc4d9e643ec8c3c92f",
      measurementId: "G-QM765CE4LG"
    };
    
    let app, auth, db, appId = "voc-test-e8783";
    
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      console.log("Firebase 初始化成功，已啟用雲端模式。");
    } catch(e) {
      console.error("Firebase 初始化失敗:", e);
    }

    const SafeImage = ({ src, word }) => {
      const [imgStatus, setImgStatus] = useState('loading');
      const [imgSrc, setImgSrc] = useState(src);

      useEffect(() => {
        setImgStatus('loading');
        setImgSrc(src);
      }, [src]);

      return (
        <div className="absolute inset-0 w-full h-full flex items-center justify-center bg-white rounded-sm overflow-hidden z-10">
          <div className="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-orange-50 to-orange-100 text-orange-400 z-0">
            {HelpCircle && <HelpCircle size={72} className="mb-3 opacity-40 drop-shadow-sm" />}
          </div>
          {imgStatus === 'loading' && (
            <div className="absolute inset-0 flex items-center justify-center bg-white/80 z-20 backdrop-blur-sm">
              <div className="w-10 h-10 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"></div>
            </div>
          )}
          {imgSrc && imgStatus !== 'error' && (
            <img
              src={imgSrc}
              alt={word}
              className={`w-full h-full object-contain relative z-10 transition-opacity duration-300 ${imgStatus === 'loading' ? 'opacity-0' : 'opacity-100'}`}
              draggable="false"
              onLoad={() => setImgStatus('success')}
              onError={() => {
                const fallbackUrl = `https://api.dicebear.com/9.x/bottts/svg?seed=${encodeURIComponent(word)}&backgroundColor=ffdfbf`;
                if (imgSrc !== fallbackUrl) setImgSrc(fallbackUrl);
                else setImgStatus('error');
              }}
            />
          )}
        </div>
      );
    };

    const App = () => {
      const [appState, setAppState] = useState('home'); 
      const [gameMode, setGameMode] = useState('spelling'); 
      
      const [user, setUser] = useState(null);
      const [cloudUnits, setCloudUnits] = useState([]);
      const [newUnitName, setNewUnitName] = useState('');
      const [currentUnitId, setCurrentUnitId] = useState(null);
      
      const [wordList, setWordList] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [editPage, setEditPage] = useState(0); 
      
      const [shuffledLetters, setShuffledLetters] = useState([]);
      const [selectedLetters, setSelectedLetters] = useState([]);
      const [wrongIndexes, setWrongIndexes] = useState([]); 
      const [quizOptions, setQuizOptions] = useState([]);
      const [wrongQuizOptions, setWrongQuizOptions] = useState([]);
      const [isFlipped, setIsFlipped] = useState(false);
      const [correctAnimation, setCorrectAnimation] = useState(false);
      
      const [floatingScore, setFloatingScore] = useState(null);
      const [tfQuestionWord, setTfQuestionWord] = useState('');
      const [tfIsCorrect, setTfIsCorrect] = useState(true);

      const [score, setScore] = useState(0);
      const [combo, setCombo] = useState(0);
      const [lives, setLives] = useState(3);
      const [timeElapsed, setTimeElapsed] = useState(0);

      const [gameHistory, setGameHistory] = useState([]);
      const [currentMistakes, setCurrentMistakes] = useState(0);

      const [isMuted, setIsMuted] = useState(false);
      const [toast, setToast] = useState(null);
      
      const fetchingRefs = useRef(new Set());
      const isPlayingRef = useRef(false);
      const questionStartTime = useRef(Date.now());

      // Firebase 雲端認證與資料訂閱
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) { console.error('Auth Error:', error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const unitsRef = collection(db, 'artifacts', appId, 'public', 'data', 'units');
        const unsubscribe = onSnapshot(unitsRef, (snapshot) => {
          const loadedUnits = [];
          snapshot.forEach((doc) => { loadedUnits.push({ id: doc.id, ...doc.data() }); });
          loadedUnits.sort((a, b) => a.createdAt - b.createdAt);
          setCloudUnits(loadedUnits);
        }, (error) => console.error("Snapshot error:", error));
        return () => unsubscribe();
      }, [user]);

      const showToast = useCallback((msg, type = 'info') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      }, []);

      const playTone = useCallback((frequency, type = 'sine', duration = 0.1) => {
        if (isMuted) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(frequency, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch(e) {}
      }, [isMuted]);

      const playPop = useCallback(() => playTone(600, 'sine', 0.05), [playTone]);
      const playDrop = useCallback(() => playTone(400, 'square', 0.05), [playTone]);
      const playSuccess = useCallback(() => { playTone(523.25, 'sine', 0.1); setTimeout(() => playTone(659.25, 'sine', 0.2), 100); }, [playTone]);
      const playErrorTone = useCallback(() => playTone(150, 'sawtooth', 0.3), [playTone]);
      const playGameOverTone = useCallback(() => { playTone(200, 'sawtooth', 0.3); setTimeout(() => playTone(150, 'sawtooth', 0.5), 300); }, [playTone]);

      const playAudio = useCallback((text) => {
        if (isMuted) return;
        try {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85; 
            window.speechSynthesis.speak(msg);
          }
        } catch(e) { console.warn("Speech Synthesis Error:", e); }
      }, [isMuted]);

      const formatTime = useCallback((seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      }, []);

      const unselectLetter = useCallback((letterObj, index) => {
        if (!letterObj || correctAnimation || gameMode !== 'spelling') return;
        playDrop();
        setSelectedLetters(prev => { const n = [...prev]; n[index] = null; return n; });
        setShuffledLetters(prev => [...prev, letterObj]);
      }, [correctAnimation, playDrop, gameMode]);

      const selectLetter = useCallback((letterObj) => {
        if (gameMode !== 'spelling') return;
        const firstEmptyIdx = selectedLetters.findIndex(l => l === null);
        if (firstEmptyIdx !== -1) {
          playPop();
          setSelectedLetters(prev => { const n = [...prev]; n[firstEmptyIdx] = letterObj; return n; });
          setShuffledLetters(prev => prev.filter(l => l.id !== letterObj.id));
        }
      }, [gameMode, selectedLetters, playPop]);

      const giveSpellingHint = useCallback(() => {
        if (appState !== 'playing' || !wordList[currentIndex] || correctAnimation || gameMode !== 'spelling') return;
        
        const currentWord = wordList[currentIndex].word;
        let targetIdx = selectedLetters.findIndex((l, idx) => l === null || (l && l.char !== currentWord[idx]));
        if (targetIdx === -1) return;

        const correctChar = currentWord[targetIdx];
        const currentLetterInSlot = selectedLetters[targetIdx];
        let currentShuffled = [...shuffledLetters];
        let currentSelected = [...selectedLetters];

        if (currentLetterInSlot) {
          currentShuffled.push(currentLetterInSlot);
          currentSelected[targetIdx] = null;
        }

        let letterToMoveIdx = currentShuffled.findIndex(l => l.char === correctChar);
        let letterObj = null;

        if (letterToMoveIdx !== -1) {
          letterObj = currentShuffled[letterToMoveIdx];
          currentShuffled.splice(letterToMoveIdx, 1);
        } else {
          const wrongSlotIdx = currentSelected.findIndex((l, idx) => l !== null && l.char === correctChar && currentWord[idx] !== correctChar);
          if (wrongSlotIdx !== -1) {
            letterObj = currentSelected[wrongSlotIdx];
            currentSelected[wrongSlotIdx] = null; 
          }
        }

        if (letterObj) {
          setScore(s => Math.max(0, s - 1)); 
          setCombo(0); 
          setCurrentMistakes(m => m + 1);
          playPop();
          currentSelected[targetIdx] = letterObj;
          setShuffledLetters(currentShuffled);
          setSelectedLetters(currentSelected);
        }
      }, [appState, wordList, currentIndex, correctAnimation, gameMode, selectedLetters, shuffledLetters, playPop]);

      const handleFlip = useCallback(() => {
        playPop();
        setIsFlipped(prev => {
          const nextState = !prev;
          if (nextState && wordList[currentIndex]) setTimeout(() => playAudio(wordList[currentIndex].word), 150);
          return nextState;
        });
      }, [currentIndex, playAudio, playPop, wordList]);

      const generateQuizOptions = useCallback((correctWord, fullList) => {
        let opts = [correctWord];
        let pool = fullList.filter(w => w.word !== correctWord).map(w => w.word);
        pool.sort(() => Math.random() - 0.5); 
        for(let i=0; i<3 && i<pool.length; i++) opts.push(pool[i]);
        const fallbacks = ['apple', 'cat', 'dog', 'sun', 'moon', 'car', 'bird', 'fish'];
        let fIdx = 0;
        while(opts.length < 4) {
          if (!opts.includes(fallbacks[fIdx])) opts.push(fallbacks[fIdx]);
          fIdx++;
        }
        return opts.sort(() => Math.random() - 0.5);
      }, []);

      const initGameLevel = useCallback((wordObj, mode) => {
        setCorrectAnimation(false);
        setIsFlipped(false); 
        setWrongIndexes([]);
        setCurrentMistakes(0);
        questionStartTime.current = Date.now();

        if (mode === 'spelling') {
          const letters = wordObj.word.split('');
          let shuffled = letters.map((char, id) => ({ char, id })).sort(() => Math.random() - 0.5);
          
          const isAllSameChar = letters.every(c => c === letters[0]);
          if (!isAllSameChar && letters.length > 1) {
            while (shuffled.map(l => l.char).join('') === wordObj.word) {
              shuffled = letters.map((char, id) => ({ char, id })).sort(() => Math.random() - 0.5);
            }
          }
          
          setShuffledLetters(shuffled);
          setSelectedLetters(new Array(letters.length).fill(null));
        } else if (mode === 'quiz' || mode === 'listening') {
          setQuizOptions(generateQuizOptions(wordObj.word, wordList));
          setWrongQuizOptions([]);
        } else if (mode === 'truefalse') {
          const isTrue = Math.random() > 0.5 || wordList.length < 2;
          setTfIsCorrect(isTrue);
          let targetWord = wordObj.word;
          if (!isTrue) {
            const others = wordList.filter(w => w.word !== wordObj.word);
            targetWord = others[Math.floor(Math.random() * others.length)].word;
          }
          setTfQuestionWord(targetWord);
        }
        
        if (mode !== 'flashcard' && mode !== 'truefalse') {
          setTimeout(() => playAudio(wordObj.word), 300); 
        }
      }, [playAudio, generateQuizOptions, wordList]);

      const startGame = useCallback((mode) => {
        setGameMode(mode);
        setCurrentIndex(0);
        setScore(0);
        setCombo(0);
        setLives(3);
        setTimeElapsed(0);
        setGameHistory([]);
        initGameLevel(wordList[0], mode);
        setAppState('playing');
      }, [initGameLevel, wordList]);

      const nextFlashcard = useCallback(() => {
        setGameHistory(prev => [...prev, { word: wordList[currentIndex].word, translation: wordList[currentIndex].translation, status: 'viewed' }]);
        
        if (currentIndex + 1 < wordList.length) {
          playDrop();
          setCurrentIndex(prev => prev + 1);
          initGameLevel(wordList[currentIndex + 1], 'flashcard');
        } else {
          setAppState('finished');
        }
      }, [currentIndex, initGameLevel, playDrop, wordList]);

      const prevFlashcard = useCallback(() => {
        if (currentIndex > 0) {
          playDrop();
          setCurrentIndex(prev => prev - 1);
          initGameLevel(wordList[currentIndex - 1], 'flashcard');
        }
      }, [currentIndex, initGameLevel, playDrop, wordList]);

      const shuffleFlashcards = useCallback(() => {
        playPop();
        setIsFlipped(false);
        const current = wordList[currentIndex];
        let others = wordList.filter((_, i) => i !== currentIndex);
        others.sort(() => Math.random() - 0.5);
        setWordList([current, ...others]);
        setCurrentIndex(0); 
        showToast("已重新洗牌！", "info");
      }, [currentIndex, playPop, wordList, showToast]);

      const handleCorrectAnswer = useCallback(() => {
        playSuccess();
        setCorrectAnimation(true); 
        const earnedScore = 1;
        setFloatingScore({ val: earnedScore, id: Date.now() });
        setScore(s => s + earnedScore);
        setCombo(c => c + 1);

        setGameHistory(prev => [...prev, { 
          word: wordList[currentIndex].word, 
          translation: wordList[currentIndex].translation, 
          mistakes: currentMistakes,
          status: 'success' 
        }]);

        setTimeout(() => {
          if (!isPlayingRef.current) return; 
          if (currentIndex + 1 < wordList.length) {
            setCurrentIndex(currentIndex + 1);
            initGameLevel(wordList[currentIndex + 1], gameMode);
          } else {
            setAppState('finished');
          }
        }, 1200); 
      }, [combo, currentIndex, gameMode, initGameLevel, playSuccess, wordList, currentMistakes]);

      const handleWrongAnswer = useCallback((errors) => {
        playErrorTone();
        setCombo(0); 
        setCurrentMistakes(m => m + 1);
        const newLives = lives - 1;
        setLives(newLives);
        setWrongIndexes(errors); 

        if (newLives <= 0) {
          setGameHistory(prev => [...prev, { 
            word: wordList[currentIndex].word, 
            translation: wordList[currentIndex].translation, 
            mistakes: currentMistakes + 1,
            status: 'failed' 
          }]);

          setTimeout(() => { 
            if (!isPlayingRef.current) return;
            playGameOverTone(); 
            setAppState('gameover'); 
          }, 1000);
          return;
        }

        setTimeout(() => {
          if (!isPlayingRef.current) return; 
          const returningLetters = [];
          const newSelected = [...selectedLetters];
          errors.forEach(idx => {
              if (idx !== -1) {
                returningLetters.push(newSelected[idx]);
                newSelected[idx] = null; 
              }
          });
          if (returningLetters.length > 0) {
            setShuffledLetters(prev => [...prev, ...returningLetters].sort(() => Math.random() - 0.5));
            setSelectedLetters(newSelected);
          }
          setWrongIndexes([]); 
        }, 800); 
      }, [lives, playErrorTone, playGameOverTone, selectedLetters, wordList, currentIndex, currentMistakes]);

      const handleQuizSelect = useCallback((selectedWord) => {
        if (correctAnimation || wrongQuizOptions.includes(selectedWord)) return;
        const currentWord = wordList[currentIndex].word;
        if (selectedWord === currentWord) handleCorrectAnswer();
        else {
          playErrorTone();
          setCombo(0);
          setCurrentMistakes(m => m + 1);
          const newLives = lives - 1;
          setLives(newLives);
          setWrongQuizOptions(prev => [...prev, selectedWord]);
          
          if (newLives <= 0) {
             setGameHistory(prev => [...prev, { word: currentWord, translation: wordList[currentIndex].translation, mistakes: currentMistakes + 1, status: 'failed' }]);
             setTimeout(() => { if (!isPlayingRef.current) return; playGameOverTone(); setAppState('gameover'); }, 1000);
          }
        }
      }, [correctAnimation, wrongQuizOptions, currentIndex, wordList, handleCorrectAnswer, playErrorTone, lives, playGameOverTone, currentMistakes]);

      const handleTFSelect = useCallback((choice) => {
        if (correctAnimation || wrongIndexes.length > 0) return;
        if (choice === tfIsCorrect) handleCorrectAnswer();
        else handleWrongAnswer([-1]); 
      }, [correctAnimation, wrongIndexes, tfIsCorrect, handleCorrectAnswer, handleWrongAnswer]);

      const processWords = useCallback((wordsArray) => {
        const processedList = wordsArray.map(item => ({
          word: item.word.trim().toLowerCase(),
          original: item.word,
          translation: item.translation,
          image: null,
          hasFetched: false 
        })).sort(() => Math.random() - 0.5);

        setWordList(processedList);
        fetchingRefs.current.clear(); 
        setEditPage(0);
        setAppState('selectMode');
      }, []);

      const saveUnitToCloud = async (name, wordsArray) => {
        if (!user || !db) {
          setWordList(wordsArray);
          fetchingRefs.current.clear();
          setAppState('selectMode');
          showToast("已載入單字，目前為本機暫存模式。", "info");
          return;
        }
        try {
          const unitId = "unit_" + Date.now().toString();
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'units', unitId);
          await setDoc(docRef, { name, words: wordsArray, createdAt: Date.now() });
          showToast(`單字庫「${name}」已儲存至雲端！`, "info");
        } catch (error) { showToast("儲存至雲端失敗：" + error.message, "error"); }
      };

      const deleteUnitFromCloud = async (unitId) => {
        if (!user || !db) return;
        if (!confirm("確定要刪除這個單字庫嗎？")) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'units', unitId);
          await deleteDoc(docRef);
          showToast("單字庫已刪除！", "info");
        } catch (error) { showToast("刪除失敗：" + error.message, "error"); }
      };

      const updateUnitImagesInCloud = async () => {
        if (!user || !db || !currentUnitId) {
          showToast("更新完成 (本機暫存模式)", "info");
          setAppState('selectMode');
          return;
        }
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'units', currentUnitId);
          if (JSON.stringify(wordList).length > 900000) showToast("警告：自訂圖片過多或過大，可能無法完整儲存至雲端。", "error");
          await setDoc(docRef, { words: wordList }, { merge: true });
          showToast("圖片變更已同步儲存至雲端！", "info");
          setAppState('selectMode');
        } catch (error) { showToast("儲存雲端失敗，圖片可能太大。", "error"); }
      };

      const handleAdminFileUpload = useCallback(async (e) => {
        if (!newUnitName.trim() && db) {
          showToast("請先輸入單字庫名稱！", "error");
          e.target.value = '';
          return;
        }
        const file = e.target.files[0];
        if (!file) return;

        let XLSXLib = window.XLSX;
        if (!XLSXLib) {
          showToast("首次上傳，正在準備 Excel 解析引擎...", "info");
          try {
            XLSXLib = await new Promise((resolve, reject) => {
              if (window.XLSX) { resolve(window.XLSX); return; }
              const script = document.createElement('script');
              script.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
              script.onload = () => resolve(window.XLSX);
              script.onerror = () => reject(new Error("載入失敗"));
              document.head.appendChild(script);
            });
          } catch (err) {
            showToast("解析套件載入失敗，請確認網路連線。", "error");
            e.target.value = '';
            return;
          }
        }
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const arrayBuffer = evt.target.result;
            const wb = XLSXLib.read(arrayBuffer, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSXLib.utils.sheet_to_json(ws, { header: 1 });
            
            let parsedWords = data
              .filter(row => row && typeof row[0] === 'string' && row[0].trim() !== '')
              .map(row => ({
                word: row[0].trim().toLowerCase(),
                translation: row[1] ? String(row[1]).trim() : '',
                image: null,
                hasFetched: false
              }))
              .filter(item => /^[a-zA-Z\s\-'’]+$/.test(item.word));

            if (parsedWords.length === 0) { showToast("在 Excel 中找不到有效的英文單字！", "error"); return; }
            await saveUnitToCloud(newUnitName.trim() || "本機測試題庫", parsedWords);
            setNewUnitName('');
          } catch (err) { showToast("讀取檔案失敗，請確認格式是否正確。", "error"); 
          } finally { e.target.value = ''; }
        };
        reader.readAsArrayBuffer(file);
      }, [newUnitName, showToast, db]);

      const startSelectedUnit = (unitId, unitWords) => {
        setCurrentUnitId(unitId);
        setWordList(unitWords);

        const file = e.target.files[0];

        reader.onload = (evt) => {
          const dataUrl = evt.target.result;
          setWordList(prev => {
            const next = [...prev];
            next[idx] = { ...next[idx], image: dataUrl, hasFetched: true };
            return next;

          showToast("圖片替換成功！(請記得按儲存)", "info");

        reader.readAsDataURL(file);
        e.target.value = '';

        if (appState === 'playing' && gameMode !== 'flashcard') timer = setInterval(() => setTimeElapsed(prev => prev + 1), 1000);

        if ((appState !== 'playing' && appState !== 'selectMode' && appState !== 'edit') || wordList.length === 0) return;

        const fetchImage = async (idx) => {
          const cleanWord = wordList[idx].word;
          let imageUrl = null;
          try {
            const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(cleanWord)}`);
            if (res.ok) {
              const data = await res.json();
              if (data.thumbnail && data.thumbnail.source) imageUrl = data.thumbnail.source.replace('http://', 'https://');
            }
          } catch (e) {}

          if (!imageUrl) imageUrl = `https://api.dicebear.com/9.x/bottts/svg?seed=${encodeURIComponent(cleanWord)}&backgroundColor=ffdfbf`;

          setWordList(prev => {
            const next = [...prev];
            if (next[idx]) next[idx] = { ...next[idx], image: imageUrl, hasFetched: true };
            return next;

        if (appState === 'playing' || appState === 'selectMode') {
          for (let i = currentIndex; i <= currentIndex + 2; i++) if (i < wordList.length) indicesToFetch.push(i);
        } else if (appState === 'edit') {
          const start = editPage * 20;
          const end = Math.min(start + 20, wordList.length);
          for (let i = start; i < end; i++) indicesToFetch.push(i);
        }

        indicesToFetch.forEach(i => {
          if (!wordList[i].hasFetched && !fetchingRefs.current.has(i)) {

            else if (e.key === 'ArrowRight') { e.preventDefault(); nextFlashcard(); } 
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prevFlashcard(); }
            return;
          }

          if (gameMode === 'quiz' || gameMode === 'listening') {
            if (['1','2','3','4'].includes(e.key)) {
              e.preventDefault();
              const idx = parseInt(e.key) - 1;
              if (quizOptions[idx]) handleQuizSelect(quizOptions[idx]);
            }
            return;
          }

          if (gameMode === 'truefalse') {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'o') { e.preventDefault(); handleTFSelect(true); } 
            else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'x') { e.preventDefault(); handleTFSelect(false); }
            return;
          }

          if (gameMode === 'spelling') {
            if (correctAnimation) return;
            const key = e.key.toLowerCase();
            if (key === 'backspace') {
              const lastFilledIndex = selectedLetters.map((l, i) => l !== null ? i : -1).filter(i => i !== -1).pop();
              if (lastFilledIndex !== undefined) unselectLetter(selectedLetters[lastFilledIndex], lastFilledIndex);
              return;
            }
            if (!/^[a-z]$/.test(key) || selectedLetters.every(l => l !== null)) return;
            
            const found = shuffledLetters.find(l => l.char.toLowerCase() === key);
            if (found) selectLetter(found);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [appState, selectedLetters, correctAnimation, gameMode, handleFlip, nextFlashcard, prevFlashcard, quizOptions, handleQuizSelect, handleTFSelect, unselectLetter, selectLetter, shuffledLetters]);

                    <p className="text-slate-500 font-medium text-center text-sm sm:text-base">圖片和單字配對正確嗎？挑戰你的極限反應！</p>
                  </button>

                  <button onClick={() => startGame('flashcard')} className="bg-white p-6 sm:p-8 rounded-[2rem] shadow-[0_8px_0_0_rgba(203,213,225,1)] hover:shadow-[0_12px_0_0_rgba(203,213,225,1)] hover:-translate-y-2 active:translate-y-2 active:shadow-none transition-all border-4 border-slate-200 flex flex-col items-center group text-left sm:col-span-2 lg:col-span-1">
                    <div className="bg-purple-100 p-4 rounded-full mb-4 sm:mb-6 group-hover:bg-purple-500 group-hover:text-white transition-colors text-purple-600">{BookOpen && <BookOpen size={40} />}</div>
                    <h3 className="text-xl sm:text-2xl font-black text-slate-800 mb-2">單字閃卡</h3>
                    <p className="text-slate-500 font-medium text-center text-sm sm:text-base">3D 翻轉閃卡，支援鍵盤操作，純粹複習無壓力。</p>
                  </button>
                </div>
                
                <div className="flex flex-col sm:flex-row gap-4 sm:gap-6 mt-12 w-full max-w-3xl px-4 justify-center">
                  <button onClick={() => setAppState('home')} className="flex-1 max-w-[200px] flex items-center justify-center gap-2 text-slate-700 hover:text-slate-900 bg-white hover:bg-slate-50 px-6 py-4 rounded-full font-bold transition-colors shadow-md border-2 border-slate-200">
                    {Home && <Home size={20} />} 返回大廳
                  </button>
                  <button onClick={() => setAppState('edit')} className="flex-1 max-w-[250px] flex items-center justify-center gap-2 text-orange-600 hover:text-orange-700 bg-orange-100 hover:bg-orange-200 px-6 py-4 rounded-full font-bold transition-colors shadow-md">
                    {Edit3 && <Edit3 size={20} />} 檢視與自訂圖片
                  </button>
                </div>
              </div>
            )}

            {appState === 'edit' && (
              <div className="w-full max-w-5xl mx-auto flex flex-col items-center animate-[slideUp_0.4s_ease-out] py-4">
                <div className="w-full flex flex-col sm:flex-row justify-between items-center mb-6 bg-white/90 backdrop-blur-md p-4 sm:px-8 rounded-2xl shadow-sm gap-4 border border-white">
                  <div>
                    <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                      {ImagePlus && <ImagePlus size={24} className="text-orange-500" />} 自訂題庫圖片
                    </h2>
                    <p className="text-slate-500 text-sm mt-1">點擊下方卡片的「更換圖片」來上傳您的專屬教材照片。</p>
                  </div>
                  <div className="flex gap-3 w-full sm:w-auto">
                    <button onClick={() => setAppState('selectMode')} className="flex-1 sm:flex-none bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-3 rounded-full font-bold transition-colors">
                      取消
                    </button>
                    <button onClick={updateUnitImagesInCloud} className="flex-1 sm:flex-none bg-orange-500 hover:bg-orange-600 text-white px-8 py-3 rounded-full font-bold transition-colors shadow-md shadow-orange-500/30 flex items-center justify-center gap-2">
                      {Save && <Save size={18}/>} 儲存變更至雲端
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 w-full">
                  {wordList.slice(editPage * 20, (editPage + 1) * 20).map((item, i) => {
                    const actualIdx = editPage * 20 + i;
                    return (
                      <div key={actualIdx} className="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-100 flex flex-col items-center hover:border-orange-300 transition-colors">
                        <div className="w-full aspect-square bg-slate-50 rounded-xl mb-3 relative overflow-hidden border border-slate-200">
                          {item.hasFetched ? (
                              <SafeImage src={item.image} word={item.word} />
                          ) : (
                              <div className="absolute inset-0 flex items-center justify-center"><div className="w-8 h-8 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"></div></div>
                          )}
                        </div>
                        <h3 className="font-black text-slate-800 text-lg mb-1 lowercase truncate w-full text-center">{item.word}</h3>
                        {item.translation && <p className="text-sm text-slate-500 font-bold truncate w-full text-center mb-3 bg-slate-100 rounded py-1">{item.translation}</p>}
                        
                        <label className="cursor-pointer mt-auto w-full bg-orange-100 hover:bg-orange-200 text-orange-700 py-2.5 rounded-xl text-sm font-bold text-center transition-colors flex items-center justify-center gap-1 shadow-sm">
                          {Upload && <Upload size={16} />} 更換圖片
                          <input type="file" accept="image/*" className="hidden" onChange={(e) => handleCustomImageUpload(actualIdx, e)} />
                        </label>
                      </div>
                    );
                  })}
                </div>

                {wordList.length > 20 && (
                  <div className="flex gap-4 items-center mt-8 bg-white/90 backdrop-blur-md px-6 py-3 rounded-full shadow-sm font-bold text-slate-700 border-2 border-white">
                    <button onClick={() => setEditPage(p => Math.max(0, p - 1))} disabled={editPage === 0} className="px-4 py-2 hover:bg-slate-100 rounded-full disabled:opacity-30 transition-colors flex items-center gap-2">
                      {ArrowLeft && <ArrowLeft size={20} />} 上一頁
                    </button>
                    <span className="mx-4 text-lg">第 {editPage + 1} 頁 / 共 {Math.ceil(wordList.length / 20)} 頁</span>
                    <button onClick={() => setEditPage(p => Math.min(Math.ceil(wordList.length / 20) - 1, p + 1))} disabled={editPage === Math.ceil(wordList.length / 20) - 1} className="px-4 py-2 hover:bg-slate-100 rounded-full disabled:opacity-30 transition-colors flex items-center gap-2">
                      下一頁 {ArrowRight && <ArrowRight size={20} />}
                    </button>
                  </div>
                )}
              </div>
            )}

            {appState === 'playing' && currentLevel && (
              <div className={`flex flex-col items-center w-full max-w-2xl mx-auto ${wrongIndexes.length > 0 && gameMode === 'truefalse' ? 'anim-shake' : ''}`}>
                
                {gameMode === 'flashcard' ? (
                  <div className="flex flex-col items-center w-full">
                    <div className="bg-purple-500/10 p-6 sm:p-10 rounded-[3rem] border-8 border-white/50 shadow-2xl w-full backdrop-blur-sm relative">
                      
                      <div className="w-full max-w-sm aspect-[4/3] sm:aspect-square perspective-1000 mx-auto cursor-pointer group" onClick={handleFlip}>
                        <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d shadow-xl rounded-3xl ${isFlipped ? 'rotate-y-180' : ''}`}>
                          
                          <div className="absolute inset-0 backface-hidden bg-white rounded-3xl border-8 border-white overflow-hidden flex items-center justify-center">
                            {!currentLevel.hasFetched ? (
                              <div className="absolute inset-0 flex items-center justify-center bg-slate-100 z-20">
                                <div className="w-10 h-10 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"></div>
                              </div>
                            ) : (
                              <SafeImage key={`front-${currentIndex}`} src={currentLevel.image} word={currentLevel.word} />
                            )}
                            <div className="absolute bottom-4 right-4 bg-slate-900/60 backdrop-blur-sm text-white px-4 py-2 rounded-full font-bold text-sm flex items-center gap-2 transition-opacity opacity-0 group-hover:opacity-100">
                              {RefreshCcw && <RefreshCcw size={16} />} 點擊翻轉
                            </div>
                          </div>

                          <div className="absolute inset-0 backface-hidden bg-gradient-to-br from-sky-400 to-blue-600 rounded-3xl border-8 border-white overflow-hidden flex flex-col items-center justify-center rotate-y-180 p-6 shadow-inner text-white">
                            <h2 className="text-5xl sm:text-6xl font-black mb-4 tracking-wider drop-shadow-md lowercase text-center leading-tight">{currentLevel.word}</h2>
                            {currentLevel.translation && (
                              <p className="text-2xl sm:text-3xl font-bold bg-white/20 px-6 py-2 rounded-full drop-shadow-sm">{currentLevel.translation}</p>
                            )}
                            <button onClick={(e) => { e.stopPropagation(); playAudio(currentLevel.word); }} className="mt-8 bg-white text-blue-600 px-6 py-3 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-transform flex items-center gap-2 font-bold text-lg">
                              {isMuted ? (VolumeX && <VolumeX size={24} />) : (Volume2 && <Volume2 size={24} />)} 聽發音
                            </button>
                          </div>
                        </div>
                      </div>

                      <div className="flex w-full justify-between items-center mt-10 gap-2">
                        <button onClick={prevFlashcard} disabled={currentIndex === 0} className="flex-1 bg-white hover:bg-slate-50 text-slate-700 py-4 px-2 rounded-2xl shadow-[0_4px_0_0_rgba(203,213,225,1)] active:translate-y-1 active:shadow-none transition-all disabled:opacity-40 flex items-center justify-center gap-1 font-bold text-sm sm:text-lg">
                          {ArrowLeft && <ArrowLeft size={20} />} 上一張
                        </button>
                        <button onClick={shuffleFlashcards} className="bg-purple-100 hover:bg-purple-200 text-purple-700 py-4 px-4 sm:px-6 rounded-2xl shadow-[0_4px_0_0_rgba(216,180,254,1)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 font-bold text-sm sm:text-lg">
                          {Shuffle && <Shuffle size={20} />} 打亂
                        </button>
                        <button onClick={nextFlashcard} className="flex-1 bg-purple-500 hover:bg-purple-400 text-white py-4 px-2 rounded-2xl shadow-[0_4px_0_0_rgba(126,34,206,1)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-1 font-bold text-sm sm:text-lg">
                          {currentIndex + 1 === wordList.length ? '完成' : '下一張'} {ArrowRight && <ArrowRight size={20} />}
                        </button>
                      </div>

                    </div>
                    
                    <div className="mt-6 text-slate-500 font-medium flex items-center gap-2 bg-white/50 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm text-sm sm:text-base">
                      ⌨️ 按 <kbd className="bg-white border-b-2 border-slate-300 px-2 py-0.5 rounded mx-1 font-sans">空白鍵</kbd> 翻面, <kbd className="bg-white border-b-2 border-slate-300 px-2 py-0.5 rounded mx-1 font-sans">⬅️</kbd> <kbd className="bg-white border-b-2 border-slate-300 px-2 py-0.5 rounded mx-1 font-sans">➡️</kbd> 切換
                    </div>
                  </div>

                ) : (

                  <div className={`p-4 sm:p-8 rounded-[3rem] border-8 border-white/50 shadow-2xl w-full backdrop-blur-sm flex flex-col items-center relative ${getModeBgColor()}`}>
                    
                    <div className="relative bg-white p-4 pb-12 sm:pb-16 rounded-sm shadow-[0_8px_15px_-3px_rgba(0,0,0,0.3)] w-full max-w-xs sm:max-w-sm mb-10 transform -rotate-2 hover:rotate-0 transition-transform duration-300 group">
                      <div className="absolute -top-4 left-1/2 -translate-x-1/2 w-8 h-8 bg-red-500 rounded-full shadow-[inset_-2px_-2px_4px_rgba(0,0,0,0.3),2px_4px_4px_rgba(0,0,0,0.3)] border border-red-700 z-30 flex items-center justify-center">
                        <div className="w-3 h-3 bg-red-400 rounded-full opacity-50"></div>
                      </div>
                      
                      <div className="bg-white rounded-sm overflow-hidden aspect-square flex items-center justify-center border border-slate-200 relative">
                        {gameMode === 'listening' ? (
                           <div className="absolute inset-0 flex flex-col items-center justify-center bg-indigo-500 text-white z-20 cursor-pointer hover:bg-indigo-600 transition-colors" onClick={() => playAudio(currentLevel.word)}>
                              {Ear && <Ear size={80} className="mb-4 animate-pulse" />}
                              <span className="font-bold text-xl tracking-widest drop-shadow-md">點擊聆聽發音</span>
                           </div>
                        ) : (
                           !currentLevel.hasFetched ? (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-100 z-20">
                               <div className="w-10 h-10 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"></div>
                            </div>
                          ) : (
                            <SafeImage key={`game-${currentIndex}`} src={currentLevel.image} word={currentLevel.word} />
                          )
                        )}
                      </div>

                      <div className="absolute bottom-3 sm:bottom-4 right-4 flex flex-col sm:flex-row gap-2 sm:gap-3 z-30">
                        {gameMode === 'spelling' && (
                          <button onClick={giveSpellingHint} disabled={correctAnimation} className="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-4 py-3 rounded-full shadow-[0_4px_0_0_rgba(161,98,7,1)] active:shadow-none active:translate-y-1 transition-all disabled:opacity-50 flex items-center gap-2 font-bold text-sm sm:text-base">
                            {Lightbulb && <Lightbulb size={20} />} 提示(-1分)
                          </button>
                        )}
                        {gameMode !== 'listening' && gameMode !== 'truefalse' && (
                          <button onClick={() => playAudio(currentLevel.word)} className="bg-blue-500 hover:bg-blue-400 text-white px-4 py-3 rounded-full shadow-[0_4px_0_0_rgba(30,58,138,1)] active:shadow-none active:translate-y-1 transition-all flex items-center gap-2 font-bold text-sm sm:text-base">
                            {isMuted ? (VolumeX && <VolumeX size={20} />) : (Volume2 && <Volume2 size={20} />)} 發音
                          </button>
                        )}
                      </div>
                    </div>

                    {gameMode === 'spelling' && (
                      <>
                        <div className="flex flex-wrap justify-center gap-2 sm:gap-3 mb-10 bg-slate-900/10 p-4 rounded-2xl shadow-inner w-full min-h-[6rem]">
                          {currentLevel.word.split('').map((_, i) => {
                            const isError = wrongIndexes.includes(i);
                            const hasLetter = selectedLetters[i] !== null;
                            const char = hasLetter ? selectedLetters[i].char.toLowerCase() : '';
                            const isActiveSlot = !hasLetter && i === firstEmptySpellingIdx && !correctAnimation;
                            
                            let slotClass = "w-12 h-14 sm:w-16 sm:h-16 flex items-center justify-center text-3xl font-black rounded-xl transition-all duration-200 select-none ";
                            if (!hasLetter) {
                              slotClass += "bg-slate-800/20 text-transparent border-2 border-slate-800/30 ";
                              if (isActiveSlot) slotClass += "border-dashed border-orange-400 shadow-[0_0_15px_rgba(251,146,60,0.5)] bg-orange-400/20 ";
                              else slotClass += "border-dashed shadow-[inset_0_4px_8px_rgba(0,0,0,0.3)] ";
                            } else {
                              slotClass += "bg-white text-slate-800 border-2 border-slate-300 shadow-[0_6px_0_0_rgba(148,163,184,1),0_10px_10px_rgba(0,0,0,0.1)] cursor-pointer hover:-translate-y-1 active:translate-y-1 active:shadow-[0_2px_0_0_rgba(148,163,184,1)] ";
                              if (isError) slotClass += "bg-red-100 text-red-600 border-red-300 shadow-[0_6px_0_0_rgba(248,113,113,1)] anim-shake ";
                              else if (correctAnimation) slotClass += "anim-pop ";
                            }
                            return <div key={`slot-${i}`} className={slotClass} onClick={() => hasLetter && unselectLetter(selectedLetters[i], i)}>{char}</div>;
                          })}
                        </div>
                        <div className="flex flex-wrap justify-center gap-2 sm:gap-3 w-full min-h-[5rem]">
                          {shuffledLetters.map((l) => (
                            <button key={l.id} onClick={() => selectLetter(l)} disabled={correctAnimation} className="w-12 h-14 sm:w-14 sm:h-16 bg-gradient-to-b from-orange-400 to-orange-500 text-white border-2 border-orange-300 rounded-xl text-3xl font-black shadow-[0_6px_0_0_rgba(194,65,12,1)] hover:brightness-110 hover:-translate-y-1 active:translate-y-1 active:shadow-[0_2px_0_0_rgba(194,65,12,1)] transition-all flex items-center justify-center select-none disabled:opacity-50">
                              {l.char.toLowerCase()}
                            </button>
                          ))}
                        </div>
                      </>
                    )}

                    {(gameMode === 'quiz' || gameMode === 'listening') && (
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                        {quizOptions.map((opt, i) => {
                          const isCorrect = correctAnimation && opt === currentLevel.word;
                          const isWrong = wrongQuizOptions.includes(opt);
                          let btnClass = "w-full py-5 px-6 bg-white text-slate-800 border-4 border-slate-200 rounded-2xl text-2xl font-black shadow-[0_6px_0_0_rgba(203,213,225,1)] hover:-translate-y-1 active:translate-y-1 active:shadow-none transition-all lowercase text-center flex items-center justify-center gap-3 ";
                          if (isCorrect) btnClass += "quiz-correct ";
                          else if (isWrong) btnClass += "quiz-wrong ";
                          return (
                            <button key={i} disabled={correctAnimation || isWrong} onClick={() => handleQuizSelect(opt)} className={btnClass}>
                              <span className="text-slate-400 text-lg font-bold bg-slate-100 rounded-lg px-2">{i+1}</span> {opt}
                            </button>
                          );
                        })}
                      </div>
                    )}

                    {gameMode === 'truefalse' && (
                      <div className="flex flex-col items-center w-full">
                        <div className="bg-white px-10 py-5 rounded-2xl shadow-sm border-4 border-slate-200 mb-6 min-w-[250px] text-center">
                           <h3 className="text-4xl sm:text-5xl font-black text-slate-800 lowercase tracking-wider">{tfQuestionWord}</h3>
                        </div>
                        <div className="flex gap-4 w-full">
                           <button onClick={() => handleTFSelect(true)} disabled={correctAnimation} className="flex-1 bg-green-500 hover:bg-green-400 text-white py-4 sm:py-6 rounded-3xl text-3xl sm:text-4xl font-black shadow-[0_8px_0_0_rgba(21,128,61,1)] active:translate-y-2 active:shadow-none transition-all flex flex-col items-center justify-center gap-1 disabled:opacity-50">
                             {CheckCircle && <CheckCircle className="w-10 h-10 sm:w-12 sm:h-12"/>} <span className="text-lg sm:text-xl opacity-80">正確 (O)</span>
                           </button>
                           <button onClick={() => handleTFSelect(false)} disabled={correctAnimation} className="flex-1 bg-red-500 hover:bg-red-400 text-white py-4 sm:py-6 rounded-3xl text-3xl sm:text-4xl font-black shadow-[0_8px_0_0_rgba(185,28,28,1)] active:translate-y-2 active:shadow-none transition-all flex flex-col items-center justify-center gap-1 disabled:opacity-50">
                             {XCircle && <XCircle className="w-10 h-10 sm:w-12 sm:h-12"/>} <span className="text-lg sm:text-xl opacity-80">錯誤 (X)</span>
                           </button>
                        </div>
                      </div>
                    )}

                  </div>
                )}
              </div>
            )}

            {/* 畫面：遊戲結束 */}
            {appState === 'gameover' && (
              <div className="bg-slate-900/90 backdrop-blur-md p-8 sm:p-12 rounded-[3rem] shadow-2xl text-center border-4 border-slate-700 w-full max-w-xl text-white transform animate-[shake_0.5s_ease-in-out]">
                <div className="text-red-500 flex justify-center mb-6">{XCircle && <XCircle size={100} className="drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]" />}</div>
                <h2 className="text-4xl sm:text-5xl font-black mb-4 tracking-wider text-red-400">GAME OVER</h2>
                <p className="text-slate-300 mb-6 text-lg font-medium">愛心用盡了！本次獲得 <span className="text-yellow-400 font-bold text-2xl">{score}</span> 分</p>
                
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <button onClick={() => setAppState('home')} className="bg-white text-slate-900 font-black py-3 px-8 rounded-full flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 shadow-[0_6px_0_0_rgba(203,213,225,1)] text-lg">
                    {Home && <Home size={20} />} 回到大廳
                  </button>
                  <button onClick={() => setAppState('selectMode')} className="bg-gradient-to-b from-sky-400 to-sky-500 text-white font-black py-3 px-8 rounded-full flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 shadow-[0_6px_0_0_rgba(2,132,199,1)] text-lg">
                    {RefreshCcw && <RefreshCcw size={20} />} 重新挑戰
                  </button>
                </div>
                
                {/* 學習成果清單 */}
                <ResultsList />
              </div>
            )}

            {/* 畫面：遊戲通關 */}
            {appState === 'finished' && (
              <div className="bg-white/95 backdrop-blur-sm p-8 sm:p-12 rounded-[3rem] shadow-2xl text-center border-8 border-yellow-400 w-full max-w-xl transform animate-[popOut_0.5s_ease-out]">
                <div className="relative">
                  <div className="absolute inset-0 bg-yellow-300 blur-3xl opacity-50 rounded-full"></div>
                  {Trophy && <Trophy size={120} className="text-yellow-500 drop-shadow-[0_10px_10px_rgba(0,0,0,0.2)] mx-auto mb-6 relative z-10" />}
                </div>
                <h2 className="text-4xl sm:text-5xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-yellow-500">大功告成！</h2>
                
                {gameMode !== 'flashcard' && (
                  <div className="bg-slate-100 rounded-2xl p-6 mb-6 text-left space-y-4 shadow-inner">
                    <div className="flex justify-between items-center text-lg font-bold text-slate-700"><span className="flex items-center gap-2">{Star && <Star className="text-yellow-500" />} 總得分</span><span className="text-2xl text-orange-600">{score}</span></div>
                    <div className="flex justify-between items-center text-lg font-bold text-slate-700 border-t border-slate-200 pt-4"><span className="flex items-center gap-2">{Clock && <Clock className="text-sky-500" />} 總花費時間</span><span className="text-xl text-sky-600">{formatTime(timeElapsed)}</span></div>
                    <div className="flex justify-between items-center text-lg font-bold text-slate-700 border-t border-slate-200 pt-4"><span className="flex items-center gap-2">{Heart && <Heart className="text-red-500 fill-red-500" />} 剩餘愛心</span><span className="text-xl text-red-600">x {lives}</span></div>
                  </div>
                )}

                <div className="flex flex-col sm:flex-row gap-4 mt-2 mb-2">
                  <button onClick={() => setAppState('home')} className="flex-1 bg-white text-slate-700 font-black py-4 px-6 rounded-full flex items-center justify-center gap-2 transition-all hover:bg-slate-50 shadow-[0_4px_0_0_rgba(203,213,225,1)] text-lg border-2 border-slate-200">
                    {Home && <Home size={20} />} 回到大廳
                  </button>
                  <button onClick={() => setAppState('selectMode')} className="flex-1 bg-gradient-to-b from-sky-400 to-sky-500 text-white font-black py-4 px-6 rounded-full flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 shadow-[0_4px_0_0_rgba(2,132,199,1)] text-lg">
                    {RefreshCcw && <RefreshCcw size={20} />} 換個玩法
                  </button>
                </div>

                {/* 學習成果清單 */}
                <ResultsList />
              </div>
            )}

          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
