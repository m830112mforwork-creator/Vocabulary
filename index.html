<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPop | Spelling Adventure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
  <style>
    body { margin:0; padding:0; -webkit-font-smoothing:antialiased; user-select:none; background-color: #fff5f7; }
    
    /* 櫻花粉點點背景 */
    .theme-bg {
      background-color: #fff5f7; 
      background-image: radial-gradient(#ffa1bb 3px, transparent 3px), radial-gradient(#ffa1bb 3px, transparent 3px);
      background-size: 32px 32px;
      background-position: 0 0, 16px 16px;
    }

    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px) rotate(-3deg)} 40%,80%{transform:translateX(5px) rotate(3deg)} }
    .anim-shake { animation:shake .4s ease-in-out }
    
    @keyframes popOut { 0%{transform:scale(1)} 50%{transform:scale(1.15) translateY(-5px); background-color:#22c55e; color:white; border-color:#156048} 100%{transform:scale(1); background-color:#22c55e; color:white; border-color:#156048} }
    .anim-pop { animation:popOut .5s ease-in-out forwards }
    
    @keyframes slideUp { 0%{transform:translate(-50%,20px); opacity:0} 100%{transform:translate(-50%,0); opacity:1} }
    @keyframes fadeInUp { from{opacity:0; transform:translateY(18px)} to{opacity:1; transform:translateY(0)} }
    .anim-slide { animation:fadeInUp .35s cubic-bezier(.16,1,.3,1) }
    
    @keyframes quizCorrect { 0%{transform:scale(1)} 50%{transform:scale(1.05); background-color:#22c55e; color:white} 100%{transform:scale(1); background-color:#22c55e; color:white} }
    .quiz-correct { animation:quizCorrect .5s ease forwards; border-color:#156048 !important; box-shadow: 0 6px 0 0 #156048 !important; }
    
    .quiz-wrong { background-color:#fecaca!important; color:#ef4444!important; border-color:#ef4444!important; opacity:0.65; pointer-events:none; text-decoration:line-through; box-shadow: none !important; transform: translateY(6px); }
    
    @keyframes floatUp { 0%{opacity:1; transform:translate(-50%,-50%) scale(.5)} 20%{opacity:1; transform:translate(-50%,-80%) scale(1.2)} 100%{opacity:0; transform:translate(-50%,-150%) scale(1)} }
    .anim-float-up { animation:floatUp 1.2s cubic-bezier(.16,1,.3,1) forwards; pointer-events:none }
    
    .perspective-1000 { perspective:1000px }
    .transform-style-3d { transform-style:preserve-3d }
    .backface-hidden { backface-visibility:hidden }
    .rotate-y-180 { transform:rotateY(180deg) }
    
    ::-webkit-scrollbar { width:8px }
    ::-webkit-scrollbar-track { background:transparent }
    ::-webkit-scrollbar-thumb { background:#156048; border-radius:4px }
    textarea { user-select:text }
    input[type=text] { user-select:text }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc,updateDoc}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const{useState,useEffect,useCallback,useRef}=React;
const{Upload,Volume2,RefreshCcw,Image:ImageIcon,Lightbulb,Star,Trophy,Heart,Clock,
  XCircle,CheckCircle,HelpCircle,Type,MousePointerClick,BookOpen,ArrowRight,ArrowLeft,
  Home,Shuffle,Edit3,ImagePlus,Ear,CheckSquare,VolumeX,Database,Settings,Trash2,
  Save,AlertTriangle,Plus,PenLine,Eye,Lock,ChevronRight,GraduationCap,LogOut}=window.LucideReact||{};

const firebaseConfig={
  apiKey:"AIzaSyDC-slEwIqWT6l8U8DubOChLIWQAOX_DKE",
  authDomain:"voc-test-e8783.firebaseapp.com",
  projectId:"voc-test-e8783",
  storageBucket:"voc-test-e8783.firebasestorage.app",
  messagingSenderId:"866197218174",
  appId:"1:866197218174:web:680acc4d9e643ec8c3c92f"
};
const APP_ID="voc-test-e8783";
const ADMIN_PWD="teacher123";

let app,auth,db;
try{app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app);}
catch(e){console.error("Firebase init failed:",e);}

const SafeImage=({src,word})=>{
  const[status,setStatus]=useState('loading');
  const[cur,setCur]=useState(src);
  useEffect(()=>{setStatus('loading');setCur(src);},[src]);
  const onError=()=>{
    const fb=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    if(cur!==fb){setCur(fb);setStatus('loading');}else setStatus('error');
  };
  return(
    <div className="absolute inset-0 w-full h-full bg-[#fff5f7] overflow-hidden rounded-xl border-4 border-[#156048]">
      <div className="absolute inset-0 flex items-center justify-center text-[#ffa1bb] z-0">{HelpCircle&&<HelpCircle size={64}/>}</div>
      {status==='loading'&&<div className="absolute inset-0 flex items-center justify-center bg-white/70 z-20"><div className="w-10 h-10 border-4 border-[#ffa1bb] border-t-[#156048] rounded-full animate-spin"/></div>}
      {cur&&status!=='error'&&<img src={cur} alt={word} draggable="false" className={`w-full h-full object-cover absolute inset-0 z-10 transition-opacity duration-300 ${status==='loading'?'opacity-0':'opacity-100'}`} onLoad={()=>setStatus('ok')} onError={onError}/>}
    </div>
  );
};

const useSounds=(isMuted)=>{
  const tone=useCallback((f,type='sine',dur=0.1,vol=0.1)=>{
    if(isMuted)return;
    try{const Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;
      const ctx=new Ctx(),osc=ctx.createOscillator(),g=ctx.createGain();
      osc.type=type;osc.frequency.setValueAtTime(f,ctx.currentTime);
      g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      osc.connect(g).connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+dur);}catch{}
  },[isMuted]);
  return{
    pop:  useCallback(()=>tone(600,'sine',.06),[tone]),
    drop:   useCallback(()=>tone(380,'triangle',.06),[tone]),
    success:useCallback(()=>{tone(523,'sine',.12);setTimeout(()=>tone(659,'sine',.15),100);setTimeout(()=>tone(784,'sine',.2),220);},[tone]),
    error:  useCallback(()=>tone(160,'sawtooth',.3,.09),[tone]),
    over:   useCallback(()=>{tone(200,'sawtooth',.3);setTimeout(()=>tone(150,'sawtooth',.5),300);},[tone]),
    speak:  useCallback((text)=>{if(isMuted)return;try{window.speechSynthesis?.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;window.speechSynthesis?.speak(u);}catch{}},[isMuted]),
  };
};

const App=()=>{
  const[screen,setScreen]=useState('home');
  const[gameMode,setGameMode]=useState('spelling');
  const[user,setUser]=useState(null);
  const[cloudUnits,setCloudUnits]=useState([]);
  const[wordList,setWordList]=useState([]);
  const[currentUnitId,setCurrentUnitId]=useState(null);
  const[currentUnitName,setCurrentUnitName]=useState('');
  const[editPage,setEditPage]=useState(0);
  const[newUnitName,setNewUnitName]=useState('');
  const[adminUnit,setAdminUnit]=useState(null);
  const[adminUnitDraft,setAdminUnitDraft]=useState('');
  const[currentIndex,setCurrentIndex]=useState(0);
  const[shuffledLetters,setShuffledLetters]=useState([]);
  const[selectedLetters,setSelectedLetters]=useState([]);
  const[wrongSlotIdxs,setWrongSlotIdxs]=useState([]);
  const[spellingOk,setSpellingOk]=useState(false);
  const[quizOptions,setQuizOptions]=useState([]);
  const[wrongQuizOpts,setWrongQuizOpts]=useState([]);
  const[quizCorrectOpt,setQuizCorrectOpt]=useState(null);
  const[isFlipped,setIsFlipped]=useState(false);
  const[tfWord,setTfWord]=useState('');
  const[tfIsTrue,setTfIsTrue]=useState(true);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[maxCombo,setMaxCombo]=useState(0);
  const[lives,setLives]=useState(3);
  const[timeElapsed,setTimeElapsed]=useState(0);
  const[floatPts,setFloatPts]=useState(null);
  const[gameHistory,setGameHistory]=useState([]);
  const[qMistakes,setQMistakes]=useState(0);
  const[isMuted,setIsMuted]=useState(false);
  const[toast,setToast]=useState(null);
  const[wrongFlash,setWrongFlash]=useState(false);
  const[isTransitioning,setIsTransitioning]=useState(false);

  const snd=useSounds(isMuted);
  const S=useRef({});
  S.current={screen,gameMode,wordList,currentIndex,combo,lives,isTransitioning,
              spellingOk,wrongSlotIdxs,selectedLetters,shuffledLetters,gameHistory,qMistakes};
  const fetchedRef=useRef(new Set());
  const playingRef=useRef(false);
  const globalTimerRef=useRef(null);
  const currentLevel=wordList[currentIndex];

  const showToast=useCallback((msg,type='info')=>{setToast({msg,type});setTimeout(()=>setToast(null),3200);},[]);

  useEffect(()=>{
    if(!auth)return;
    signInAnonymously(auth).catch(console.error);
    return onAuthStateChanged(auth,setUser);
  },[]);

  useEffect(()=>{
    if(!user||!db)return;
    const ref=collection(db,'artifacts',APP_ID,'public','data','units');
    return onSnapshot(ref,(snap)=>{
      const list=[];
      snap.forEach(d=>list.push({id:d.id,...d.data()}));
      list.sort((a,b)=>a.createdAt-b.createdAt);
      setCloudUnits(list);
    },console.error);
  },[user]);

  const fetchImage=useCallback(async(idx,word)=>{
    if(fetchedRef.current.has(idx)||!word)return;
    fetchedRef.current.add(idx);
    let url=null;
    try{
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`);
      if(r.ok){const d=await r.json();url=d.originalimage?.source||d.thumbnail?.source||null;if(url)url=url.replace('http://','https://');}
    }catch{}
    if(!url)url=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    setWordList(prev=>{const next=[...prev];if(next[idx])next[idx]={...next[idx],image:url,hasFetched:true};return next;});
  },[]);

  useEffect(()=>{
    if(!wordList.length)return;
    [currentIndex,currentIndex+1,currentIndex+2].filter(i=>i<wordList.length)
      .forEach(i=>{if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);});
  },[currentIndex,wordList,fetchImage]);

  useEffect(()=>{
    if(screen!=='editImages')return;
    const s=editPage*20,e=Math.min(s+20,wordList.length);
    for(let i=s;i<e;i++){if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);}
  },[editPage,screen,wordList,fetchImage]);

  useEffect(()=>{playingRef.current=screen==='playing';},[screen]);

  useEffect(()=>{
    clearInterval(globalTimerRef.current);
    if(screen==='playing'&&gameMode!=='flashcard')
      globalTimerRef.current=setInterval(()=>setTimeElapsed(t=>t+1),1000);
    return()=>clearInterval(globalTimerRef.current);
  },[screen,gameMode]);

  const makeQuizOptions=useCallback((correctWord,list)=>{
    const opts=[correctWord];
    const pool=list.filter(w=>w.word!==correctWord).map(w=>w.word).sort(()=>Math.random()-.5);
    for(let i=0;i<3&&i<pool.length;i++)opts.push(pool[i]);
    const fb=['apple','cat','dog','sun','moon','car','bird','fish'];let fi=0;
    while(opts.length<4){if(!opts.includes(fb[fi]))opts.push(fb[fi]);fi++;}
    return opts.sort(()=>Math.random()-.5);
  },[]);

  const initLevel=useCallback((wordObj,mode,list)=>{
    if(!wordObj)return;
    setSpellingOk(false);setIsFlipped(false);setWrongSlotIdxs([]);
    setWrongQuizOpts([]);setQuizCorrectOpt(null);setWrongFlash(false);setIsTransitioning(false);
    setQMistakes(0);
    if(mode==='spelling'){
      let letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      const allSame=wordObj.word.split('').every(c=>c===wordObj.word[0]);
      if(!allSame&&wordObj.word.length>1){
        while(letters.map(l=>l.char).join('')===wordObj.word)
          letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      }
      setShuffledLetters(letters);setSelectedLetters(new Array(wordObj.word.length).fill(null));
    }else if(mode==='quiz'||mode==='listening'){
      setQuizOptions(makeQuizOptions(wordObj.word,list));
    }else if(mode==='truefalse'){
      const isTrue=Math.random()>0.5||list.length<2;
      setTfIsTrue(isTrue);
      if(isTrue){setTfWord(wordObj.word);}
      else{const others=list.filter(w=>w.word!==wordObj.word);setTfWord(others[Math.floor(Math.random()*others.length)].word);}
    }
    if(mode!=='flashcard'&&mode!=='truefalse')setTimeout(()=>{if(playingRef.current)snd.speak(wordObj.word);},350);
  },[makeQuizOptions,snd]);

  const advance=useCallback((wList,idx,mode)=>{
    setIsTransitioning(true);
    setTimeout(()=>{
      if(!playingRef.current)return;
      if(idx+1<wList.length){setCurrentIndex(idx+1);initLevel(wList[idx+1],mode,wList);}
      else setScreen('finished');
    },1100);
  },[initLevel]);

  const handleCorrect=useCallback((wList,idx,mode)=>{
    const{isTransitioning:trans,combo:c,qMistakes:qm,gameHistory:hist}=S.current;
    if(trans)return;
    snd.success();
    const newCombo=c+1,pts=10+newCombo*5;
    setScore(s=>s+pts);setCombo(newCombo);setMaxCombo(m=>Math.max(m,newCombo));
    setFloatPts({val:pts,id:Date.now()});
    setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm,status:'success'}]);
    advance(wList,idx,mode);
  },[snd,advance]);

  const handleWrong=useCallback((wList,idx)=>{
    if(S.current.isTransitioning)return;
    snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);
    setQMistakes(m=>m+1);
    setLives(prev=>{
      const next=prev-1;
      if(next<=0){
        const{qMistakes:qm,gameHistory:hist}=S.current;
        setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm+1,status:'failed'}]);
        setTimeout(()=>{snd.over();setScreen('gameover');},800);
      }
      return next;
    });
  },[snd]);

  useEffect(()=>{
    const{screen:sc,gameMode:gm,spellingOk:ok,wrongSlotIdxs:bad,isTransitioning:trans,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||gm!=='spelling'||ok||bad.length>0||trans)return;
    if(!selectedLetters.length||!selectedLetters.every(l=>l!==null))return;
    const target=wl[ci]?.word;if(!target)return;
    const spelled=selectedLetters.map(l=>l.char).join('');
    if(spelled===target){
      setSpellingOk(true);handleCorrect(wl,ci,gm);
    }else{
      const badIdxs=selectedLetters.map((l,i)=>(l&&l.char!==target[i])?i:-1).filter(i=>i!==-1);
      setWrongSlotIdxs(badIdxs);snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);
      setQMistakes(m=>m+1);
      setLives(prev=>{
        const next=prev-1;
        if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},900);return next;}
        setTimeout(()=>{
          setWrongSlotIdxs([]);
          setSelectedLetters(prevSel=>{
            const ret=[];
            const next2=prevSel.map((l,i)=>{if(badIdxs.includes(i)&&l){ret.push(l);return null;}return l;});
            setShuffledLetters(p=>[...p,...ret].sort(()=>Math.random()-.5));return next2;
          });
        },750);
        return next;
      });
    }
  },[selectedLetters]);

  const clickTile=useCallback((tile)=>{
    const{spellingOk:ok,isTransitioning:trans,wrongSlotIdxs:bad,selectedLetters:sel}=S.current;
    if(ok||trans||bad.length>0)return;
    const fi=sel.findIndex(l=>l===null);if(fi===-1)return;
    snd.pop();
    setSelectedLetters(prev=>{const n=[...prev];n[fi]=tile;return n;});
    setShuffledLetters(prev=>prev.filter(t=>t.id!==tile.id));
  },[snd]);

  const unselectSlot=useCallback((letter,idx)=>{
    const{spellingOk:ok,isTransitioning:trans}=S.current;
    if(!letter||ok||trans)return;
    snd.drop();
    setSelectedLetters(prev=>{const n=[...prev];n[idx]=null;return n;});
    setShuffledLetters(prev=>[...prev,letter]);
  },[snd]);

  const giveHint=useCallback(()=>{
    const{screen:sc,spellingOk:ok,gameMode:gm,selectedLetters:sel,shuffledLetters:shuf,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||ok||gm!=='spelling')return;
    const target=wl[ci]?.word;if(!target)return;
    let ti=sel.findIndex((l,i)=>l===null||(l&&l.char!==target[i]));if(ti===-1)return;
    const cc=target[ti],curIn=sel[ti];
    let pool2=[...shuf];if(curIn)pool2.push(curIn);
    const fi=pool2.findIndex(t=>t.char===cc);if(fi===-1)return;
    const found=pool2[fi];pool2.splice(fi,1);
    snd.pop();setScore(s=>Math.max(0,s-5));setCombo(0);
    setShuffledLetters(pool2);setSelectedLetters(prev=>{const n=[...prev];n[ti]=found;return n;});
  },[snd]);

  const handleQuizSelect=useCallback((opt)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans||wrongQuizOpts.includes(opt)||quizCorrectOpt)return;
    const target=wl[ci]?.word;
    if(opt===target){setQuizCorrectOpt(opt);handleCorrect(wl,ci,gm);}
    else{
      snd.error();setCombo(0);setQMistakes(m=>m+1);
      setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);
      setWrongQuizOpts(prev=>[...prev,opt]);
      setLives(prev=>{const next=prev-1;if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},800);}return next;});
    }
  },[wrongQuizOpts,quizCorrectOpt,handleCorrect,snd]);

  const handleTFSelect=useCallback((choice)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans)return;
    if(choice===tfIsTrue)handleCorrect(wl,ci,gm);else handleWrong(wl,ci);
  },[tfIsTrue,handleCorrect,handleWrong]);

  const handleFlip=useCallback(()=>{
    snd.pop();
    setIsFlipped(prev=>{if(!prev)setTimeout(()=>{if(playingRef.current)snd.speak(S.current.wordList[S.current.currentIndex]?.word);},150);return!prev;});
  },[snd]);

  const nextFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci,gameHistory:hist}=S.current;
    setGameHistory([...hist,{word:wl[ci].word,translation:wl[ci].translation,status:'viewed'}]);
    if(ci+1<wl.length){snd.drop();setCurrentIndex(ci+1);initLevel(wl[ci+1],'flashcard',wl);}else setScreen('finished');
  },[snd,initLevel]);

  const prevFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    if(ci>0){snd.drop();setCurrentIndex(ci-1);initLevel(wl[ci-1],'flashcard',wl);}
  },[snd,initLevel]);

  const shuffleFlashcards=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    snd.pop();setIsFlipped(false);
    const cur=wl[ci],others=wl.filter((_,i)=>i!==ci).sort(()=>Math.random()-.5);
    const nl=[cur,...others];setWordList(nl);setCurrentIndex(0);initLevel(cur,'flashcard',nl);
    showToast('Shuffled!','info');
  },[snd,initLevel,showToast]);

  const startGame=useCallback((mode,wList)=>{
    const list=wList||S.current.wordList;
    if(!list || list.length === 0) return;
    setGameMode(mode);setCurrentIndex(0);
    setScore(0);setCombo(0);setMaxCombo(m=>Math.max(0, 0));setLives(3);setTimeElapsed(0);
    setGameHistory([]);setIsTransitioning(false);
    initLevel(list[0],mode,list);setScreen('playing');
  },[initLevel]);

  const openUnit=useCallback((unit)=>{
    setCurrentUnitId(unit.id);setCurrentUnitName(unit.name);
    const list=unit.words.map(w=>({...w,hasFetched:!!w.image}));
    setWordList(list);fetchedRef.current.clear();setEditPage(0);setScreen('selectMode');
  },[]);

  useEffect(()=>{
    const handler=(e)=>{
      const{screen:sc,gameMode:gm,spellingOk:ok,isTransitioning:trans,selectedLetters:sel}=S.current;
      if(sc!=='playing')return;
      if(gm==='flashcard'){
        if(e.key===' '||e.key==='Enter'){e.preventDefault();handleFlip();}
        else if(e.key==='ArrowRight'){e.preventDefault();nextFlashcard();}
        else if(e.key==='ArrowLeft'){e.preventDefault();prevFlashcard();}
        return;
      }
      if((gm==='quiz'||gm==='listening')&&['1','2','3','4'].includes(e.key)){
        e.preventDefault();const opt=quizOptions[parseInt(e.key)-1];if(opt)handleQuizSelect(opt);return;
      }
      if(gm==='truefalse'){
        if(e.key==='ArrowLeft'||e.key.toLowerCase()==='o'){e.preventDefault();handleTFSelect(true);}
        else if(e.key==='ArrowRight'||e.key.toLowerCase()==='x'){e.preventDefault();handleTFSelect(false);}
        return;
      }
      if(gm==='spelling'){
        if(ok||trans)return;
        if(e.key==='Backspace'){e.preventDefault();const last=sel.map((l,i)=>l?i:-1).filter(i=>i!==-1).pop();if(last!==undefined)unselectSlot(sel[last],last);return;}
        const key=e.key.toLowerCase();
        if(/^[a-z]$/.test(key)){
          setShuffledLetters(prev=>{const found=prev.find(l=>l.char===key);if(!found)return prev;setSelectedLetters(ps=>{const fi=ps.findIndex(l=>l===null);if(fi===-1)return ps;snd.pop();const n=[...ps];n[fi]=found;return n;});return prev.filter(l=>l.id!==found.id);});
        }
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[quizOptions,handleFlip,nextFlashcard,prevFlashcard,handleQuizSelect,handleTFSelect,unselectSlot,snd]);

  const handleAdminLogin=useCallback(()=>{

    let Lib=window.XLSX;
    if(!Lib){

      catch{showToast('Excel Load Failed','error');e.target.value='';return;}
    }
    const reader=new FileReader();
    reader.onload=async(evt)=>{
      try{
        const wb=Lib.read(evt.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]];
        const data=Lib.utils.sheet_to_json(ws,{header:1});
        const words=data.filter(r=>r&&typeof r[0]==='string'&&r[0].trim())
          .map(r=>({word:r[0].trim().toLowerCase(),translation:r[1]?String(r[1]).trim():'',image:null,hasFetched:false}))

        if(!db){showToast('Firebase Not Connected','error');return;}

                      return <button key={i} disabled={isTransitioning||isWrong||!!quizCorrectOpt} onClick={()=>handleQuizSelect(opt)} className={cls}><span className="text-[#ffa1bb] text-2xl font-black bg-white rounded-xl px-5 py-2 shrink-0 border-4 border-[#156048] shadow-sm">{i+1}</span>{opt}</button>;

                  </div>

                    <div className="flex gap-8 w-full">

                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ════════════ GAME OVER ════════════ */}
        {screen==='gameover'&&(
          <div className="bg-white p-12 sm:p-16 rounded-[3rem] border-4 border-[#156048] shadow-[10px_10px_0_0_#156048] text-center w-full max-w-xl anim-slide">

            <p className="text-[#156048] mb-10 font-black text-2xl bg-[#fff5f7] py-5 rounded-2xl border-4 border-[#156048] inline-block px-10 shadow-[4px_4px_0_0_#156048]">Out of Hearts! Score: <span className="text-[#ffa1bb] text-4xl ml-2 drop-shadow-[2px_2px_0_#156048]">{score}</span></p>

              <div className="bg-[#fff5f7] rounded-3xl p-8 mb-10 text-left space-y-6 border-4 border-[#156048] shadow-[6px_6px_0_0_#156048]">
                {[[Star&&<Star className="text-yellow-400 fill-yellow-400 drop-shadow-[2px_2px_0_#156048]" size={32}/>,'Score',score,'text-[#156048]'],[Clock&&<Clock className="text-[#ffa1bb] drop-shadow-[2px_2px_0_#156048]" size={32}/>,'Time',fmt(timeElapsed),'text-[#156048]'],[Heart&&<Heart className="text-red-500 fill-red-500 drop-shadow-[2px_2px_0_#156048]" size={32}/>,'Lives',`×${lives}`,'text-[#156048]']].map(([icon,label,val,cls],i)=>(
                  <div key={i} className={`flex justify-between items-center font-black text-[#156048] ${i>0?'border-t-4 border-[#156048] pt-6':''}`}><span className="flex items-center gap-4 text-2xl">{icon}{label}</span><span className={`text-4xl ${cls}`}>{val}</span></div>
                ))}
              </div>
            )}
            <div className="flex flex-col sm:flex-row gap-6">
              <button onClick={()=>setScreen('home')} className="flex-1 bg-white text-[#156048] border-4 border-[#156048] font-black py-6 rounded-2xl hover:bg-[#fff5f7] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-3 text-2xl shadow-[6px_6px_0_0_#156048]">{Home&&<Home size={28}/>} Home</button>
              <button onClick={()=>setScreen('selectMode')} className="flex-1 bg-[#156048] text-white border-4 border-[#156048] font-black py-6 rounded-2xl hover:bg-[#0a3024] active:shadow-[0_0_0_0_#ffa1bb] active:translate-y-1 transition-all flex items-center justify-center gap-3 text-2xl shadow-[6px_6px_0_0_#ffa1bb]">{RefreshCcw&&<RefreshCcw size={28}/>} Change</button>
            </div>
            <ResultsList/>
          </div>
        )}

      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
