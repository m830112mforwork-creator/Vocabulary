<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPop | 雲端單字學習平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;padding:0;-webkit-font-smoothing:antialiased;user-select:none;font-family:'Nunito',sans-serif}

    /* ── Design tokens ── */
    :root{
      --yellow:#fef9c3;
      --yellow-mid:#fde68a;
      --yellow-dot:#fcd34d;
      --teal:#0d7a5f;
      --teal-dark:#065f46;
      --teal-light:#d1fae5;
      --coral:#f97316;
      --coral-dark:#c2410c;
      --white:#ffffff;
    }

    /* ── Background ── */
    .app-bg{
      background-color:#FFD000;
    }

    /* ── Header ── */
    .header{
      background:linear-gradient(135deg, #c8303d 0%, #FF6670 100%);
      box-shadow: 0 5px 0 #a0202c;
    }

    /* ── Animations ── */
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px) rotate(-3deg)}40%,80%{transform:translateX(6px) rotate(3deg)}}
    .anim-shake{animation:shake .42s ease-in-out}
    @keyframes popOut{0%{transform:scale(1)}40%{transform:scale(1.18) translateY(-6px);background:#4ade80;color:white;border-color:#16a34a;box-shadow:0 8px 0 #15803d}100%{transform:scale(1);background:#4ade80;color:white;border-color:#16a34a}}
    .anim-pop{animation:popOut .5s cubic-bezier(.36,.07,.19,.97) forwards}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .anim-slide{animation:fadeInUp .35s cubic-bezier(.16,1,.3,1)}
    @keyframes toastIn{0%{transform:translate(-50%,-18px);opacity:0}100%{transform:translate(-50%,0);opacity:1}}
    @keyframes floatScore{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}25%{opacity:1;transform:translate(-50%,-90%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-170%) scale(1)}}
    .anim-float{animation:floatScore 1.3s cubic-bezier(.16,1,.3,1) forwards;pointer-events:none}
    @keyframes quizCorrect{0%{transform:scale(1)}50%{transform:scale(1.06);background:#4ade80;color:white}100%{transform:scale(1);background:#4ade80;color:white}}
    .quiz-correct{animation:quizCorrect .5s ease forwards;border-color:#16a34a!important;box-shadow:0 6px 0 #15803d!important}
    .quiz-wrong{background:#fff1f2!important;color:#f43f5e!important;border-color:#fda4af!important;opacity:.5;pointer-events:none;text-decoration:line-through}

    /* ── Card hover ── */
    .card-lift{transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s ease}
    .card-lift:hover{transform:translateY(-5px)}
    .card-lift:active{transform:translateY(2px)}

    /* ── 3D button ── */
    .btn3d{transition:transform .1s ease,box-shadow .1s ease;cursor:pointer;border:none;outline:none}
    .btn3d:hover:not(:disabled){transform:translateY(-3px)}
    .btn3d:active:not(:disabled){transform:translateY(4px);box-shadow:none!important}
    .btn3d:disabled{opacity:.45;cursor:not-allowed}

    /* ── Letter tiles ── */
    .tile{
      background:linear-gradient(160deg,#f97316,#ea580c);
      box-shadow:0 7px 0 #9a3412,0 10px 18px rgba(0,0,0,.2);
      border:2px solid rgba(255,200,150,.35);
      border-radius:14px;
      transition:transform .09s,box-shadow .09s,filter .09s;
      cursor:pointer;
    }
    .tile:hover{transform:translateY(-6px) scale(1.08);filter:brightness(1.1);box-shadow:0 10px 0 #9a3412}
    .tile:active{transform:translateY(3px);box-shadow:0 2px 0 #9a3412}

    /* ── Slots ── */
    .slot-empty{background:rgba(15,60,40,.07);border:2.5px dashed rgba(15,60,40,.22);box-shadow:inset 0 3px 8px rgba(0,0,0,.06);border-radius:14px}
    .slot-active{border-color:var(--coral)!important;background:rgba(249,115,22,.12)!important;box-shadow:0 0 0 3px rgba(249,115,22,.25),inset 0 3px 8px rgba(249,115,22,.1)!important}
    .slot-filled{background:white;box-shadow:0 5px 0 #d1d5db,0 7px 14px rgba(0,0,0,.08);border:2.5px solid #e5e7eb;border-radius:14px}
    .slot-error{background:#fff1f2!important;border-color:#fda4af!important;box-shadow:0 5px 0 #fda4af!important;color:#f43f5e!important}

    /* ── Flip card ── */
    .perspective-1000{perspective:1000px}
    .preserve-3d{transform-style:preserve-3d}
    .backface-hidden{backface-visibility:hidden}
    .rotate-y-180{transform:rotateY(180deg)}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:var(--yellow-dot);border-radius:3px}

    textarea,input{user-select:text;font-family:'Nunito',sans-serif}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc,updateDoc}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const{useState,useEffect,useCallback,useRef}=React;

/* ──────────────────────────── Firebase ──────────────────────────── */
const firebaseConfig={
  apiKey:"AIzaSyDC-slEwIqWT6l8U8DubOChLIWQAOX_DKE",
  authDomain:"voc-test-e8783.firebaseapp.com",
  projectId:"voc-test-e8783",
  storageBucket:"voc-test-e8783.firebasestorage.app",
  messagingSenderId:"866197218174",
  appId:"1:866197218174:web:680acc4d9e643ec8c3c92f"
};
const APP_ID="voc-test-e8783";
const ADMIN_PWD="teacher123";

let app,auth,db;
try{app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app);}
catch(e){console.error(e);}

/* ──────────────────────────── SafeImage ──────────────────────────── */
const SafeImage=({src,word})=>{
  const[st,setSt]=useState('loading');
  const[cur,setCur]=useState(src);
  useEffect(()=>{setSt('loading');setCur(src);},[src]);
  const err=()=>{
    const fb=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    if(cur!==fb){setCur(fb);setSt('loading');}else setSt('error');
  };
  return(
    <div className="absolute inset-0 overflow-hidden" style={{background:'#fef9c3'}}>
      <div className="absolute inset-0 flex items-center justify-center text-6xl opacity-20">🖼️</div>
      {st==='loading'&&<div className="absolute inset-0 flex items-center justify-center bg-white/70 z-20"><div style={{width:36,height:36,border:'4px solid #fcd34d',borderTopColor:'#f97316',borderRadius:'50%',animation:'spin 1s linear infinite'}}/></div>}
      {cur&&st!=='error'&&<img src={cur} alt={word} draggable="false" className="w-full h-full object-cover absolute inset-0 z-10 transition-opacity duration-300" style={{opacity:st==='loading'?0:1}} onLoad={()=>setSt('ok')} onError={err}/>}
    </div>
  );
};

/* ──────────────────────────── useSounds ──────────────────────────── */
const useSounds=(muted)=>{
  const t=useCallback((f,type='sine',d=0.1,v=0.1)=>{
    if(muted)return;
    try{const C=window.AudioContext||window.webkitAudioContext;if(!C)return;
      const c=new C(),o=c.createOscillator(),g=c.createGain();
      o.type=type;o.frequency.setValueAtTime(f,c.currentTime);
      g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
      o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d);}catch{}
  },[muted]);
  return{
    pop:    useCallback(()=>t(660,'sine',.07),[t]),
    drop:   useCallback(()=>t(380,'triangle',.07),[t]),
    success:useCallback(()=>{t(523,'sine',.12);setTimeout(()=>t(659,'sine',.15),100);setTimeout(()=>t(784,'sine',.22),220);},[t]),
    error:  useCallback(()=>t(160,'sawtooth',.32,.09),[t]),
    over:   useCallback(()=>{t(200,'sawtooth',.32);setTimeout(()=>t(150,'sawtooth',.5),300);},[t]),
    speak:  useCallback((text)=>{if(muted)return;try{window.speechSynthesis?.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.82;window.speechSynthesis?.speak(u);}catch{}},[muted]),
  };
};

/* ──────────────────────────── App ──────────────────────────── */
const App=()=>{
  const[screen,setScreen]=useState('home');
  const[gameMode,setGameMode]=useState('spelling');
  const[user,setUser]=useState(null);
  const[cloudUnits,setCloudUnits]=useState([]);
  const[fbStatus,setFbStatus]=useState('loading');
  const[fbError,setFbError]=useState('');
  const[wordList,setWordList]=useState([]);
  const[currentUnitId,setCurrentUnitId]=useState(null);
  const[currentUnitName,setCurrentUnitName]=useState('');
  const[editPage,setEditPage]=useState(0);
  const[newUnitName,setNewUnitName]=useState('');
  const[adminUnit,setAdminUnit]=useState(null);
  const[adminDraft,setAdminDraft]=useState('');
  const[currentIndex,setCurrentIndex]=useState(0);
  const[shuffled,setShuffled]=useState([]);
  const[selected,setSelected]=useState([]);
  const[wrongSlots,setWrongSlots]=useState([]);
  const[spellingOk,setSpellingOk]=useState(false);
  const[quizOpts,setQuizOpts]=useState([]);
  const[wrongQuiz,setWrongQuiz]=useState([]);
  const[quizCorrect,setQuizCorrect]=useState(null);
  const[flipped,setFlipped]=useState(false);
  const[tfWord,setTfWord]=useState('');
  const[tfTrue,setTfTrue]=useState(true);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[maxCombo,setMaxCombo]=useState(0);
  const[lives,setLives]=useState(3);
  const[elapsed,setElapsed]=useState(0);
  const[floatPts,setFloatPts]=useState(null);
  const[history,setHistory]=useState([]);
  const[qErr,setQErr]=useState(0);
  const[muted,setMuted]=useState(false);
  const[toast,setToast]=useState(null);
  const[wrongFlash,setWrongFlash]=useState(false);
  const[transitioning,setTransitioning]=useState(false);

  const snd=useSounds(muted);
  const S=useRef({});
  S.current={screen,gameMode,wordList,currentIndex,combo,lives,transitioning,
              spellingOk,wrongSlots,selected,shuffled,history,qErr};
  const fetchedRef=useRef(new Set());
  const playingRef=useRef(false);
  const timerRef=useRef(null);
  const cur=wordList[currentIndex];

  const toast_=useCallback((msg,type='info')=>{setToast({msg,type});setTimeout(()=>setToast(null),3200);},[]);

  /* ── Firebase ── */
  useEffect(()=>{
    if(!auth){setFbStatus('error');setFbError('Firebase 未初始化');return;}
    signInAnonymously(auth).catch(e=>{setFbStatus('error');setFbError(e.message);});
    return onAuthStateChanged(auth,u=>{setUser(u);if(!u)setFbStatus('loading');});
  },[]);
  useEffect(()=>{
    if(!user||!db)return;
    const ref=collection(db,'artifacts',APP_ID,'public','data','units');
    return onSnapshot(ref,snap=>{
      const list=[];snap.forEach(d=>list.push({id:d.id,...d.data()}));
      list.sort((a,b)=>a.createdAt-b.createdAt);
      setCloudUnits(list);setFbStatus('ok');setFbError('');
    },err=>{setFbStatus('error');setFbError(err.message);});
  },[user]);

  /* ── Image fetch ── */
  const fetchImg=useCallback(async(idx,word)=>{
    if(fetchedRef.current.has(idx)||!word)return;
    fetchedRef.current.add(idx);
    let url=null;
    try{
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`);
      if(r.ok){const d=await r.json();url=d.originalimage?.source||d.thumbnail?.source||null;if(url)url=url.replace('http://','https://');}
    }catch{}
    if(!url)url=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    setWordList(prev=>{const n=[...prev];if(n[idx])n[idx]={...n[idx],image:url,hasFetched:true};return n;});
  },[]);
  useEffect(()=>{
    if(!wordList.length)return;
    [currentIndex,currentIndex+1,currentIndex+2].filter(i=>i<wordList.length)
      .forEach(i=>{if(!wordList[i]?.hasFetched)fetchImg(i,wordList[i].word);});
  },[currentIndex,wordList,fetchImg]);
  useEffect(()=>{
    if(screen!=='editImages')return;
    const s=editPage*20,e=Math.min(s+20,wordList.length);
    for(let i=s;i<e;i++){if(!wordList[i]?.hasFetched)fetchImg(i,wordList[i].word);}
  },[editPage,screen,wordList,fetchImg]);

  /* ── Timers ── */
  useEffect(()=>{playingRef.current=screen==='playing';},[screen]);
  useEffect(()=>{
    clearInterval(timerRef.current);
    if(screen==='playing'&&gameMode!=='flashcard')
      timerRef.current=setInterval(()=>setElapsed(t=>t+1),1000);
    return()=>clearInterval(timerRef.current);
  },[screen,gameMode]);

  /* ── Quiz options ── */
  const makeOpts=useCallback((correctWord,list)=>{
    const opts=[correctWord];
    const pool=list.filter(w=>w.word!==correctWord).map(w=>w.word).sort(()=>Math.random()-.5);
    for(let i=0;i<3&&i<pool.length;i++)opts.push(pool[i]);
    const fb=['apple','cat','dog','sun','moon','car','bird','fish'];let fi=0;
    while(opts.length<4){if(!opts.includes(fb[fi]))opts.push(fb[fi]);fi++;}
    return opts.sort(()=>Math.random()-.5);
  },[]);

  /* ── Init level ── */
  const initLevel=useCallback((wordObj,mode,list)=>{
    if(!wordObj)return;
    setSpellingOk(false);setFlipped(false);setWrongSlots([]);
    setWrongQuiz([]);setQuizCorrect(null);setWrongFlash(false);setTransitioning(false);setQErr(0);
    if(mode==='spelling'){
      let letters=wordObj.word.split('').map((c,id)=>({c,id})).sort(()=>Math.random()-.5);
      const allSame=wordObj.word.split('').every(c=>c===wordObj.word[0]);
      if(!allSame&&wordObj.word.length>1){
        while(letters.map(l=>l.c).join('')===wordObj.word)
          letters=wordObj.word.split('').map((c,id)=>({c,id})).sort(()=>Math.random()-.5);
      }
      setShuffled(letters);setSelected(new Array(wordObj.word.length).fill(null));
    }else if(mode==='quiz'||mode==='listening'){
      setQuizOpts(makeOpts(wordObj.word,list));
    }else if(mode==='truefalse'){
      const isTrue=Math.random()>0.5||list.length<2;
      setTfTrue(isTrue);
      if(isTrue){setTfWord(wordObj.word);}
      else{const others=list.filter(w=>w.word!==wordObj.word);setTfWord(others[Math.floor(Math.random()*others.length)].word);}
    }
    if(mode!=='flashcard'&&mode!=='truefalse')setTimeout(()=>{if(playingRef.current)snd.speak(wordObj.word);},350);
  },[makeOpts,snd]);

  /* ── Advance ── */
  const advance=useCallback((wList,idx,mode)=>{
    setTransitioning(true);
    setTimeout(()=>{
      if(!playingRef.current)return;
      if(idx+1<wList.length){setCurrentIndex(idx+1);initLevel(wList[idx+1],mode,wList);}
      else setScreen('finished');
    },1100);
  },[initLevel]);

  /* ── Correct ── */
  const onCorrect=useCallback((wList,idx,mode)=>{
    const{transitioning:tr,combo:c,qErr:qe,history:hist}=S.current;
    if(tr)return;
    snd.success();
    const nc=c+1,pts=10+nc*5;
    setScore(s=>s+pts);setCombo(nc);setMaxCombo(m=>Math.max(m,nc));
    setFloatPts({val:pts,id:Date.now()});
    setHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qe,status:'success'}]);
    advance(wList,idx,mode);
  },[snd,advance]);

  /* ── Wrong ── */
  const onWrong=useCallback((wList,idx)=>{
    if(S.current.transitioning)return;
    snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);setQErr(e=>e+1);
    setLives(prev=>{
      const next=prev-1;
      if(next<=0){
        const{qErr:qe,history:hist}=S.current;
        setHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qe+1,status:'failed'}]);
        setTimeout(()=>{snd.over();setScreen('gameover');},800);
      }
      return next;
    });
  },[snd]);

  /* ── Spelling check ── */
  useEffect(()=>{
    const{screen:sc,gameMode:gm,spellingOk:ok,wrongSlots:bad,transitioning:tr,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||gm!=='spelling'||ok||bad.length>0||tr)return;
    if(!selected.length||!selected.every(l=>l!==null))return;
    const target=wl[ci]?.word;if(!target)return;
    const spelled=selected.map(l=>l.c).join('');
    if(spelled===target){
      setSpellingOk(true);onCorrect(wl,ci,gm);
    }else{
      const badIdx=selected.map((l,i)=>(l&&l.c!==target[i])?i:-1).filter(i=>i!==-1);
      setWrongSlots(badIdx);snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);setQErr(e=>e+1);
      setLives(prev=>{
        const next=prev-1;
        if(next<=0){const{qErr:qe,history:hist}=S.current;setHistory([...hist,{word:target,mistakes:qe+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},900);return next;}
        setTimeout(()=>{
          setWrongSlots([]);
          setSelected(prevSel=>{
            const ret=[];
            const n2=prevSel.map((l,i)=>{if(badIdx.includes(i)&&l){ret.push(l);return null;}return l;});
            setShuffled(p=>[...p,...ret].sort(()=>Math.random()-.5));return n2;
          });
        },750);
        return next;
      });
    }
  },[selected]);

  const clickTile=useCallback((tile)=>{
    const{spellingOk:ok,transitioning:tr,wrongSlots:bad,selected:sel}=S.current;
    if(ok||tr||bad.length>0)return;
    const fi=sel.findIndex(l=>l===null);if(fi===-1)return;
    snd.pop();
    setSelected(prev=>{const n=[...prev];n[fi]=tile;return n;});
    setShuffled(prev=>prev.filter(t=>t.id!==tile.id));
  },[snd]);

  const unselectSlot=useCallback((letter,idx)=>{
    const{spellingOk:ok,transitioning:tr}=S.current;
    if(!letter||ok||tr)return;
    snd.drop();
    setSelected(prev=>{const n=[...prev];n[idx]=null;return n;});
    setShuffled(prev=>[...prev,letter]);
  },[snd]);

  const giveHint=useCallback(()=>{
    const{screen:sc,spellingOk:ok,gameMode:gm,selected:sel,shuffled:shuf,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||ok||gm!=='spelling')return;
    const target=wl[ci]?.word;if(!target)return;
    let ti=sel.findIndex((l,i)=>l===null||(l&&l.c!==target[i]));if(ti===-1)return;
    const cc=target[ti],curIn=sel[ti];
    let pool2=[...shuf];if(curIn)pool2.push(curIn);
    const fi=pool2.findIndex(t=>t.c===cc);if(fi===-1)return;
    const found=pool2[fi];pool2.splice(fi,1);
    snd.pop();setScore(s=>Math.max(0,s-5));setCombo(0);
    setShuffled(pool2);setSelected(prev=>{const n=[...prev];n[ti]=found;return n;});
  },[snd]);

  const onQuizSelect=useCallback((opt)=>{
    const{transitioning:tr,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(tr||wrongQuiz.includes(opt)||quizCorrect)return;
    const target=wl[ci]?.word;
    if(opt===target){setQuizCorrect(opt);onCorrect(wl,ci,gm);}
    else{
      snd.error();setCombo(0);setQErr(e=>e+1);
      setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);
      setWrongQuiz(prev=>[...prev,opt]);
      setLives(prev=>{const next=prev-1;if(next<=0){const{qErr:qe,history:hist}=S.current;setHistory([...hist,{word:target,mistakes:qe+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},800);}return next;});
    }
  },[wrongQuiz,quizCorrect,onCorrect,snd]);

  const onTFSelect=useCallback((choice)=>{
    const{transitioning:tr,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(tr)return;
    if(choice===tfTrue)onCorrect(wl,ci,gm);else onWrong(wl,ci);
  },[tfTrue,onCorrect,onWrong]);

  const handleFlip=useCallback(()=>{
    snd.pop();
    setFlipped(prev=>{if(!prev)setTimeout(()=>{if(playingRef.current)snd.speak(S.current.wordList[S.current.currentIndex]?.word);},150);return!prev;});
  },[snd]);

  const nextCard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci,history:hist}=S.current;
    setHistory([...hist,{word:wl[ci].word,translation:wl[ci].translation,status:'viewed'}]);
    if(ci+1<wl.length){snd.drop();setCurrentIndex(ci+1);initLevel(wl[ci+1],'flashcard',wl);}else setScreen('finished');
  },[snd,initLevel]);

  const prevCard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    if(ci>0){snd.drop();setCurrentIndex(ci-1);initLevel(wl[ci-1],'flashcard',wl);}
  },[snd,initLevel]);

  const shuffleCards=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    snd.pop();setFlipped(false);
    const c=wl[ci],others=wl.filter((_,i)=>i!==ci).sort(()=>Math.random()-.5);
    const nl=[c,...others];setWordList(nl);setCurrentIndex(0);initLevel(c,'flashcard',nl);
    toast_('🔀 Cards shuffled!','info');
  },[snd,initLevel,toast_]);

  const startGame=useCallback((mode,wList)=>{
    const list=wList||S.current.wordList;
    setGameMode(mode);setCurrentIndex(0);
    setScore(0);setCombo(0);setMaxCombo(0);setLives(3);setElapsed(0);
    setHistory([]);setTransitioning(false);
    initLevel(list[0],mode,list);setScreen('playing');
  },[initLevel]);

  const openUnit=useCallback((unit)=>{
    setCurrentUnitId(unit.id);setCurrentUnitName(unit.name);
    const list=unit.words.map(w=>({...w,hasFetched:!!w.image}));
    setWordList(list);fetchedRef.current.clear();setEditPage(0);setScreen('selectMode');
  },[]);

  /* ── Keyboard ── */
  useEffect(()=>{
    const handler=(e)=>{
      const{screen:sc,gameMode:gm,spellingOk:ok,transitioning:tr,selected:sel}=S.current;
      if(sc!=='playing')return;
      if(gm==='flashcard'){
        if(e.key===' '||e.key==='Enter'){e.preventDefault();handleFlip();}
        else if(e.key==='ArrowRight'){e.preventDefault();nextCard();}
        else if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
        return;
      }
      if((gm==='quiz'||gm==='listening')&&['1','2','3','4'].includes(e.key)){
        e.preventDefault();const opt=quizOpts[parseInt(e.key)-1];if(opt)onQuizSelect(opt);return;
      }
      if(gm==='truefalse'){
        if(e.key==='ArrowLeft'||e.key.toLowerCase()==='o'){e.preventDefault();onTFSelect(true);}
        else if(e.key==='ArrowRight'||e.key.toLowerCase()==='x'){e.preventDefault();onTFSelect(false);}
        return;
      }
      if(gm==='spelling'&&!ok&&!tr){
        if(e.key==='Backspace'){e.preventDefault();const last=sel.map((l,i)=>l?i:-1).filter(i=>i!==-1).pop();if(last!==undefined)unselectSlot(sel[last],last);return;}
        const key=e.key.toLowerCase();
        if(/^[a-z]$/.test(key)){
          setShuffled(prev=>{const found=prev.find(l=>l.c===key);if(!found)return prev;setSelected(ps=>{const fi=ps.findIndex(l=>l===null);if(fi===-1)return ps;snd.pop();const n=[...ps];n[fi]=found;return n;});return prev.filter(l=>l.id!==found.id);});
        }
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[quizOpts,handleFlip,nextCard,prevCard,onQuizSelect,onTFSelect,unselectSlot,snd]);

  /* ── Admin ── */
  const adminLogin=useCallback(()=>{
    const pwd=window.prompt('🔒 Teacher Password / 教師密碼：');
    if(pwd===ADMIN_PWD)setScreen('admin');
    else if(pwd!==null)toast_('❌ Wrong password!','error');
  },[toast_]);

  const adminUpload=useCallback(async(e)=>{
    if(!newUnitName.trim()){toast_('⚠️ Enter a unit name first!','error');e.target.value='';return;}
    const file=e.target.files[0];if(!file)return;
    let Lib=window.XLSX;
    if(!Lib){
      toast_('⏳ Loading Excel engine…','info');
      try{Lib=await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>res(window.XLSX);s.onerror=rej;document.head.appendChild(s);});}
      catch{toast_('❌ Engine load failed','error');e.target.value='';return;}
    }
    const reader=new FileReader();
    reader.onload=async(evt)=>{
      try{
        const wb=Lib.read(evt.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]];
        const data=Lib.utils.sheet_to_json(ws,{header:1});
        const words=data.filter(r=>r&&typeof r[0]==='string'&&r[0].trim())
          .map(r=>({word:r[0].trim().toLowerCase(),translation:r[1]?String(r[1]).trim():'',image:null,hasFetched:false}))
          .filter(item=>/^[a-zA-Z\s\-'']+$/.test(item.word));
        if(!words.length){toast_('❌ No valid words found!','error');return;}
        const uid='unit_'+Date.now();
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','units',uid),{name:newUnitName.trim(),words,createdAt:Date.now()});
        toast_(`✅ "${newUnitName.trim()}" uploaded!`,'info');setNewUnitName('');
      }catch(err){toast_('❌ '+err.message,'error');}
      e.target.value='';
    };
    reader.readAsArrayBuffer(file);
  },[newUnitName,toast_]);

  const openAdminEdit=useCallback((unit)=>{
    setAdminUnit(unit);
    setAdminDraft(unit.words.map(w=>w.translation?`${w.word}\t${w.translation}`:w.word).join('\n'));
    setScreen('adminEditUnit');
  },[]);

  const saveAdminEdit=useCallback(async()=>{
    if(!adminUnit||!db)return;
    const words=adminDraft.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
      const p=line.split(/\t/);return{word:p[0].trim().toLowerCase(),translation:(p[1]||'').trim(),image:null,hasFetched:false};
    }).filter(item=>/^[a-zA-Z\s\-'']+$/.test(item.word));
    if(!words.length){toast_('❌ No valid words','error');return;}
    try{
      await updateDoc(doc(db,'artifacts',APP_ID,'public','data','units',adminUnit.id),{words,name:adminUnit.name});
      toast_(`✅ "${adminUnit.name}" updated!`,'info');setScreen('admin');
    }catch(err){toast_('❌ '+err.message,'error');}
  },[adminUnit,adminDraft,toast_]);

  const deleteUnit=useCallback(async(unit)=>{
    if(!window.confirm(`Delete "${unit.name}"?`))return;
    try{await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','units',unit.id));toast_('🗑️ Deleted!','info');}
    catch{toast_('❌ Delete failed','error');}
  },[toast_]);

  const saveImages=useCallback(async()=>{
    if(!db||!currentUnitId){toast_('✅ Images updated','info');setScreen('selectMode');return;}
    try{await updateDoc(doc(db,'artifacts',APP_ID,'public','data','units',currentUnitId),{words:wordList});toast_('✅ Saved to cloud!','info');setScreen('selectMode');}
    catch{toast_('❌ Save failed (images may be too large)','error');}
  },[wordList,currentUnitId,toast_]);

  const handleCustomImage=useCallback((idx,e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(evt)=>{setWordList(prev=>{const n=[...prev];n[idx]={...n[idx],image:evt.target.result,hasFetched:true};return n;});snd.success();toast_('🖼️ Image replaced! Remember to save.','info');};
    reader.readAsDataURL(file);e.target.value='';
  },[snd,toast_]);

  /* ── Helpers ── */
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const firstEmpty=selected.findIndex(l=>l===null);

  const TEAL='#FF6670', TEAL_D='#c8303d', CORAL='#f97316', CORAL_D='#c2410c';

  /* ── Results ── */
  const Results=()=>{
    if(!history.length)return null;
    return(
      <div className="w-full mt-5 rounded-2xl max-h-60 overflow-y-auto text-left" style={{background:'rgba(255,255,255,.7)',border:'2px solid rgba(255,255,255,.9)',backdropFilter:'blur(8px)'}}>
        <div className="p-4 pb-2 font-extrabold text-slate-700 text-sm">📋 Results</div>
        <div className="flex flex-col gap-1.5 px-3 pb-3">
          {history.map((item,i)=>(
            <div key={i} className="flex justify-between items-center bg-white p-2.5 rounded-xl" style={{border:'1.5px solid #f3f4f6'}}>
              <div><span className="font-extrabold text-slate-800 text-sm">{item.word}</span>{item.translation&&<span className="ml-2 text-xs font-bold text-slate-400">{item.translation}</span>}</div>
              {gameMode==='flashcard'?<span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{background:'#dbeafe',color:'#1d4ed8'}}>Reviewed</span>
               :item.status==='failed'?<span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{background:'#fff1f2',color:'#f43f5e'}}>Failed ✗</span>
               :item.mistakes===0?<span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{background:'#dcfce7',color:'#15803d'}}>Perfect ✓</span>
               :<span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{background:'#fff7ed',color:'#c2410c'}}>{item.mistakes} mistake{item.mistakes>1?'s':''}</span>}
            </div>
          ))}
        </div>
      </div>
    );
  };

  /* ════════════════════════════════════════════
     RENDER
  ════════════════════════════════════════════ */
  return(
    <div className="app-bg min-h-screen overflow-x-hidden flex flex-col" style={{transition:'filter .3s',filter:wrongFlash?'brightness(.88)':'none'}}>

      {toast&&(

          <div className="px-6 py-3 rounded-2xl font-extrabold text-white text-sm flex items-center gap-2" style={{background:toast.type==='error'?'#f43f5e':'#0d7a5f',boxShadow:toast.type==='error'?'0 5px 0 #be123c':'0 5px 0 #065f46'}}>
            {toast.msg}
          </div>
        </div>
      )}

      {/* Float score */}
      {floatPts&&screen==='playing'&&(
        <div key={floatPts.id} className="fixed top-1/2 left-1/2 z-[100] anim-float pointer-events-none" style={{fontFamily:"'Fredoka One',cursive",fontSize:64,color:'#f97316',textShadow:'0 4px 12px rgba(0,0,0,.3)'}}>
          +{floatPts.val}
        </div>
      )}

      {/* ═══ HEADER ═══ */}
      <header className="header sticky top-0 z-40 text-white">
        <div className="px-4 py-3 flex justify-between items-center max-w-5xl mx-auto gap-3 flex-wrap">
          <button onClick={()=>setScreen('home')} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:40,height:40,borderRadius:12,background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📚</div>
            <span style={{fontFamily:"'Fredoka One',cursive",fontSize:26,color:'white',textShadow:'0 2px 0 rgba(0,0,0,.2)',letterSpacing:'-0.5px'}}>WordPop</span>
          </button>

          {screen==='playing'&&(
            <div className="flex items-center gap-2 flex-wrap justify-end">
              <span style={{background:'rgba(255,255,255,.18)',padding:'4px 12px',borderRadius:50,fontSize:13,fontWeight:800}}>{currentIndex+1}/{wordList.length}</span>

              {gameMode!=='flashcard'&&combo>=2&&<span style={{background:'#f97316',padding:'3px 10px',borderRadius:50,fontWeight:800,fontSize:12}}>🔥 ×{combo}</span>}
              {gameMode!=='flashcard'&&<span style={{fontSize:20}}>{[0,1,2].map(i=><span key={i} style={{opacity:i<lives?1:.2,filter:i<lives?'none':'grayscale(1)'}}>❤️</span>)}</span>}
              <button onClick={()=>setMuted(!muted)} className="btn3d" style={{background:muted?'#f43f5e':'rgba(255,255,255,.18)',border:'none',color:'white',padding:'7px 12px',borderRadius:12,fontWeight:800,fontSize:13,cursor:'pointer',boxShadow:muted?'0 4px 0 #be123c':'0 4px 0 rgba(0,0,0,.15)'}}>
                {muted?'🔇 Mute':'🔊 Sound'}
              </button>
              <button onClick={()=>setScreen('home')} className="btn3d" style={{background:'rgba(255,255,255,.18)',border:'none',color:'white',padding:'7px 14px',borderRadius:12,fontWeight:800,fontSize:13,cursor:'pointer',boxShadow:'0 4px 0 rgba(0,0,0,.15)'}}>
                🏠 Home
              </button>
            </div>
          )}
          {screen==='admin'&&<span style={{background:'rgba(255,255,255,.18)',padding:'6px 16px',borderRadius:50,fontWeight:800,fontSize:13}}>🔒 Teacher Mode · <button onClick={()=>setScreen('home')} style={{background:'none',border:'none',color:'white',fontWeight:800,cursor:'pointer',textDecoration:'underline'}}>Exit</button></span>}
          {screen==='adminEditUnit'&&<span style={{background:'rgba(255,255,255,.18)',padding:'6px 16px',borderRadius:50,fontWeight:800,fontSize:13}}>✏️ Editing · <button onClick={()=>setScreen('admin')} style={{background:'none',border:'none',color:'white',fontWeight:800,cursor:'pointer',textDecoration:'underline'}}>← Back</button></span>}
        </div>
        {screen==='playing'&&<div style={{height:5,background:'rgba(255,255,255,.15)'}}><div style={{height:'100%',background:'#fef08a',width:`${(currentIndex/wordList.length)*100}%`,transition:'width .5s'}}/></div>}
      </header>

      <main className="flex-1 max-w-5xl mx-auto p-4 w-full flex items-center justify-center min-h-[calc(100vh-72px)] relative z-10">

        {/* ═══ HOME ═══ */}
        {screen==='home'&&(
          <div className="w-full max-w-4xl flex flex-col items-center py-10 anim-slide">
            {/* Hero */}
            <div className="text-center mb-10">
              <div style={{width:88,height:88,margin:'0 auto 16px',borderRadius:24,background:'#FF6670',display:'flex',alignItems:'center',justifyContent:'center',fontSize:44,boxShadow:'0 8px 0 #c8303d',transform:'rotate(-3deg)'}}>📚</div>
              <h1 style={{fontFamily:"'Fredoka One',cursive",fontSize:52,color:'#c8303d',textShadow:'0 3px 0 rgba(0,0,0,.08)',margin:'0 0 6px',letterSpacing:'-1px'}}>WordPop</h1>
              <p style={{color:'#6b7280',fontWeight:800,fontSize:17}}>選擇一個單字庫，開始學習！🎮</p>
            </div>

            {/* Firebase status */}
            {fbStatus==='loading'&&<div style={{background:'white',border:`2px solid ${TEAL}`,borderRadius:16,padding:'12px 24px',marginBottom:20,fontWeight:800,color:TEAL,fontSize:14,display:'flex',alignItems:'center',gap:8}}>⏳ Connecting to cloud…</div>}
            {fbStatus==='error'&&(
              <div style={{background:'#fff1f2',border:'2px solid #fda4af',borderRadius:20,padding:20,marginBottom:20,maxWidth:520,width:'100%'}}>
                <p style={{fontWeight:900,color:'#f43f5e',marginBottom:8,fontSize:14}}>⚠️ Cloud connection failed</p>
                <p style={{color:'#f43f5e',fontSize:12,fontWeight:700,marginBottom:10}}>{fbError}</p>
                <div style={{background:'#fee2e2',borderRadius:12,padding:12,fontFamily:'monospace',fontSize:11,color:'#991b1b',lineHeight:1.8}}>
                  <b>Set Firestore rules:</b><br/>
                  {"rules_version = '2';"}<br/>
                  {"service cloud.firestore {"}<br/>
                  {"  match /databases/{database}/documents {"}<br/>
                  {"    match /artifacts/{appId}/public/{document=**} {"}<br/>
                  {"      allow read, write: if request.auth != null;"}<br/>
                  {"    }  }  }"}
                </div>
              </div>
            )}

            {/* Unit cards */}
            {fbStatus==='ok'&&cloudUnits.length===0&&(
              <div style={{background:'white',border:`3px solid ${TEAL}`,borderRadius:24,padding:40,textAlign:'center',maxWidth:400,marginBottom:24,boxShadow:`0 6px 0 ${TEAL}`}}>
                <div style={{fontSize:56,marginBottom:12}}>📭</div>
                <p style={{fontWeight:900,color:TEAL_D,fontSize:18,marginBottom:4}}>No word sets yet!</p>
                <p style={{color:'#9ca3af',fontWeight:700,fontSize:14}}>Ask your teacher to add some. / 請老師新增單字庫</p>
              </div>
            )}
            {cloudUnits.length>0&&(
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5 w-full px-2 mb-10">
                {cloudUnits.map((u,i)=>{
                  const palette=[
                    {bg:'#ecfdf5',border:TEAL,shadow:TEAL_D,icon:'#d1fae5',emoji:'📗'},
                    {bg:'#fffbeb',border:'#d97706',shadow:'#b45309',icon:'#fef3c7',emoji:'📙'},
                    {bg:'#eff6ff',border:'#2563eb',shadow:'#1d4ed8',icon:'#dbeafe',emoji:'📘'},
                    {bg:'#fdf4ff',border:'#9333ea',shadow:'#7e22ce',icon:'#f3e8ff',emoji:'📓'},
                    {bg:'#fff1f2',border:'#e11d48',shadow:'#be123c',icon:'#ffe4e6',emoji:'📕'},
                  ][i%5];
                  return(
                    <button key={u.id} onClick={()=>openUnit(u)} className="card-lift" style={{background:palette.bg,border:`3px solid ${palette.border}`,borderRadius:24,boxShadow:`0 8px 0 ${palette.shadow}`,padding:28,display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',cursor:'pointer'}}>
                      <div style={{width:72,height:72,borderRadius:20,background:palette.icon,display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,marginBottom:14,boxShadow:`0 4px 0 ${palette.shadow}`}}>
                        {palette.emoji}
                      </div>
                      <p style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:palette.shadow,marginBottom:6,wordBreak:'break-word'}}>{u.name}</p>
                      <span style={{background:palette.border,color:'white',borderRadius:50,padding:'3px 14px',fontWeight:900,fontSize:13}}>{u.words?.length||0} words</span>
                      <p style={{color:palette.border,fontWeight:800,fontSize:13,marginTop:12}}>Tap to start →</p>
                    </button>
                  );

              </div>
            )}

            <button onClick={adminLogin} className="btn3d" style={{background:TEAL_D,color:'white',border:`3px solid ${TEAL}`,borderRadius:20,padding:'14px 32px',fontWeight:900,fontSize:16,boxShadow:`0 7px 0 #022c22`,display:'flex',alignItems:'center',gap:8}}>

            </button>
          </div>

        {/* ═══ ADMIN ═══ */}
        {screen==='admin'&&(
          <div className="w-full max-w-4xl flex flex-col items-center py-8 anim-slide">

            {/* Upload */}
            <div style={{width:'100%',background:'white',border:`3px solid ${TEAL}`,borderRadius:24,padding:28,marginBottom:20,boxShadow:`0 6px 0 ${TEAL}`}}>
              <p style={{fontWeight:900,color:TEAL_D,fontSize:17,marginBottom:4}}>➕ Add New Word Set</p>
              <p style={{color:'#9ca3af',fontWeight:700,fontSize:13,marginBottom:16}}>Excel: Column A = English word, Column B = Translation (optional)</p>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <input type="text" placeholder="Unit name (e.g. Unit 1 – Animals)" value={newUnitName} onChange={e=>setNewUnitName(e.target.value)}
                  style={{flex:1,padding:'14px 18px',borderRadius:16,border:`2px solid #d1d5db`,fontWeight:800,fontSize:15,outline:'none',fontFamily:'Nunito',transition:'border-color .2s'}}
                  onFocus={e=>e.target.style.borderColor=TEAL} onBlur={e=>e.target.style.borderColor='#d1d5db'}/>
                <label className="btn3d" style={{background:CORAL,color:'white',borderRadius:16,padding:'14px 24px',fontWeight:900,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:`0 6px 0 ${CORAL_D}`,cursor:'pointer'}}>

                </label>

            {/* Manage */}
            <div style={{width:'100%',background:'white',border:`3px solid ${TEAL}`,borderRadius:24,padding:28,boxShadow:`0 6px 0 ${TEAL}`}}>
              <p style={{fontWeight:900,color:TEAL_D,fontSize:17,marginBottom:16}}>📂 Manage Word Sets</p>
              {cloudUnits.length===0?(
                <div style={{background:'#f9fafb',borderRadius:16,border:'2px dashed #d1d5db',padding:32,textAlign:'center',color:'#9ca3af',fontWeight:800}}>No word sets yet. Upload one above!</div>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {cloudUnits.map((u,i)=>(
                    <div key={u.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#f9fafb',borderRadius:16,padding:'14px 18px',border:'2px solid #f3f4f6'}}>
                      <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <div style={{width:36,height:36,borderRadius:50,background:TEAL,color:'white',fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>{i+1}</div>
                        <div>
                          <p style={{fontWeight:900,color:'#1f2937',marginBottom:2}}>{u.name}</p>
                          <span style={{background:'#d1fae5',color:TEAL_D,borderRadius:50,padding:'2px 10px',fontWeight:800,fontSize:12}}>{u.words?.length||0} words</span>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:8}}>
                        {[
                          {label:'👁️ Preview',bg:'#0d7a5f',shadow:'#065f46',action:()=>openUnit(u)},
                          {label:'✏️ Edit',bg:'#d97706',shadow:'#b45309',action:()=>openAdminEdit(u)},
                          {label:'🗑️ Delete',bg:'#f43f5e',shadow:'#be123c',action:()=>deleteUnit(u)},
                        ].map(b=>(
                          <button key={b.label} onClick={b.action} className="btn3d" style={{background:b.bg,color:'white',border:'none',borderRadius:12,padding:'8px 14px',fontWeight:800,fontSize:13,boxShadow:`0 4px 0 ${b.shadow}`}}>
                            {b.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ═══ ADMIN EDIT ═══ */}
        {screen==='adminEditUnit'&&adminUnit&&(
          <div className="w-full max-w-3xl flex flex-col items-center py-8 anim-slide">
            {[
              {label:'✏️ Unit Name / 單字庫名稱',content:<input type="text" value={adminUnit.name} onChange={e=>setAdminUnit({...adminUnit,name:e.target.value})} style={{width:'100%',marginTop:12,padding:'14px 18px',borderRadius:16,border:`2px solid #d1d5db`,fontWeight:800,fontSize:15,outline:'none',fontFamily:'Nunito',transition:'border-color .2s'}} onFocus={e=>e.target.style.borderColor=TEAL} onBlur={e=>e.target.style.borderColor='#d1d5db'}/>},
              {label:'📝 Word List / 單字清單',hint:'One word per line. Tab to add translation: elephant [Tab] 大象',
               content:<><textarea value={adminDraft} onChange={e=>setAdminDraft(e.target.value)}

        {/* ═══ GAME OVER ═══ */}
        {screen==='gameover'&&(
          <div className="anim-slide" style={{background:'rgba(15,23,42,.9)',backdropFilter:'blur(20px)',border:'4px solid rgba(255,255,255,.1)',borderRadius:40,padding:'40px 32px',textAlign:'center',maxWidth:480,width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.5)'}}>
            <div style={{fontSize:80,marginBottom:12}}>💔</div>
            <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:44,color:'#f87171',margin:'0 0 8px'}}>Game Over!</h2>
            <p style={{color:'#94a3b8',fontWeight:700,marginBottom:8}}>You ran out of hearts!</p>
            <p style={{color:'#94a3b8',fontWeight:700,marginBottom:28}}>Final Score: <span style={{color:'#fef08a',fontWeight:900,fontSize:28}}>{score}</span></p>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>setScreen('home')} className="btn3d" style={{flex:1,background:'white',color:'#1f2937',border:'none',borderRadius:18,padding:'16px',fontWeight:900,fontSize:16,boxShadow:'0 6px 0 #cbd5e1'}}>🏠 Home</button>
              <button onClick={()=>setScreen('selectMode')} className="btn3d" style={{flex:1,background:TEAL,color:'white',border:'none',borderRadius:18,padding:'16px',fontWeight:900,fontSize:16,boxShadow:`0 6px 0 ${TEAL_D}`}}>🔄 Try Again</button>
            </div>
            <Results/>
          </div>
        )}

        {/* ═══ FINISHED ═══ */}
        {screen==='finished'&&(
          <div className="anim-slide" style={{background:'white',border:'8px solid #fbbf24',borderRadius:40,padding:'40px 32px',textAlign:'center',maxWidth:480,width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.15),0 0 0 16px rgba(251,191,36,.15)'}}>
            <div style={{fontSize:88,marginBottom:8,filter:'drop-shadow(0 6px 12px rgba(245,158,11,.4))'}}>🏆</div>
            <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:44,background:'linear-gradient(135deg,#f97316,#fbbf24)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',margin:'0 0 6px'}}>You Did It!</h2>
            <p style={{color:'#9ca3af',fontWeight:700,marginBottom:24}}>大功告成！All words complete!</p>
            {gameMode!=='flashcard'&&(
              <div style={{background:'#f9fafb',borderRadius:20,padding:20,marginBottom:20,textAlign:'left',border:'2px solid #f3f4f6'}}>
                {[['⭐','Score / 分數',score,'#f97316'],['⏱️','Time / 時間',fmt(elapsed),'#2563eb'],['❤️','Hearts Left / 剩餘愛心',`×${lives}`,'#f43f5e']].map(([emoji,label,val,color],i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontWeight:800,color:'#374151',borderTop:i>0?'1.5px solid #f3f4f6':'none',paddingTop:i>0?12:0,marginTop:i>0?12:0}}>
                    <span style={{fontSize:14}}>{emoji} {label}</span>
                    <span style={{fontSize:20,color,fontWeight:900}}>{val}</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>setScreen('home')} className="btn3d" style={{flex:1,background:'white',color:'#374151',border:`3px solid #e5e7eb`,borderRadius:18,padding:'16px',fontWeight:900,fontSize:16,boxShadow:'0 6px 0 #e5e7eb'}}>🏠 Home</button>
              <button onClick={()=>setScreen('selectMode')} className="btn3d" style={{flex:1,background:TEAL,color:'white',border:'none',borderRadius:18,padding:'16px',fontWeight:900,fontSize:16,boxShadow:`0 6px 0 ${TEAL_D}`}}>🔄 Play Again</button>
            </div>
            <Results/>
          </div>
        )}

      </main>

      {/* Spin keyframe */}
      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
