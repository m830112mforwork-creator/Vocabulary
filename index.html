<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPop | 雲端單字學習平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;padding:0;-webkit-font-smoothing:antialiased;user-select:none;font-family:'Nunito',sans-serif}

    /* ── Animations ── */
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px) rotate(-4deg)}40%,80%{transform:translateX(6px) rotate(4deg)}}
    .anim-shake{animation:shake .42s ease-in-out}

    @keyframes popOut{0%{transform:scale(1)}40%{transform:scale(1.18) translateY(-6px);background-color:#4ade80;color:white;border-color:#16a34a;box-shadow:0 8px 0 #15803d}100%{transform:scale(1);background-color:#4ade80;color:white;border-color:#16a34a}}
    .anim-pop{animation:popOut .5s cubic-bezier(.36,.07,.19,.97) forwards}

    @keyframes toastIn{0%{transform:translate(-50%,-20px);opacity:0}100%{transform:translate(-50%,0);opacity:1}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    .anim-slide{animation:fadeInUp .38s cubic-bezier(.16,1,.3,1)}

    @keyframes quizCorrect{0%{transform:scale(1)}50%{transform:scale(1.06);background-color:#4ade80;color:white}100%{transform:scale(1);background-color:#4ade80;color:white}}
    .quiz-correct{animation:quizCorrect .5s ease forwards;border-color:#16a34a!important;box-shadow:0 6px 0 #15803d!important}
    .quiz-wrong{background-color:#fff1f2!important;color:#f43f5e!important;border-color:#fda4af!important;opacity:.55;pointer-events:none;text-decoration:line-through}

    @keyframes floatScore{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}25%{opacity:1;transform:translate(-50%,-85%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-160%) scale(1)}}
    .anim-float{animation:floatScore 1.3s cubic-bezier(.16,1,.3,1) forwards;pointer-events:none}

    @keyframes wiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes pulse-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(1.8);opacity:0}}
    @keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(60px) rotate(720deg);opacity:0}}

    .card-hover{transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s ease}
    .card-hover:hover{transform:translateY(-5px) scale(1.02)}
    .card-hover:active{transform:translateY(2px) scale(.98)}

    .btn-3d{transition:transform .1s ease,box-shadow .1s ease}
    .btn-3d:hover{transform:translateY(-3px)}
    .btn-3d:active{transform:translateY(3px);box-shadow:none!important}

    /* ── Fun background ── */
    .fun-bg{
      background-color:#fffbeb;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(251,191,36,.18) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(167,243,208,.22) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(196,181,253,.12) 0%, transparent 60%),
        radial-gradient(#fde68a 1.5px,transparent 1.5px),
        radial-gradient(#fde68a 1.5px,transparent 1.5px);
      background-size:100% 100%,100% 100%,100% 100%,28px 28px,28px 28px;
      background-position:0 0,0 0,0 0,0 0,14px 14px;
    }

    /* ── Mode card gradients ── */
    .mode-spelling  {background:linear-gradient(135deg,#dbeafe,#eff6ff);border-color:#93c5fd}
    .mode-quiz      {background:linear-gradient(135deg,#dcfce7,#f0fdf4);border-color:#86efac}
    .mode-listening {background:linear-gradient(135deg,#ede9fe,#f5f3ff);border-color:#c4b5fd}
    .mode-truefalse {background:linear-gradient(135deg,#ffe4e6,#fff1f2);border-color:#fda4af}
    .mode-flashcard {background:linear-gradient(135deg,#fef3c7,#fffbeb);border-color:#fcd34d}

    .mode-spelling:hover  {background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;border-color:#1d4ed8}
    .mode-quiz:hover      {background:linear-gradient(135deg,#22c55e,#15803d);color:white;border-color:#15803d}
    .mode-listening:hover {background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:white;border-color:#6d28d9}
    .mode-truefalse:hover {background:linear-gradient(135deg,#f43f5e,#be123c);color:white;border-color:#be123c}
    .mode-flashcard:hover {background:linear-gradient(135deg,#f59e0b,#b45309);color:white;border-color:#b45309}

    /* ── Letter tiles ── */
    .letter-tile{
      background:linear-gradient(170deg,#ff8c42 0%,#ff6b00 100%);
      box-shadow:0 7px 0 #c44f00,0 9px 20px rgba(0,0,0,.25);
      border:2px solid rgba(255,180,130,.4);
      transition:transform .1s,box-shadow .1s,filter .1s;
    }
    .letter-tile:hover{transform:translateY(-5px) scale(1.08);filter:brightness(1.1);box-shadow:0 10px 0 #c44f00,0 12px 24px rgba(0,0,0,.3)}
    .letter-tile:active{transform:translateY(3px);box-shadow:0 2px 0 #c44f00}

    .slot-filled{
      background:linear-gradient(170deg,#fff 0%,#f8fafc 100%);
      box-shadow:0 5px 0 #94a3b8,0 7px 14px rgba(0,0,0,.1);
      border:2px solid #e2e8f0;
    }
    .slot-empty{
      background:rgba(15,23,42,.06);
      border:2.5px dashed rgba(15,23,42,.18);
      box-shadow:inset 0 3px 8px rgba(0,0,0,.08);
    }
    .slot-active{
      border-color:#ff6b00!important;
      background:rgba(255,107,0,.1)!important;
      box-shadow:0 0 0 3px rgba(255,107,0,.2),inset 0 3px 8px rgba(255,107,0,.1)!important;
    }
    .slot-error{
      background:#fff1f2!important;
      border-color:#fda4af!important;
      box-shadow:0 5px 0 #fda4af!important;
      color:#f43f5e!important;
    }

    /* ── Header ── */
    .header-grad{
      background:linear-gradient(135deg,#ff6b00 0%,#ff8c00 50%,#ffb347 100%);
      box-shadow:0 5px 0 #c44f00;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#fcd34d;border-radius:3px}

    textarea,input[type=text],input[type=password]{user-select:text;font-family:'Nunito',sans-serif}

    /* ── Perspective ── */
    .perspective-1000{perspective:1000px}
    .transform-style-3d{transform-style:preserve-3d}
    .backface-hidden{backface-visibility:hidden}
    .rotate-y-180{transform:rotateY(180deg)}

    /* ── Floating decorations ── */
    @keyframes floatBubble{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-14px) rotate(8deg)}}
    .deco{position:absolute;pointer-events:none;animation:floatBubble 4s ease-in-out infinite}
    .deco:nth-child(2){animation-delay:.8s;animation-duration:5.5s}
    .deco:nth-child(3){animation-delay:1.6s;animation-duration:4.5s}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc,updateDoc}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const{useState,useEffect,useCallback,useRef}=React;
const{Upload,Volume2,RefreshCcw,Image:ImageIcon,Lightbulb,Star,Trophy,Heart,Clock,
  XCircle,CheckCircle,HelpCircle,Type,MousePointerClick,BookOpen,ArrowRight,ArrowLeft,
  Home,Shuffle,Edit3,ImagePlus,Ear,CheckSquare,VolumeX,Database,Settings,Trash2,
  Save,AlertTriangle,Plus,PenLine,Eye,Lock,ChevronRight,GraduationCap,Zap,
  SkipForward,RotateCcw,LogOut,Sparkles}=window.LucideReact||{};

// ── Firebase ──────────────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyDC-slEwIqWT6l8U8DubOChLIWQAOX_DKE",
  authDomain:"voc-test-e8783.firebaseapp.com",
  projectId:"voc-test-e8783",
  storageBucket:"voc-test-e8783.firebasestorage.app",
  messagingSenderId:"866197218174",
  appId:"1:866197218174:web:680acc4d9e643ec8c3c92f"
};
const APP_ID="voc-test-e8783";
const ADMIN_PWD="teacher123";

let app,auth,db;
try{app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app);}
catch(e){console.error("Firebase init failed:",e);}

// ── SafeImage ──────────────────────────────────────────────────────
const SafeImage=({src,word})=>{
  const[status,setStatus]=useState('loading');
  const[cur,setCur]=useState(src);
  useEffect(()=>{setStatus('loading');setCur(src);},[src]);
  const onError=()=>{
    const fb=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    if(cur!==fb){setCur(fb);setStatus('loading');}else setStatus('error');
  };
  return(
    <div className="absolute inset-0 w-full h-full bg-amber-50 overflow-hidden">
      <div className="absolute inset-0 flex items-center justify-center text-amber-200 z-0">{HelpCircle&&<HelpCircle size={52}/>}</div>
      {status==='loading'&&<div className="absolute inset-0 flex items-center justify-center bg-white/75 z-20"><div className="w-10 h-10 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"/></div>}
      {cur&&status!=='error'&&<img src={cur} alt={word} draggable="false" className={`w-full h-full object-cover absolute inset-0 z-10 transition-opacity duration-300 ${status==='loading'?'opacity-0':'opacity-100'}`} onLoad={()=>setStatus('ok')} onError={onError}/>}
    </div>
  );
};

// ── useSounds ──────────────────────────────────────────────────────
const useSounds=(isMuted)=>{
  const tone=useCallback((f,type='sine',dur=0.1,vol=0.1)=>{
    if(isMuted)return;
    try{const Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;
      const ctx=new Ctx(),osc=ctx.createOscillator(),g=ctx.createGain();
      osc.type=type;osc.frequency.setValueAtTime(f,ctx.currentTime);
      g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      osc.connect(g).connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+dur);}catch{}
  },[isMuted]);
  return{
    pop:    useCallback(()=>tone(660,'sine',.07),[tone]),
    drop:   useCallback(()=>tone(380,'triangle',.07),[tone]),
    success:useCallback(()=>{tone(523,'sine',.12);setTimeout(()=>tone(659,'sine',.15),100);setTimeout(()=>tone(784,'sine',.22),220);},[tone]),
    error:  useCallback(()=>tone(160,'sawtooth',.32,.09),[tone]),
    over:   useCallback(()=>{tone(200,'sawtooth',.32);setTimeout(()=>tone(150,'sawtooth',.5),300);},[tone]),
    speak:  useCallback((text)=>{if(isMuted)return;try{window.speechSynthesis?.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.82;window.speechSynthesis?.speak(u);}catch{}},[isMuted]),
  };
};

// ── Btn component: Chinese + English label ─────────────────────────
const Btn=({onClick,disabled,cls='',children,en,title})=>(
  <button onClick={onClick} disabled={disabled} className={cls} title={title}>
    {children}
    {en&&<span style={{display:'block',fontSize:'10px',fontWeight:700,opacity:.7,letterSpacing:'0.05em',marginTop:'1px',lineHeight:1}}>{en}</span>}
  </button>
);

// ── App ────────────────────────────────────────────────────────────
const App=()=>{
  const[screen,setScreen]=useState('home');
  const[gameMode,setGameMode]=useState('spelling');
  const[user,setUser]=useState(null);
  const[cloudUnits,setCloudUnits]=useState([]);
  const[fbStatus,setFbStatus]=useState('loading');
  const[fbError,setFbError]=useState('');
  const[wordList,setWordList]=useState([]);
  const[currentUnitId,setCurrentUnitId]=useState(null);
  const[currentUnitName,setCurrentUnitName]=useState('');
  const[editPage,setEditPage]=useState(0);
  const[newUnitName,setNewUnitName]=useState('');
  const[adminUnit,setAdminUnit]=useState(null);
  const[adminUnitDraft,setAdminUnitDraft]=useState('');
  const[currentIndex,setCurrentIndex]=useState(0);
  const[shuffledLetters,setShuffledLetters]=useState([]);
  const[selectedLetters,setSelectedLetters]=useState([]);
  const[wrongSlotIdxs,setWrongSlotIdxs]=useState([]);
  const[spellingOk,setSpellingOk]=useState(false);
  const[quizOptions,setQuizOptions]=useState([]);
  const[wrongQuizOpts,setWrongQuizOpts]=useState([]);
  const[quizCorrectOpt,setQuizCorrectOpt]=useState(null);
  const[isFlipped,setIsFlipped]=useState(false);
  const[tfWord,setTfWord]=useState('');
  const[tfIsTrue,setTfIsTrue]=useState(true);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[maxCombo,setMaxCombo]=useState(0);
  const[lives,setLives]=useState(3);
  const[timeElapsed,setTimeElapsed]=useState(0);
  const[floatPts,setFloatPts]=useState(null);
  const[gameHistory,setGameHistory]=useState([]);
  const[qMistakes,setQMistakes]=useState(0);
  const[isMuted,setIsMuted]=useState(false);
  const[toast,setToast]=useState(null);
  const[wrongFlash,setWrongFlash]=useState(false);
  const[isTransitioning,setIsTransitioning]=useState(false);

  const snd=useSounds(isMuted);
  const S=useRef({});
  S.current={screen,gameMode,wordList,currentIndex,combo,lives,isTransitioning,
              spellingOk,wrongSlotIdxs,selectedLetters,shuffledLetters,gameHistory,qMistakes};
  const fetchedRef=useRef(new Set());
  const playingRef=useRef(false);
  const globalTimerRef=useRef(null);
  const currentLevel=wordList[currentIndex];

  const showToast=useCallback((msg,type='info')=>{setToast({msg,type});setTimeout(()=>setToast(null),3200);},[]);

  // ── Firebase ──
  useEffect(()=>{
    if(!auth){setFbStatus('error');setFbError('Firebase 未初始化');return;}
    signInAnonymously(auth).catch(e=>{setFbStatus('error');setFbError('匿名登入失敗：'+e.message);});
    return onAuthStateChanged(auth,u=>{setUser(u);if(!u)setFbStatus('loading');});
  },[]);

  useEffect(()=>{
    if(!user||!db)return;
    const ref=collection(db,'artifacts',APP_ID,'public','data','units');
    return onSnapshot(ref,(snap)=>{
      const list=[];snap.forEach(d=>list.push({id:d.id,...d.data()}));
      list.sort((a,b)=>a.createdAt-b.createdAt);
      setCloudUnits(list);setFbStatus('ok');setFbError('');
    },(err)=>{setFbStatus('error');setFbError('讀取失敗：'+err.message);});
  },[user]);

  // ── Image fetch ──
  const fetchImage=useCallback(async(idx,word)=>{
    if(fetchedRef.current.has(idx)||!word)return;
    fetchedRef.current.add(idx);
    let url=null;
    try{
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`);
      if(r.ok){const d=await r.json();url=d.originalimage?.source||d.thumbnail?.source||null;if(url)url=url.replace('http://','https://');}
    }catch{}
    if(!url)url=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    setWordList(prev=>{const next=[...prev];if(next[idx])next[idx]={...next[idx],image:url,hasFetched:true};return next;});
  },[]);

  useEffect(()=>{
    if(!wordList.length)return;
    [currentIndex,currentIndex+1,currentIndex+2].filter(i=>i<wordList.length)
      .forEach(i=>{if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);});
  },[currentIndex,wordList,fetchImage]);

  useEffect(()=>{
    if(screen!=='editImages')return;
    const s=editPage*20,e=Math.min(s+20,wordList.length);
    for(let i=s;i<e;i++){if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);}
  },[editPage,screen,wordList,fetchImage]);

  useEffect(()=>{playingRef.current=screen==='playing';},[screen]);

  useEffect(()=>{
    clearInterval(globalTimerRef.current);
    if(screen==='playing'&&gameMode!=='flashcard')
      globalTimerRef.current=setInterval(()=>setTimeElapsed(t=>t+1),1000);
    return()=>clearInterval(globalTimerRef.current);
  },[screen,gameMode]);

  // ── Game logic ──
  const makeQuizOptions=useCallback((correctWord,list)=>{
    const opts=[correctWord];
    const pool=list.filter(w=>w.word!==correctWord).map(w=>w.word).sort(()=>Math.random()-.5);
    for(let i=0;i<3&&i<pool.length;i++)opts.push(pool[i]);
    const fb=['apple','cat','dog','sun','moon','car','bird','fish'];let fi=0;
    while(opts.length<4){if(!opts.includes(fb[fi]))opts.push(fb[fi]);fi++;}
    return opts.sort(()=>Math.random()-.5);
  },[]);

  const initLevel=useCallback((wordObj,mode,list)=>{
    if(!wordObj)return;
    setSpellingOk(false);setIsFlipped(false);setWrongSlotIdxs([]);
    setWrongQuizOpts([]);setQuizCorrectOpt(null);setWrongFlash(false);setIsTransitioning(false);setQMistakes(0);
    if(mode==='spelling'){
      let letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      const allSame=wordObj.word.split('').every(c=>c===wordObj.word[0]);
      if(!allSame&&wordObj.word.length>1){
        while(letters.map(l=>l.char).join('')===wordObj.word)
          letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      }
      setShuffledLetters(letters);setSelectedLetters(new Array(wordObj.word.length).fill(null));
    }else if(mode==='quiz'||mode==='listening'){
      setQuizOptions(makeQuizOptions(wordObj.word,list));
    }else if(mode==='truefalse'){
      const isTrue=Math.random()>0.5||list.length<2;
      setTfIsTrue(isTrue);
      if(isTrue){setTfWord(wordObj.word);}
      else{const others=list.filter(w=>w.word!==wordObj.word);setTfWord(others[Math.floor(Math.random()*others.length)].word);}
    }
    if(mode!=='flashcard'&&mode!=='truefalse')setTimeout(()=>{if(playingRef.current)snd.speak(wordObj.word);},350);
  },[makeQuizOptions,snd]);

  const advance=useCallback((wList,idx,mode)=>{
    setIsTransitioning(true);
    setTimeout(()=>{
      if(!playingRef.current)return;
      if(idx+1<wList.length){setCurrentIndex(idx+1);initLevel(wList[idx+1],mode,wList);}
      else setScreen('finished');
    },1100);
  },[initLevel]);

  const handleCorrect=useCallback((wList,idx,mode)=>{
    const{isTransitioning:trans,combo:c,qMistakes:qm,gameHistory:hist}=S.current;
    if(trans)return;
    snd.success();
    const newCombo=c+1,pts=10+newCombo*5;
    setScore(s=>s+pts);setCombo(newCombo);setMaxCombo(m=>Math.max(m,newCombo));
    setFloatPts({val:pts,id:Date.now()});
    setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm,status:'success'}]);
    advance(wList,idx,mode);
  },[snd,advance]);

  const handleWrong=useCallback((wList,idx)=>{
    if(S.current.isTransitioning)return;
    snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);setQMistakes(m=>m+1);
    setLives(prev=>{
      const next=prev-1;
      if(next<=0){
        const{qMistakes:qm,gameHistory:hist}=S.current;
        setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm+1,status:'failed'}]);
        setTimeout(()=>{snd.over();setScreen('gameover');},800);
      }
      return next;
    });
  },[snd]);

  useEffect(()=>{
    const{screen:sc,gameMode:gm,spellingOk:ok,wrongSlotIdxs:bad,isTransitioning:trans,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||gm!=='spelling'||ok||bad.length>0||trans)return;
    if(!selectedLetters.length||!selectedLetters.every(l=>l!==null))return;
    const target=wl[ci]?.word;if(!target)return;
    const spelled=selectedLetters.map(l=>l.char).join('');
    if(spelled===target){
      setSpellingOk(true);handleCorrect(wl,ci,gm);
    }else{
      const badIdxs=selectedLetters.map((l,i)=>(l&&l.char!==target[i])?i:-1).filter(i=>i!==-1);
      setWrongSlotIdxs(badIdxs);snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);setQMistakes(m=>m+1);
      setLives(prev=>{
        const next=prev-1;
        if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},900);return next;}
        setTimeout(()=>{
          setWrongSlotIdxs([]);
          setSelectedLetters(prevSel=>{
            const ret=[];
            const next2=prevSel.map((l,i)=>{if(badIdxs.includes(i)&&l){ret.push(l);return null;}return l;});
            setShuffledLetters(p=>[...p,...ret].sort(()=>Math.random()-.5));return next2;
          });
        },750);
        return next;
      });
    }
  },[selectedLetters]);

  const clickTile=useCallback((tile)=>{
    const{spellingOk:ok,isTransitioning:trans,wrongSlotIdxs:bad,selectedLetters:sel}=S.current;
    if(ok||trans||bad.length>0)return;
    const fi=sel.findIndex(l=>l===null);if(fi===-1)return;
    snd.pop();
    setSelectedLetters(prev=>{const n=[...prev];n[fi]=tile;return n;});
    setShuffledLetters(prev=>prev.filter(t=>t.id!==tile.id));
  },[snd]);

  const unselectSlot=useCallback((letter,idx)=>{
    const{spellingOk:ok,isTransitioning:trans}=S.current;
    if(!letter||ok||trans)return;
    snd.drop();
    setSelectedLetters(prev=>{const n=[...prev];n[idx]=null;return n;});
    setShuffledLetters(prev=>[...prev,letter]);
  },[snd]);

  const giveHint=useCallback(()=>{
    const{screen:sc,spellingOk:ok,gameMode:gm,selectedLetters:sel,shuffledLetters:shuf,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||ok||gm!=='spelling')return;
    const target=wl[ci]?.word;if(!target)return;
    let ti=sel.findIndex((l,i)=>l===null||(l&&l.char!==target[i]));if(ti===-1)return;
    const cc=target[ti],curIn=sel[ti];
    let pool2=[...shuf];if(curIn)pool2.push(curIn);
    const fi=pool2.findIndex(t=>t.char===cc);if(fi===-1)return;
    const found=pool2[fi];pool2.splice(fi,1);
    snd.pop();setScore(s=>Math.max(0,s-5));setCombo(0);
    setShuffledLetters(pool2);setSelectedLetters(prev=>{const n=[...prev];n[ti]=found;return n;});
  },[snd]);

  const handleQuizSelect=useCallback((opt)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans||wrongQuizOpts.includes(opt)||quizCorrectOpt)return;
    const target=wl[ci]?.word;
    if(opt===target){setQuizCorrectOpt(opt);handleCorrect(wl,ci,gm);}
    else{
      snd.error();setCombo(0);setQMistakes(m=>m+1);
      setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);
      setWrongQuizOpts(prev=>[...prev,opt]);
      setLives(prev=>{const next=prev-1;if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},800);}return next;});
    }
  },[wrongQuizOpts,quizCorrectOpt,handleCorrect,snd]);

  const handleTFSelect=useCallback((choice)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans)return;
    if(choice===tfIsTrue)handleCorrect(wl,ci,gm);else handleWrong(wl,ci);
  },[tfIsTrue,handleCorrect,handleWrong]);

  const handleFlip=useCallback(()=>{
    snd.pop();
    setIsFlipped(prev=>{if(!prev)setTimeout(()=>{if(playingRef.current)snd.speak(S.current.wordList[S.current.currentIndex]?.word);},150);return!prev;});
  },[snd]);

  const nextFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci,gameHistory:hist}=S.current;
    setGameHistory([...hist,{word:wl[ci].word,translation:wl[ci].translation,status:'viewed'}]);
    if(ci+1<wl.length){snd.drop();setCurrentIndex(ci+1);initLevel(wl[ci+1],'flashcard',wl);}else setScreen('finished');
  },[snd,initLevel]);

  const prevFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    if(ci>0){snd.drop();setCurrentIndex(ci-1);initLevel(wl[ci-1],'flashcard',wl);}
  },[snd,initLevel]);

  const shuffleFlashcards=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    snd.pop();setIsFlipped(false);
    const cur=wl[ci],others=wl.filter((_,i)=>i!==ci).sort(()=>Math.random()-.5);
    const nl=[cur,...others];setWordList(nl);setCurrentIndex(0);initLevel(cur,'flashcard',nl);
    showToast('🔀 Cards shuffled!','info');
  },[snd,initLevel,showToast]);

  const startGame=useCallback((mode,wList)=>{
    const list=wList||S.current.wordList;
    setGameMode(mode);setCurrentIndex(0);
    setScore(0);setCombo(0);setMaxCombo(0);setLives(3);setTimeElapsed(0);
    setGameHistory([]);setIsTransitioning(false);
    initLevel(list[0],mode,list);setScreen('playing');
  },[initLevel]);

  const openUnit=useCallback((unit)=>{
    setCurrentUnitId(unit.id);setCurrentUnitName(unit.name);
    const list=unit.words.map(w=>({...w,hasFetched:!!w.image}));
    setWordList(list);fetchedRef.current.clear();setEditPage(0);setScreen('selectMode');
  },[]);

  // ── Keyboard ──
  useEffect(()=>{
    const handler=(e)=>{
      const{screen:sc,gameMode:gm,spellingOk:ok,isTransitioning:trans,selectedLetters:sel}=S.current;
      if(sc!=='playing')return;
      if(gm==='flashcard'){
        if(e.key===' '||e.key==='Enter'){e.preventDefault();handleFlip();}
        else if(e.key==='ArrowRight'){e.preventDefault();nextFlashcard();}
        else if(e.key==='ArrowLeft'){e.preventDefault();prevFlashcard();}
        return;
      }
      if((gm==='quiz'||gm==='listening')&&['1','2','3','4'].includes(e.key)){
        e.preventDefault();const opt=quizOptions[parseInt(e.key)-1];if(opt)handleQuizSelect(opt);return;
      }
      if(gm==='truefalse'){
        if(e.key==='ArrowLeft'||e.key.toLowerCase()==='o'){e.preventDefault();handleTFSelect(true);}
        else if(e.key==='ArrowRight'||e.key.toLowerCase()==='x'){e.preventDefault();handleTFSelect(false);}
        return;
      }
      if(gm==='spelling'){
        if(ok||trans)return;
        if(e.key==='Backspace'){e.preventDefault();const last=sel.map((l,i)=>l?i:-1).filter(i=>i!==-1).pop();if(last!==undefined)unselectSlot(sel[last],last);return;}
        const key=e.key.toLowerCase();
        if(/^[a-z]$/.test(key)){
          setShuffledLetters(prev=>{const found=prev.find(l=>l.char===key);if(!found)return prev;setSelectedLetters(ps=>{const fi=ps.findIndex(l=>l===null);if(fi===-1)return ps;snd.pop();const n=[...ps];n[fi]=found;return n;});return prev.filter(l=>l.id!==found.id);});
        }
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[quizOptions,handleFlip,nextFlashcard,prevFlashcard,handleQuizSelect,handleTFSelect,unselectSlot,snd]);

  // ── Admin ──
  const handleAdminLogin=useCallback(()=>{
    const pwd=window.prompt('🔒 Teacher Password / 教師密碼：');
    if(pwd===ADMIN_PWD)setScreen('admin');
    else if(pwd!==null)showToast('❌ Wrong password!','error');
  },[showToast]);

  const handleAdminUpload=useCallback(async(e)=>{
    if(!newUnitName.trim()){showToast('⚠️ Please enter a unit name first!','error');e.target.value='';return;}
    const file=e.target.files[0];if(!file)return;
    let Lib=window.XLSX;
    if(!Lib){
      showToast('⏳ Loading Excel engine…','info');
      try{Lib=await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>res(window.XLSX);s.onerror=rej;document.head.appendChild(s);});}
      catch{showToast('❌ Failed to load engine','error');e.target.value='';return;}
    }
    const reader=new FileReader();
    reader.onload=async(evt)=>{
      try{
        const wb=Lib.read(evt.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]];
        const data=Lib.utils.sheet_to_json(ws,{header:1});
        const words=data.filter(r=>r&&typeof r[0]==='string'&&r[0].trim())
          .map(r=>({word:r[0].trim().toLowerCase(),translation:r[1]?String(r[1]).trim():'',image:null,hasFetched:false}))
          .filter(item=>/^[a-zA-Z\s\-'']+$/.test(item.word));
        if(!words.length){showToast('❌ No valid English words found!','error');return;}
        if(!db){showToast('❌ Firebase not connected','error');return;}
        const uid='unit_'+Date.now();
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','units',uid),{name:newUnitName.trim(),words,createdAt:Date.now()});
        showToast(`✅ "${newUnitName.trim()}" uploaded!`,'info');
        setNewUnitName('');
      }catch(err){showToast('❌ Error: '+err.message,'error');}
      e.target.value='';
    };
    reader.readAsArrayBuffer(file);
  },[newUnitName,showToast]);

  const openAdminEdit=useCallback((unit)=>{
    setAdminUnit(unit);
    const draft=unit.words.map(w=>w.translation?`${w.word}\t${w.translation}`:w.word).join('\n');
    setAdminUnitDraft(draft);setScreen('adminEditUnit');
  },[]);

  const saveAdminEdit=useCallback(async()=>{
    if(!adminUnit||!db)return;
    const lines=adminUnitDraft.split('\n').map(l=>l.trim()).filter(Boolean);
    const words=lines.map(line=>{
      const parts=line.split(/\t/);
      return{word:parts[0].trim().toLowerCase(),translation:(parts[1]||'').trim(),image:null,hasFetched:false};
    }).filter(item=>/^[a-zA-Z\s\-'']+$/.test(item.word));
    if(!words.length){showToast('❌ No valid words found','error');return;}
    try{
      await updateDoc(doc(db,'artifacts',APP_ID,'public','data','units',adminUnit.id),{words,name:adminUnit.name});
      showToast(`✅ "${adminUnit.name}" updated!`,'info');setScreen('admin');
    }catch(err){showToast('❌ Save failed: '+err.message,'error');}
  },[adminUnit,adminUnitDraft,showToast]);

  const deleteUnit=useCallback(async(unit)=>{
    if(!window.confirm(`Delete "${unit.name}"? This cannot be undone.`))return;
    try{await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','units',unit.id));showToast('🗑️ Deleted!','info');}
    catch(err){showToast('❌ Delete failed','error');}
  },[showToast]);

  const saveImages=useCallback(async()=>{
    if(!db||!currentUnitId){showToast('✅ Images updated (local)','info');setScreen('selectMode');return;}
    try{
      await updateDoc(doc(db,'artifacts',APP_ID,'public','data','units',currentUnitId),{words:wordList});
      showToast('✅ Images saved to cloud!','info');setScreen('selectMode');
    }catch(err){showToast('❌ Save failed - images may be too large','error');}
  },[wordList,currentUnitId,showToast]);

  const handleCustomImage=useCallback((idx,e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(evt)=>{
      setWordList(prev=>{const n=[...prev];n[idx]={...n[idx],image:evt.target.result,hasFetched:true};return n;});
      snd.success();showToast('🖼️ Image replaced! Remember to save.','info');
    };
    reader.readAsDataURL(file);e.target.value='';
  },[snd,showToast]);

  // ── Helpers ──
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const firstEmptyIdx=selectedLetters.findIndex(l=>l===null);

  const MODES=[
    {mode:'spelling',  zh:'拼字挑戰',en:'Spelling',     icon:Type,          cls:'mode-spelling', desc:'Arrange the letter tiles to spell the word!'},
    {mode:'quiz',      zh:'看圖選字',en:'Picture Quiz',  icon:MousePointerClick,cls:'mode-quiz',  desc:'Look at the picture and pick the right word!'},
    {mode:'listening', zh:'聽力特訓',en:'Listening',     icon:Ear,           cls:'mode-listening',desc:'Listen carefully and choose the correct word!'},
    {mode:'truefalse', zh:'是非大考驗',en:'True / False', icon:CheckSquare,  cls:'mode-truefalse',desc:'Does the word match the picture? True or False!'},
    {mode:'flashcard', zh:'單字閃卡',en:'Flashcards',    icon:BookOpen,      cls:'mode-flashcard',desc:'Flip cards to review words at your own pace.'},
  ];

  const ResultsList=()=>{
    if(!gameHistory.length)return null;
    return(
      <div className="w-full mt-5 rounded-2xl max-h-56 overflow-y-auto text-left" style={{background:'rgba(255,255,255,.65)',border:'2px solid rgba(255,255,255,.8)',backdropFilter:'blur(8px)'}}>
        <div className="p-4 pb-2 font-extrabold text-slate-700 text-sm flex items-center gap-1">📋 Results</div>
        <div className="flex flex-col gap-1.5 px-3 pb-3">
          {gameHistory.map((item,idx)=>(
            <div key={idx} className="flex justify-between items-center bg-white p-2.5 rounded-xl shadow-sm border border-slate-100">
              <div>
                <span className="font-extrabold text-slate-800 text-sm">{item.word}</span>
                {item.translation&&<span className="ml-2 text-xs font-bold text-slate-400">{item.translation}</span>}
              </div>
              {gameMode==='flashcard'?<span className="text-blue-500 text-xs font-bold bg-blue-50 px-2.5 py-1 rounded-full">Reviewed</span>
               :item.status==='failed'?<span className="text-rose-500 text-xs font-bold bg-rose-50 px-2.5 py-1 rounded-full">Failed ✗</span>
               :item.mistakes===0?<span className="text-emerald-600 text-xs font-bold bg-emerald-50 px-2.5 py-1 rounded-full">Perfect ✓</span>
               :<span className="text-orange-500 text-xs font-bold bg-orange-50 px-2.5 py-1 rounded-full">{item.mistakes} mistake{item.mistakes>1?'s':''}</span>}
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ══════════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════════
  return(
    <div className={`min-h-screen fun-bg text-slate-800 overflow-x-hidden flex flex-col relative ${wrongFlash?'brightness-90':''} transition-all`}
         style={{fontFamily:"'Nunito',sans-serif"}}>

      {/* Toast */}
      {toast&&(
        <div className="fixed top-4 left-1/2 z-[200] pointer-events-none" style={{transform:'translateX(-50%)',animation:'toastIn .3s ease-out'}}>
          <div className={`px-6 py-3 rounded-2xl shadow-2xl font-extrabold text-white flex items-center gap-2 text-sm ${toast.type==='error'?'bg-rose-500':'bg-slate-800'}`} style={{boxShadow:toast.type==='error'?'0 6px 0 #9f1239':'0 6px 0 #0f172a'}}>
            {toast.type==='error'?(XCircle&&<XCircle size={16}/>):(CheckCircle&&<CheckCircle size={16}/>)} {toast.msg}
          </div>
        </div>
      )}

      {/* Float score */}
      {floatPts&&screen==='playing'&&(
        <div key={floatPts.id} className="fixed top-1/2 left-1/2 z-[100] text-6xl font-black text-yellow-400 anim-float pointer-events-none" style={{fontFamily:"'Fredoka One',cursive",textShadow:'0 4px 12px rgba(0,0,0,.4)'}}>
          +{floatPts.val}
        </div>
      )}

      {/* ══ HEADER ══ */}
      <header className="header-grad sticky top-0 z-40 text-white">
        <div className="px-4 py-3 flex justify-between items-center max-w-5xl mx-auto gap-3 flex-wrap">

          {/* Logo */}
          <button onClick={()=>setScreen('home')} className="flex items-center gap-2 group" style={{background:'none',border:'none',cursor:'pointer'}}>
            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl font-black" style={{background:'rgba(255,255,255,.25)',fontFamily:"'Fredoka One',cursive"}}>W</div>
            <span className="text-2xl text-white" style={{fontFamily:"'Fredoka One',cursive",letterSpacing:'-0.5px',textShadow:'0 3px 0 rgba(0,0,0,.2)'}}>WordPop</span>
          </button>

          {/* Playing HUD */}
          {screen==='playing'&&(
            <div className="flex items-center gap-2 flex-wrap justify-end">
              {/* Progress pill */}
              <div className="text-xs font-extrabold bg-white/20 px-3 py-1.5 rounded-full">{currentIndex+1}/{wordList.length}</div>
              {/* Timer */}
              {gameMode!=='flashcard'&&<div className="text-xs font-extrabold font-mono bg-white/20 px-3 py-1.5 rounded-full flex items-center gap-1">{Clock&&<Clock size={12}/>}{fmt(timeElapsed)}</div>}
              {/* Score */}
              {gameMode!=='flashcard'&&(
                <div className="flex items-center gap-1 font-black text-yellow-200 text-base" style={{textShadow:'0 2px 0 rgba(0,0,0,.25)'}}>
                  {Star&&<Star size={16} className="fill-yellow-300 text-yellow-300"/>}{score}
                </div>
              )}
              {/* Combo badge */}
              {gameMode!=='flashcard'&&combo>=2&&(
                <div className="flex items-center gap-1 bg-yellow-400 text-yellow-900 text-xs font-extrabold px-2.5 py-1.5 rounded-full" style={{boxShadow:'0 3px 0 #b45309'}}>
                  {Zap&&<Zap size={12} className="fill-current"/>}×{combo}
                </div>
              )}
              {/* Lives */}
              {gameMode!=='flashcard'&&(
                <div className="flex gap-0.5">
                  {[0,1,2].map(i=><span key={i} className={`text-lg transition-all ${i<lives?'':'opacity-20 grayscale'}`}>❤️</span>)}
                </div>
              )}
              {/* Sound toggle */}
              <Btn onClick={()=>setIsMuted(!isMuted)} en={isMuted?'Unmute':'Mute'}
                cls={`flex flex-col items-center p-2 rounded-xl font-extrabold text-xs transition-all active:scale-95 ${isMuted?'bg-rose-500/80 text-white':'bg-white/20 hover:bg-white/30 text-white'}`}>
                {isMuted?(VolumeX&&<VolumeX size={16}/>):(Volume2&&<Volume2 size={16}/>)}
              </Btn>
              {/* Home */}
              <Btn onClick={()=>setScreen('home')} en="Home" cls="flex flex-col items-center p-2 rounded-xl bg-white/20 hover:bg-white/30 text-white font-extrabold text-xs transition-all active:scale-95">
                {Home&&<Home size={16}/>}
              </Btn>
            </div>
          )}

          {/* Admin badge */}
          {screen==='admin'&&<div className="text-xs font-extrabold bg-white/20 px-4 py-2 rounded-full flex items-center gap-1.5">{Lock&&<Lock size={12}/>}Teacher Mode <button className="underline opacity-70 hover:opacity-100 transition-opacity ml-1" onClick={()=>setScreen('home')}>Exit</button></div>}
          {screen==='adminEditUnit'&&<div className="text-xs font-extrabold bg-white/20 px-4 py-2 rounded-full flex items-center gap-1.5">{PenLine&&<PenLine size={12}/>}Editing Unit <button className="underline opacity-70 hover:opacity-100 ml-1" onClick={()=>setScreen('admin')}>← Back</button></div>}
        </div>

        {/* Progress bar */}
        {screen==='playing'&&(
          <div className="h-2 bg-orange-900/30">
            <div className="h-full transition-all duration-500" style={{width:`${(currentIndex/wordList.length)*100}%`,background:'linear-gradient(90deg,#fef08a,#fbbf24)'}}/>
          </div>
        )}
      </header>

      <main className="flex-1 max-w-5xl mx-auto p-4 w-full flex items-center justify-center min-h-[calc(100vh-72px)] relative z-10">

        {/* ════════════ HOME ════════════ */}
        {screen==='home'&&(
          <div className="w-full max-w-4xl mx-auto flex flex-col items-center py-10 anim-slide">

            {/* Hero */}
            <div className="text-center mb-10 relative">
              <div className="relative inline-block mb-4">
                <div className="w-24 h-24 mx-auto rounded-3xl flex items-center justify-center text-5xl" style={{background:'linear-gradient(135deg,#ff8c00,#ff6b00)',boxShadow:'0 8px 0 #c44f00,0 12px 24px rgba(196,79,0,.3)',fontFamily:"'Fredoka One',cursive",transform:'rotate(-2deg)'}}>📚</div>
              </div>
              <h1 className="text-5xl mb-2 text-slate-800" style={{fontFamily:"'Fredoka One',cursive",textShadow:'0 3px 0 rgba(0,0,0,.1)',letterSpacing:'-1px'}}>
                <span style={{color:'#ff6b00'}}>Word</span><span style={{color:'#0ea5e9'}}>Pop</span>
              </h1>
              <p className="text-slate-500 font-extrabold text-lg">Pick a word set and start playing! 🎮</p>
            </div>

            {/* Firebase status */}
            {fbStatus==='loading'&&(
              <div className="bg-white/80 border-2 border-amber-200 rounded-2xl px-6 py-4 flex items-center gap-3 mb-6 shadow-sm">
                <div className="w-5 h-5 rounded-full border-3 border-orange-400 border-t-transparent animate-spin" style={{borderWidth:'3px'}}/>
                <span className="font-extrabold text-slate-600 text-sm">Connecting to cloud… / 連線中…</span>
              </div>
            )}
            {fbStatus==='error'&&(
              <div className="bg-rose-50 border-2 border-rose-200 rounded-2xl p-5 mb-6 max-w-xl w-full">
                <p className="font-extrabold text-rose-600 mb-2 flex items-center gap-1.5 text-sm">{AlertTriangle&&<AlertTriangle size={16}/>}Cloud connection failed / 雲端連線失敗</p>
                <p className="text-rose-400 text-xs mb-3 font-bold">{fbError}</p>
                <div className="bg-rose-100 rounded-xl p-3 font-mono text-xs text-rose-800 leading-6">
                  <p className="font-extrabold mb-1">Set Firestore rules to:</p>
                  <p>{'rules_version = \'2\';'}</p>
                  <p>{'service cloud.firestore {'}</p>
                  <p className="ml-4">{'match /databases/{database}/documents {'}</p>
                  <p className="ml-8">{'match /artifacts/{appId}/public/{document=**} {'}</p>
                  <p className="ml-12">{'allow read, write: if request.auth != null;'}</p>
                  <p className="ml-8">{'}'}</p><p className="ml-4">{'}'}</p><p>{'}'}</p>
                </div>
              </div>
            )}

            {/* Unit cards */}
            {fbStatus==='ok'&&cloudUnits.length===0&&(
              <div className="bg-white/80 p-10 rounded-3xl text-center max-w-md mb-8 shadow-sm border-2 border-white">
                {Database&&<Database size={48} className="text-slate-300 mx-auto mb-4"/>}
                <p className="text-xl font-extrabold text-slate-600 mb-1">No word sets yet!</p>
                <p className="text-slate-400 font-bold text-sm">Ask your teacher to add some. / 請老師新增單字庫</p>
              </div>
            )}
            {cloudUnits.length>0&&(
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5 w-full px-2 mb-10">
                {cloudUnits.map((u,idx)=>{
                  const colors=[
                    {bg:'linear-gradient(135deg,#dbeafe,#eff6ff)',shadow:'#93c5fd',icon:'#3b82f6',iconBg:'#eff6ff'},
                    {bg:'linear-gradient(135deg,#dcfce7,#f0fdf4)',shadow:'#86efac',icon:'#22c55e',iconBg:'#f0fdf4'},
                    {bg:'linear-gradient(135deg,#fef3c7,#fffbeb)',shadow:'#fcd34d',icon:'#f59e0b',iconBg:'#fffbeb'},
                    {bg:'linear-gradient(135deg,#ede9fe,#f5f3ff)',shadow:'#c4b5fd',icon:'#8b5cf6',iconBg:'#f5f3ff'},
                    {bg:'linear-gradient(135deg,#ffe4e6,#fff1f2)',shadow:'#fda4af',icon:'#f43f5e',iconBg:'#fff1f2'},
                  ];
                  const c=colors[idx%colors.length];
                  return(
                    <button key={u.id} onClick={()=>openUnit(u)} className="card-hover rounded-3xl border-3 flex flex-col items-center text-center p-7 relative overflow-hidden"
                      style={{background:c.bg,border:`3px solid ${c.shadow}`,boxShadow:`0 7px 0 ${c.shadow},0 10px 24px rgba(0,0,0,.1)`}}>
                      <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-4 text-3xl" style={{background:c.iconBg,boxShadow:`0 4px 0 ${c.shadow}`}}>
                        📖
                      </div>
                      <h3 className="text-lg font-extrabold text-slate-800 mb-1 break-words w-full leading-snug">{u.name}</h3>

                        if(!filled){slotCls+=`slot-empty ${isActive?'slot-active':''} `;}
                        else{slotCls+=`slot-filled text-slate-800 ${isErr?'slot-error anim-shake ':spellingOk?'anim-pop ':' cursor-pointer hover:-translate-y-1 active:translate-y-1'}`;}
                        return <div key={i} className={slotCls} style={{width:'48px',height:'58px',fontFamily:"'Fredoka One',cursive"}} onClick={()=>filled&&!isErr&&!spellingOk&&unselectSlot(selectedLetters[i],i)}>{filled?selectedLetters[i].char.toLowerCase():''}</div>;
                      })}
                    </div>
                    <div className="flex flex-wrap justify-center gap-2 sm:gap-3 w-full min-h-[4rem]">
                      {shuffledLetters.map(l=>(
                        <button key={l.id} onClick={()=>clickTile(l)} disabled={spellingOk||isTransitioning}
                          className="letter-tile flex items-center justify-center select-none text-white disabled:opacity-40"
                          style={{width:'48px',height:'58px',borderRadius:'12px',fontFamily:"'Fredoka One',cursive",fontSize:'24px'}}>
                          {l.char.toLowerCase()}
                        </button>
                      ))}
                    </div>
                  </>
                )}

                {/* ── QUIZ / LISTENING ── */}
                {(gameMode==='quiz'||gameMode==='listening')&&(
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                    {quizOptions.map((opt,i)=>{
                      const isCorrect=opt===quizCorrectOpt,isWrong=wrongQuizOpts.includes(opt);
                      const colors=[
                        {bg:'linear-gradient(135deg,#dbeafe,#eff6ff)',shadow:'#93c5fd',text:'#1d4ed8'},
                        {bg:'linear-gradient(135deg,#dcfce7,#f0fdf4)',shadow:'#86efac',text:'#15803d'},
                        {bg:'linear-gradient(135deg,#fef3c7,#fffbeb)',shadow:'#fcd34d',text:'#b45309'},
                        {bg:'linear-gradient(135deg,#ede9fe,#f5f3ff)',shadow:'#c4b5fd',text:'#6d28d9'},
                      ];
                      const c=colors[i];
                      let style={background:c.bg,boxShadow:`0 6px 0 ${c.shadow}`,border:`3px solid ${c.shadow}`,color:c.text};
                      if(isCorrect)style={background:'linear-gradient(135deg,#dcfce7,#bbf7d0)',boxShadow:'0 6px 0 #16a34a',border:'3px solid #16a34a',color:'#15803d'};
                      else if(isWrong)style={background:'#fff1f2',boxShadow:'0 6px 0 #fda4af',border:'3px solid #fda4af',color:'#f43f5e',opacity:.5,pointerEvents:'none',textDecoration:'line-through'};
                      return(
                        <button key={i} disabled={isTransitioning||isWrong||!!quizCorrectOpt} onClick={()=>handleQuizSelect(opt)}
                          className={`w-full py-4 px-5 rounded-2xl font-extrabold text-xl lowercase text-center flex items-center justify-center gap-3 btn-3d ${isCorrect?'quiz-correct':isWrong?'quiz-wrong':''}`}
                          style={style}>
                          <span className="text-sm font-black bg-white/50 rounded-lg px-2.5 py-1 shrink-0" style={{fontFamily:"'Fredoka One',cursive"}}>{i+1}</span>
                          {opt}
                        </button>
                      );
                    })}
                  </div>
                )}

                {/* ── TRUE / FALSE ── */}
                {gameMode==='truefalse'&&(
                  <div className="flex flex-col items-center w-full">
                    <div className="bg-white px-10 py-5 rounded-3xl mb-6 text-center w-full max-w-sm" style={{boxShadow:'0 6px 0 #e2e8f0',border:'3px solid #e2e8f0'}}>
                      <h3 className="text-4xl sm:text-5xl font-black text-slate-800 lowercase" style={{fontFamily:"'Fredoka One',cursive"}}>{tfWord}</h3>
                    </div>
                    <div className="flex gap-4 w-full">
                      <Btn onClick={()=>handleTFSelect(true)} disabled={isTransitioning} en="Correct / 正確 (O)" cls="flex-1 flex flex-col items-center py-6 rounded-3xl font-extrabold text-white text-3xl btn-3d disabled:opacity-50" style={{background:'linear-gradient(135deg,#4ade80,#22c55e)',boxShadow:'0 8px 0 #15803d',border:'3px solid #16a34a'}}>
                        {CheckCircle&&<CheckCircle size={52}/>}
                      </Btn>
                      <Btn onClick={()=>handleTFSelect(false)} disabled={isTransitioning} en="Wrong / 錯誤 (X)" cls="flex-1 flex flex-col items-center py-6 rounded-3xl font-extrabold text-white text-3xl btn-3d disabled:opacity-50" style={{background:'linear-gradient(135deg,#fb7185,#f43f5e)',boxShadow:'0 8px 0 #be123c',border:'3px solid #f43f5e'}}>
                        {XCircle&&<XCircle size={52}/>}
                      </Btn>
                    </div>
                    <p className="text-slate-400 font-bold text-xs mt-3 flex items-center gap-1">⌨️ Press <kbd className="bg-white border border-slate-200 px-2 py-0.5 rounded font-sans">O</kbd> or <kbd className="bg-white border border-slate-200 px-2 py-0.5 rounded font-sans">X</kbd></p>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ════════════ GAME OVER ════════════ */}
        {screen==='gameover'&&(
          <div className="p-8 sm:p-12 rounded-[3rem] text-center w-full max-w-lg anim-slide" style={{background:'rgba(15,23,42,.88)',backdropFilter:'blur(20px)',border:'4px solid rgba(255,255,255,.08)',boxShadow:'0 20px 60px rgba(0,0,0,.5)'}}>
            <div className="text-6xl mb-4" style={{textShadow:'0 0 30px rgba(239,68,68,.6)'}}>💔</div>
            <h2 className="text-4xl text-rose-400 mb-2" style={{fontFamily:"'Fredoka One',cursive",letterSpacing:'-0.5px'}}>Game Over!</h2>
            <p className="text-slate-300 font-bold mb-2">You ran out of hearts!</p>
            <p className="text-slate-400 font-bold text-sm mb-8">Final Score: <span className="text-yellow-400 font-black text-2xl">{score}</span></p>
            <div className="flex flex-col sm:flex-row gap-3 justify-center">
              <Btn onClick={()=>setScreen('home')} en="Go Home" cls="flex-1 flex flex-col items-center justify-center py-4 rounded-2xl font-extrabold text-slate-800 text-base btn-3d" style={{background:'white',boxShadow:'0 6px 0 #cbd5e1'}}>
                {Home&&<Home size={22}/>}
              </Btn>
              <Btn onClick={()=>setScreen('selectMode')} en="Try Again" cls="flex-1 flex flex-col items-center justify-center py-4 rounded-2xl font-extrabold text-white text-base btn-3d" style={{background:'linear-gradient(135deg,#38bdf8,#0ea5e9)',boxShadow:'0 6px 0 #0369a1'}}>
                {RotateCcw&&<RotateCcw size={22}/>}
              </Btn>
            </div>
            <ResultsList/>
          </div>
        )}

        {/* ════════════ FINISHED ════════════ */}
        {screen==='finished'&&(
          <div className="p-8 sm:p-12 rounded-[3rem] text-center w-full max-w-lg anim-slide" style={{background:'white',border:'8px solid #fbbf24',boxShadow:'0 20px 60px rgba(0,0,0,.2),0 0 0 16px rgba(251,191,36,.15)'}}>
            <div className="text-7xl mb-4" style={{filter:'drop-shadow(0 6px 12px rgba(245,158,11,.4))'}}>🏆</div>
            <h2 className="text-4xl mb-2 text-transparent bg-clip-text" style={{fontFamily:"'Fredoka One',cursive",background:'linear-gradient(135deg,#f97316,#fbbf24)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>You Did It!</h2>
            <p className="text-slate-400 font-extrabold mb-6 text-sm">大功告成！All words complete!</p>

            {gameMode!=='flashcard'&&(
              <div className="bg-slate-50 rounded-2xl p-5 mb-6 text-left border-2 border-slate-100">
                {[
                  [Star&&<Star className="text-yellow-500 fill-yellow-400" size={18}/>,'Score','分數',score,'#ea580c'],
                  [Clock&&<Clock className="text-sky-500" size={18}/>,'Time','時間',fmt(timeElapsed),'#0284c7'],
                  [Heart&&<Heart className="text-rose-500 fill-rose-400" size={18}/>,'Hearts Left','剩餘愛心',`×${lives}`,'#e11d48'],
                ].map(([icon,en,zh,val,color],i)=>(
                  <div key={i} className={`flex justify-between items-center font-extrabold text-slate-700 ${i>0?'border-t border-slate-100 pt-3.5 mt-3.5':''}`}>
                    <span className="flex items-center gap-2 text-sm">{icon}{en}<span className="text-slate-400 text-xs">/ {zh}</span></span>
                    <span className="text-xl font-black" style={{color}}>{val}</span>
                  </div>
                ))}
              </div>
            )}
            <div className="flex gap-3">
              <Btn onClick={()=>setScreen('home')} en="Home" cls="flex-1 flex flex-col items-center justify-center py-4 rounded-2xl font-extrabold text-slate-600 text-base btn-3d" style={{background:'white',border:'3px solid #e2e8f0',boxShadow:'0 6px 0 #e2e8f0'}}>
                {Home&&<Home size={22}/>}
              </Btn>
              <Btn onClick={()=>setScreen('selectMode')} en="Play Again" cls="flex-1 flex flex-col items-center justify-center py-4 rounded-2xl font-extrabold text-white text-base btn-3d" style={{background:'linear-gradient(135deg,#38bdf8,#0ea5e9)',boxShadow:'0 6px 0 #0369a1'}}>
                {RefreshCcw&&<RefreshCcw size={22}/>}
              </Btn>
            </div>
            <ResultsList/>
          </div>
        )}

      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
