<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPop Spelling Adventure | A Plus 兒童英語</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
  <style>
    body { margin:0; padding:0; -webkit-font-smoothing:antialiased; user-select:none; background-color: #f0f9ff; }
    
    /* 活潑的點點背景 */
    .kids-bg {
      background-color: #f0f9ff; /* sky-50 */
      background-image: radial-gradient(#bae6fd 3px, transparent 3px), radial-gradient(#bae6fd 3px, transparent 3px);
      background-size: 32px 32px;
      background-position: 0 0, 16px 16px;
    }

    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px) rotate(-3deg)} 40%,80%{transform:translateX(5px) rotate(3deg)} }
    .anim-shake { animation:shake .4s ease-in-out }
    
    @keyframes popOut { 0%{transform:scale(1)} 50%{transform:scale(1.15) translateY(-5px); background-color:#4ade80; color:white; border-color:#22c55e} 100%{transform:scale(1); background-color:#4ade80; color:white; border-color:#22c55e} }
    .anim-pop { animation:popOut .5s ease-in-out forwards }
    
    @keyframes slideUp { 0%{transform:translate(-50%,20px); opacity:0} 100%{transform:translate(-50%,0); opacity:1} }
    @keyframes fadeInUp { from{opacity:0; transform:translateY(18px)} to{opacity:1; transform:translateY(0)} }
    .anim-slide { animation:fadeInUp .35s cubic-bezier(.16,1,.3,1) }
    
    @keyframes quizCorrect { 0%{transform:scale(1)} 50%{transform:scale(1.05); background-color:#4ade80; color:white} 100%{transform:scale(1); background-color:#4ade80; color:white} }
    .quiz-correct { animation:quizCorrect .5s ease forwards; border-color:#16a34a!important; box-shadow: 0 6px 0 0 #16a34a !important; }
    
    .quiz-wrong { background-color:#fecaca!important; color:#ef4444!important; border-color:#f87171!important; opacity:0.65; pointer-events:none; text-decoration:line-through; box-shadow: none !important; transform: translateY(6px); }
    
    @keyframes floatUp { 0%{opacity:1; transform:translate(-50%,-50%) scale(.5)} 20%{opacity:1; transform:translate(-50%,-80%) scale(1.2)} 100%{opacity:0; transform:translate(-50%,-150%) scale(1)} }
    .anim-float-up { animation:floatUp 1.2s cubic-bezier(.16,1,.3,1) forwards; pointer-events:none }
    
    .perspective-1000 { perspective:1000px }
    .transform-style-3d { transform-style:preserve-3d }
    .backface-hidden { backface-visibility:hidden }
    .rotate-y-180 { transform:rotateY(180deg) }
    
    ::-webkit-scrollbar { width:8px }
    ::-webkit-scrollbar-track { background:transparent }
    ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:4px }
    textarea { user-select:text }
    input[type=text] { user-select:text }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc,updateDoc}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const{useState,useEffect,useCallback,useRef}=React;
const{Upload,Volume2,RefreshCcw,Image:ImageIcon,Lightbulb,Star,Trophy,Heart,Clock,
  XCircle,CheckCircle,HelpCircle,Type,MousePointerClick,BookOpen,ArrowRight,ArrowLeft,
  Home,Shuffle,Edit3,ImagePlus,Ear,CheckSquare,VolumeX,Database,Settings,Trash2,
  Save,AlertTriangle,Plus,PenLine,Eye,Lock,ChevronRight,GraduationCap,LogOut}=window.LucideReact||{};

const firebaseConfig={
  apiKey:"AIzaSyDC-slEwIqWT6l8U8DubOChLIWQAOX_DKE",
  authDomain:"voc-test-e8783.firebaseapp.com",
  projectId:"voc-test-e8783",
  storageBucket:"voc-test-e8783.firebasestorage.app",
  messagingSenderId:"866197218174",
  appId:"1:866197218174:web:680acc4d9e643ec8c3c92f"
};
const APP_ID="voc-test-e8783";

let app,auth,db;
try{app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app);}
catch(e){console.error("Firebase init failed:",e);}

const SafeImage=({src,word})=>{
  const[status,setStatus]=useState('loading');
  const[cur,setCur]=useState(src);
  useEffect(()=>{setStatus('loading');setCur(src);},[src]);
  const onError=()=>{
    const fb=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    if(cur!==fb){setCur(fb);setStatus('loading');}else setStatus('error');
  };
  return(
    <div className="absolute inset-0 w-full h-full bg-slate-100 overflow-hidden rounded-2xl border-4 border-slate-200">
      <div className="absolute inset-0 flex items-center justify-center text-slate-300 z-0">{HelpCircle&&<HelpCircle size={64}/>}</div>
      {status==='loading'&&<div className="absolute inset-0 flex items-center justify-center bg-white/70 z-20"><div className="w-10 h-10 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin"/></div>}
      {cur&&status!=='error'&&<img src={cur} alt={word} draggable="false" className={`w-full h-full object-cover absolute inset-0 z-10 transition-opacity duration-300 ${status==='loading'?'opacity-0':'opacity-100'}`} onLoad={()=>setStatus('ok')} onError={onError}/>}
    </div>
  );
};

const useSounds=(isMuted)=>{
  const tone=useCallback((f,type='sine',dur=0.1,vol=0.1)=>{
    if(isMuted)return;
    try{const Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;
      const ctx=new Ctx(),osc=ctx.createOscillator(),g=ctx.createGain();
      osc.type=type;osc.frequency.setValueAtTime(f,ctx.currentTime);
      g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      osc.connect(g).connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+dur);}catch{}
  },[isMuted]);
  return{
    pop:  useCallback(()=>tone(600,'sine',.06),[tone]),
    drop:   useCallback(()=>tone(380,'triangle',.06),[tone]),
    success:useCallback(()=>{tone(523,'sine',.12);setTimeout(()=>tone(659,'sine',.15),100);setTimeout(()=>tone(784,'sine',.2),220);},[tone]),
    error:  useCallback(()=>tone(160,'sawtooth',.3,.09),[tone]),
    over:   useCallback(()=>{tone(200,'sawtooth',.3);setTimeout(()=>tone(150,'sawtooth',.5),300);},[tone]),
    speak:  useCallback((text)=>{if(isMuted)return;try{window.speechSynthesis?.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;window.speechSynthesis?.speak(u);}catch{}},[isMuted]),
  };
};

const App=()=>{
  const[screen,setScreen]=useState('home');
  const[gameMode,setGameMode]=useState('spelling');
  const[user,setUser]=useState(null);
  const[cloudUnits,setCloudUnits]=useState([]);
  const[wordList,setWordList]=useState([]);
  const[currentUnitId,setCurrentUnitId]=useState(null);
  const[currentUnitName,setCurrentUnitName]=useState('');
  const[editPage,setEditPage]=useState(0);
  const[newUnitName,setNewUnitName]=useState('');
  const[adminUnit,setAdminUnit]=useState(null);
  const[adminUnitDraft,setAdminUnitDraft]=useState('');
  const[currentIndex,setCurrentIndex]=useState(0);
  const[shuffledLetters,setShuffledLetters]=useState([]);
  const[selectedLetters,setSelectedLetters]=useState([]);
  const[wrongSlotIdxs,setWrongSlotIdxs]=useState([]);
  const[spellingOk,setSpellingOk]=useState(false);
  const[quizOptions,setQuizOptions]=useState([]);
  const[wrongQuizOpts,setWrongQuizOpts]=useState([]);
  const[quizCorrectOpt,setQuizCorrectOpt]=useState(null);
  const[isFlipped,setIsFlipped]=useState(false);
  const[tfWord,setTfWord]=useState('');
  const[tfIsTrue,setTfIsTrue]=useState(true);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[maxCombo,setMaxCombo]=useState(0);
  const[lives,setLives]=useState(3);
  const[timeElapsed,setTimeElapsed]=useState(0);
  const[floatPts,setFloatPts]=useState(null);
  const[gameHistory,setGameHistory]=useState([]);
  const[qMistakes,setQMistakes]=useState(0);
  const[isMuted,setIsMuted]=useState(false);
  const[toast,setToast]=useState(null);
  const[wrongFlash,setWrongFlash]=useState(false);
  const[isTransitioning,setIsTransitioning]=useState(false);

  const snd=useSounds(isMuted);
  const S=useRef({});
  S.current={screen,gameMode,wordList,currentIndex,combo,lives,isTransitioning,
              spellingOk,wrongSlotIdxs,selectedLetters,shuffledLetters,gameHistory,qMistakes};
  const fetchedRef=useRef(new Set());
  const playingRef=useRef(false);
  const globalTimerRef=useRef(null);
  const currentLevel=wordList[currentIndex];

  const showToast=useCallback((msg,type='info')=>{setToast({msg,type});setTimeout(()=>setToast(null),3200);},[]);

  useEffect(()=>{
    if(!auth)return;
    signInAnonymously(auth).catch(console.error);
    return onAuthStateChanged(auth,setUser);
  },[]);

  useEffect(()=>{
    if(!user||!db)return;
    const ref=collection(db,'artifacts',APP_ID,'public','data','units');
    return onSnapshot(ref,(snap)=>{
      const list=[];
      snap.forEach(d=>list.push({id:d.id,...d.data()}));
      list.sort((a,b)=>a.createdAt-b.createdAt);
      setCloudUnits(list);
    },console.error);
  },[user]);

  const fetchImage=useCallback(async(idx,word)=>{
    if(fetchedRef.current.has(idx)||!word)return;
    fetchedRef.current.add(idx);
    let url=null;
    try{
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`);
      if(r.ok){const d=await r.json();url=d.originalimage?.source||d.thumbnail?.source||null;if(url)url=url.replace('http://','https://');}
    }catch{}
    if(!url)url=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    setWordList(prev=>{const next=[...prev];if(next[idx])next[idx]={...next[idx],image:url,hasFetched:true};return next;});
  },[]);

  useEffect(()=>{
    if(!wordList.length)return;
    [currentIndex,currentIndex+1,currentIndex+2].filter(i=>i<wordList.length)
      .forEach(i=>{if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);});
  },[currentIndex,wordList,fetchImage]);

  useEffect(()=>{
    if(screen!=='editImages')return;
    const s=editPage*20,e=Math.min(s+20,wordList.length);
    for(let i=s;i<e;i++){if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);}
  },[editPage,screen,wordList,fetchImage]);

  useEffect(()=>{playingRef.current=screen==='playing';},[screen]);

  useEffect(()=>{
    clearInterval(globalTimerRef.current);
    if(screen==='playing'&&gameMode!=='flashcard')
      globalTimerRef.current=setInterval(()=>setTimeElapsed(t=>t+1),1000);
    return()=>clearInterval(globalTimerRef.current);
  },[screen,gameMode]);

  const makeQuizOptions=useCallback((correctWord,list)=>{
    const opts=[correctWord];
    const pool=list.filter(w=>w.word!==correctWord).map(w=>w.word).sort(()=>Math.random()-.5);
    for(let i=0;i<3&&i<pool.length;i++)opts.push(pool[i]);
    const fb=['apple','cat','dog','sun','moon','car','bird','fish'];let fi=0;
    while(opts.length<4){if(!opts.includes(fb[fi]))opts.push(fb[fi]);fi++;}
    return opts.sort(()=>Math.random()-.5);
  },[]);

  const initLevel=useCallback((wordObj,mode,list)=>{
    if(!wordObj)return;
    setSpellingOk(false);setIsFlipped(false);setWrongSlotIdxs([]);
    setWrongQuizOpts([]);setQuizCorrectOpt(null);setWrongFlash(false);setIsTransitioning(false);
    setQMistakes(0);
    if(mode==='spelling'){
      let letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      const allSame=wordObj.word.split('').every(c=>c===wordObj.word[0]);
      if(!allSame&&wordObj.word.length>1){
        while(letters.map(l=>l.char).join('')===wordObj.word)
          letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      }
      setShuffledLetters(letters);setSelectedLetters(new Array(wordObj.word.length).fill(null));
    }else if(mode==='quiz'||mode==='listening'){
      setQuizOptions(makeQuizOptions(wordObj.word,list));
    }else if(mode==='truefalse'){
      const isTrue=Math.random()>0.5||list.length<2;
      setTfIsTrue(isTrue);
      if(isTrue){setTfWord(wordObj.word);}
      else{const others=list.filter(w=>w.word!==wordObj.word);setTfWord(others[Math.floor(Math.random()*others.length)].word);}
    }
    if(mode!=='flashcard'&&mode!=='truefalse')setTimeout(()=>{if(playingRef.current)snd.speak(wordObj.word);},350);
  },[makeQuizOptions,snd]);

  const advance=useCallback((wList,idx,mode)=>{
    setIsTransitioning(true);
    setTimeout(()=>{
      if(!playingRef.current)return;
      if(idx+1<wList.length){setCurrentIndex(idx+1);initLevel(wList[idx+1],mode,wList);}
      else setScreen('finished');
    },1100);
  },[initLevel]);

  const handleCorrect=useCallback((wList,idx,mode)=>{
    const{isTransitioning:trans,combo:c,qMistakes:qm,gameHistory:hist}=S.current;
    if(trans)return;
    snd.success();
    const newCombo=c+1,pts=10+newCombo*5;
    setScore(s=>s+pts);setCombo(newCombo);setMaxCombo(m=>Math.max(m,newCombo));
    setFloatPts({val:pts,id:Date.now()});
    setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm,status:'success'}]);
    advance(wList,idx,mode);
  },[snd,advance]);

  const handleWrong=useCallback((wList,idx)=>{
    if(S.current.isTransitioning)return;
    snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);
    setQMistakes(m=>m+1);
    setLives(prev=>{
      const next=prev-1;
      if(next<=0){
        const{qMistakes:qm,gameHistory:hist}=S.current;
        setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm+1,status:'failed'}]);
        setTimeout(()=>{snd.over();setScreen('gameover');},800);
      }
      return next;
    });
  },[snd]);

  useEffect(()=>{
    const{screen:sc,gameMode:gm,spellingOk:ok,wrongSlotIdxs:bad,isTransitioning:trans,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||gm!=='spelling'||ok||bad.length>0||trans)return;
    if(!selectedLetters.length||!selectedLetters.every(l=>l!==null))return;
    const target=wl[ci]?.word;if(!target)return;
    const spelled=selectedLetters.map(l=>l.char).join('');
    if(spelled===target){
      setSpellingOk(true);handleCorrect(wl,ci,gm);
    }else{
      const badIdxs=selectedLetters.map((l,i)=>(l&&l.char!==target[i])?i:-1).filter(i=>i!==-1);
      setWrongSlotIdxs(badIdxs);snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);
      setQMistakes(m=>m+1);
      setLives(prev=>{
        const next=prev-1;
        if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},900);return next;}
        setTimeout(()=>{
          setWrongSlotIdxs([]);
          setSelectedLetters(prevSel=>{
            const ret=[];
            const next2=prevSel.map((l,i)=>{if(badIdxs.includes(i)&&l){ret.push(l);return null;}return l;});
            setShuffledLetters(p=>[...p,...ret].sort(()=>Math.random()-.5));return next2;
          });
        },750);
        return next;
      });
    }
  },[selectedLetters]);

  const clickTile=useCallback((tile)=>{
    const{spellingOk:ok,isTransitioning:trans,wrongSlotIdxs:bad,selectedLetters:sel}=S.current;
    if(ok||trans||bad.length>0)return;
    const fi=sel.findIndex(l=>l===null);if(fi===-1)return;
    snd.pop();
    setSelectedLetters(prev=>{const n=[...prev];n[fi]=tile;return n;});
    setShuffledLetters(prev=>prev.filter(t=>t.id!==tile.id));
  },[snd]);

  const unselectSlot=useCallback((letter,idx)=>{
    const{spellingOk:ok,isTransitioning:trans}=S.current;
    if(!letter||ok||trans)return;
    snd.drop();
    setSelectedLetters(prev=>{const n=[...prev];n[idx]=null;return n;});
    setShuffledLetters(prev=>[...prev,letter]);
  },[snd]);

  const giveHint=useCallback(()=>{
    const{screen:sc,spellingOk:ok,gameMode:gm,selectedLetters:sel,shuffledLetters:shuf,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||ok||gm!=='spelling')return;
    const target=wl[ci]?.word;if(!target)return;
    let ti=sel.findIndex((l,i)=>l===null||(l&&l.char!==target[i]));if(ti===-1)return;
    const cc=target[ti],curIn=sel[ti];
    let pool2=[...shuf];if(curIn)pool2.push(curIn);
    const fi=pool2.findIndex(t=>t.char===cc);if(fi===-1)return;
    const found=pool2[fi];pool2.splice(fi,1);
    snd.pop();setScore(s=>Math.max(0,s-5));setCombo(0);
    setShuffledLetters(pool2);setSelectedLetters(prev=>{const n=[...prev];n[ti]=found;return n;});
  },[snd]);

  const handleQuizSelect=useCallback((opt)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans||wrongQuizOpts.includes(opt)||quizCorrectOpt)return;
    const target=wl[ci]?.word;
    if(opt===target){setQuizCorrectOpt(opt);handleCorrect(wl,ci,gm);}
    else{
      snd.error();setCombo(0);setQMistakes(m=>m+1);
      setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);
      setWrongQuizOpts(prev=>[...prev,opt]);
      setLives(prev=>{const next=prev-1;if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},800);}return next;});
    }
  },[wrongQuizOpts,quizCorrectOpt,handleCorrect,snd]);

  const handleTFSelect=useCallback((choice)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans)return;
    if(choice===tfIsTrue)handleCorrect(wl,ci,gm);else handleWrong(wl,ci);
  },[tfIsTrue,handleCorrect,handleWrong]);

  const handleFlip=useCallback(()=>{
    snd.pop();
    setIsFlipped(prev=>{if(!prev)setTimeout(()=>{if(playingRef.current)snd.speak(S.current.wordList[S.current.currentIndex]?.word);},150);return!prev;});
  },[snd]);

  const nextFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci,gameHistory:hist}=S.current;
    setGameHistory([...hist,{word:wl[ci].word,translation:wl[ci].translation,status:'viewed'}]);
    if(ci+1<wl.length){snd.drop();setCurrentIndex(ci+1);initLevel(wl[ci+1],'flashcard',wl);}else setScreen('finished');
  },[snd,initLevel]);

  const prevFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    if(ci>0){snd.drop();setCurrentIndex(ci-1);initLevel(wl[ci-1],'flashcard',wl);}
  },[snd,initLevel]);

  const shuffleFlashcards=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    snd.pop();setIsFlipped(false);
    const cur=wl[ci],others=wl.filter((_,i)=>i!==ci).sort(()=>Math.random()-.5);
    const nl=[cur,...others];setWordList(nl);setCurrentIndex(0);initLevel(cur,'flashcard',nl);
    showToast('已重新洗牌 Shuffle!','info');
  },[snd,initLevel,showToast]);

  const startGame=useCallback((mode,wList)=>{
    const list=wList||S.current.wordList;
    setGameMode(mode);setCurrentIndex(0);
    setScore(0);setCombo(0);setMaxCombo(m=>Math.max(0, 0));setLives(3);setTimeElapsed(0);
    setGameHistory([]);setIsTransitioning(false);
    initLevel(list[0],mode,list);setScreen('playing');
  },[initLevel]);

  const openUnit=useCallback((unit)=>{
    setCurrentUnitId(unit.id);setCurrentUnitName(unit.name);
    const list=unit.words.map(w=>({...w,hasFetched:!!w.image}));
    setWordList(list);fetchedRef.current.clear();setEditPage(0);setScreen('selectMode');
  },[]);

  useEffect(()=>{
    const handler=(e)=>{
      const{screen:sc,gameMode:gm,spellingOk:ok,isTransitioning:trans,selectedLetters:sel}=S.current;
      if(sc!=='playing')return;
      if(gm==='flashcard'){
        if(e.key===' '||e.key==='Enter'){e.preventDefault();handleFlip();}
        else if(e.key==='ArrowRight'){e.preventDefault();nextFlashcard();}
        else if(e.key==='ArrowLeft'){e.preventDefault();prevFlashcard();}
        return;
      }
      if((gm==='quiz'||gm==='listening')&&['1','2','3','4'].includes(e.key)){
        e.preventDefault();const opt=quizOptions[parseInt(e.key)-1];if(opt)handleQuizSelect(opt);return;
      }
      if(gm==='truefalse'){
        if(e.key==='ArrowLeft'||e.key.toLowerCase()==='o'){e.preventDefault();handleTFSelect(true);}
        else if(e.key==='ArrowRight'||e.key.toLowerCase()==='x'){e.preventDefault();handleTFSelect(false);}
        return;
      }
      if(gm==='spelling'){
        if(ok||trans)return;
        if(e.key==='Backspace'){e.preventDefault();const last=sel.map((l,i)=>l?i:-1).filter(i=>i!==-1).pop();if(last!==undefined)unselectSlot(sel[last],last);return;}
        const key=e.key.toLowerCase();
        if(/^[a-z]$/.test(key)){
          setShuffledLetters(prev=>{const found=prev.find(l=>l.char===key);if(!found)return prev;setSelectedLetters(ps=>{const fi=ps.findIndex(l=>l===null);if(fi===-1)return ps;snd.pop();const n=[...ps];n[fi]=found;return n;});return prev.filter(l=>l.id!==found.id);});
        }
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[quizOptions,handleFlip,nextFlashcard,prevFlashcard,handleQuizSelect,handleTFSelect,unselectSlot,snd]);

  const handleAdminLogin=useCallback(()=>{

                {mode:'spelling',label:'Spelling 拼字',icon:Type, colorClass:'bg-sky-400 text-white border-sky-600', shadowClass:'shadow-[0_8px_0_0_#0284c7]', hoverBorder:'hover:border-b-4 active:border-b-0', desc:'字母積木，動手拼回來！'},
                {mode:'quiz',label:'Quiz 看圖選字',icon:MousePointerClick, colorClass:'bg-pink-400 text-white border-pink-600', shadowClass:'shadow-[0_8px_0_0_#db2777]', hoverBorder:'hover:border-b-4 active:border-b-0', desc:'經典選擇，考驗反應！'},
                {mode:'listening',label:'Listen 聽力',icon:Ear, colorClass:'bg-violet-400 text-white border-violet-600', shadowClass:'shadow-[0_8px_0_0_#7c3aed]', hoverBorder:'hover:border-b-4 active:border-b-0', desc:'隱藏圖片，專注聽發音！'},
                {mode:'truefalse',label:'T/F 是非大考驗',icon:CheckSquare, colorClass:'bg-orange-400 text-white border-orange-600', shadowClass:'shadow-[0_8px_0_0_#ea580c]', hoverBorder:'hover:border-b-4 active:border-b-0', desc:'圖文配對正確嗎？'},
                {mode:'flashcard',label:'Cards 單字閃卡',icon:BookOpen, colorClass:'bg-emerald-400 text-white border-emerald-600', shadowClass:'shadow-[0_8px_0_0_#059669]', hoverBorder:'hover:border-b-4 active:border-b-0', desc:'3D 翻轉閃卡，輕鬆複習。'},
              ].map(({mode,label,icon:Icon,colorClass,shadowClass,hoverBorder,desc})=>(
                <button key={mode} onClick={()=>startGame(mode)} className={`p-8 rounded-[2rem] border-4 border-b-8 transition-all flex flex-col items-center group relative overflow-hidden active:translate-y-2 hover:translate-y-1 ${colorClass} ${shadowClass} ${mode==='flashcard'||mode==='truefalse'?'sm:col-span-2 lg:col-span-1':''}`}>
                  <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-white opacity-10 rounded-full group-hover:scale-150 transition-transform"></div>
                  <div className="p-4 bg-white/20 rounded-3xl mb-5 border-4 border-white/30 backdrop-blur-sm">
                    {Icon&&<Icon size={48} className="text-white"/>}
                  </div>
                  <h3 className="text-2xl font-black text-white mb-2 tracking-wide z-10 relative">{label}</h3>
                  <p className="text-white/90 font-bold text-sm text-center leading-relaxed z-10 relative bg-black/10 px-4 py-2 rounded-xl">{desc}</p>
                </button>
              ))}
            </div>

            <div className="flex flex-col sm:flex-row gap-5 mt-10 w-full max-w-lg px-2">
              <button onClick={()=>setScreen('home')} className="flex-1 flex items-center justify-center gap-2 bg-white text-slate-600 border-4 border-slate-200 border-b-8 shadow-sm hover:translate-y-1 hover:border-b-4 active:translate-y-2 active:border-b-0 transition-all px-6 py-5 rounded-2xl font-black text-lg">
                {Home&&<Home size={22}/>} Back 返回
              </button>
              <button onClick={()=>setScreen('editImages')} className="flex-1 flex items-center justify-center gap-2 bg-yellow-300 text-yellow-900 border-4 border-yellow-500 border-b-8 shadow-[0_2px_0_0_#eab308] hover:translate-y-1 hover:border-b-4 active:translate-y-2 active:border-b-0 transition-all px-6 py-5 rounded-2xl font-black text-lg">
                {ImagePlus&&<ImagePlus size={22}/>} Images 自訂圖片
              </button>
            </div>
          </div>
        )}

        {/* ════════════ EDIT IMAGES ════════════ */}
        {screen==='editImages'&&(
          <div className="w-full max-w-6xl flex flex-col items-center anim-slide py-4">
            <div className="w-full flex justify-between items-center mb-6 bg-white p-6 px-8 rounded-3xl border-4 border-slate-200 shadow-[0_6px_0_0_#cbd5e1] flex-wrap gap-4">
              <div>
                <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3">{ImagePlus&&<ImagePlus size={28} className="text-blue-500"/>} Custom Images 自訂圖片</h2>
                <p className="text-slate-500 font-bold mt-2 text-sm bg-slate-100 px-3 py-1 rounded-md inline-block border-2 border-slate-200">更新圖片後請按「儲存 Save」按鈕</p>
              </div>
              <div className="flex gap-4">
                <button onClick={()=>setScreen('selectMode')} className="bg-slate-100 text-slate-600 border-b-4 border-slate-300 hover:bg-slate-200 active:border-b-0 active:translate-y-1 transition-all px-6 py-3 rounded-xl font-black">Cancel</button>
                <button onClick={saveImages} className="bg-green-500 text-white border-b-4 border-green-700 hover:bg-green-400 active:border-b-0 active:translate-y-1 transition-all px-8 py-3 rounded-xl font-black flex items-center gap-2 text-lg">{Save&&<Save size={20}/>} Save</button>
              </div>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 w-full">
              {wordList.slice(editPage*20,(editPage+1)*20).map((item,i)=>{
                const ai=editPage*20+i;
                return(
                  <div key={ai} className="bg-white p-4 rounded-[2rem] border-4 border-slate-200 shadow-sm hover:shadow-[0_6px_0_0_#cbd5e1] hover:-translate-y-1 transition-all flex flex-col items-center">
                    <div className="w-full aspect-square bg-slate-50 rounded-2xl mb-4 relative overflow-hidden border-4 border-slate-200">
                      {item.hasFetched?<SafeImage src={item.image} word={item.word}/>:<div className="absolute inset-0 flex items-center justify-center"><div className="w-8 h-8 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin"/></div>}
                    </div>
                    <h3 className="font-black text-slate-800 text-lg truncate w-full text-center mb-1">{item.word}</h3>
                    {item.translation&&<p className="text-sm text-slate-500 font-bold bg-slate-100 px-3 py-1 rounded-lg border-2 border-slate-200 truncate w-full text-center mb-3">{item.translation}</p>}
                    <label className="cursor-pointer mt-auto w-full bg-yellow-300 text-yellow-900 border-b-4 border-yellow-500 py-3 rounded-xl text-sm font-black text-center hover:bg-yellow-200 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2 uppercase">
                      {Upload&&<Upload size={18}/>} REPLACE
                      <input type="file" accept="image/*" className="hidden" onChange={e=>handleCustomImage(ai,e)}/>
                    </label>
                  </div>
                );
              })}
            </div>
            {wordList.length>20&&(
              <div className="flex gap-4 items-center mt-8 bg-white px-8 py-4 rounded-2xl border-4 border-slate-200 shadow-[0_6px_0_0_#cbd5e1] font-black text-slate-600 text-lg">
                <button onClick={()=>setEditPage(p=>Math.max(0,p-1))} disabled={editPage===0} className="p-3 bg-slate-100 rounded-xl border-b-4 border-slate-300 disabled:opacity-30 disabled:border-none disabled:translate-y-1 active:border-b-0 active:translate-y-1 transition-all">{ArrowLeft&&<ArrowLeft size={24}/>}</button>
                <span className="min-w-[100px] text-center">Page {editPage+1} / {Math.ceil(wordList.length/20)}</span>
                <button onClick={()=>setEditPage(p=>Math.min(Math.ceil(wordList.length/20)-1,p+1))} disabled={editPage===Math.ceil(wordList.length/20)-1} className="p-3 bg-slate-100 rounded-xl border-b-4 border-slate-300 disabled:opacity-30 disabled:border-none disabled:translate-y-1 active:border-b-0 active:translate-y-1 transition-all">{ArrowRight&&<ArrowRight size={24}/>}</button>
              </div>
            )}
          </div>
        )}

        {/* ════════════ PLAYING ════════════ */}
        {screen==='playing'&&currentLevel&&(
          <div className="flex flex-col items-center w-full max-w-3xl mx-auto">

            {/* 閃卡 */}
            {gameMode==='flashcard'&&(
              <div className="flex flex-col items-center w-full anim-slide">
                <div className="bg-emerald-400 p-6 sm:p-10 rounded-[3rem] border-4 border-emerald-600 border-b-8 shadow-[0_8px_0_0_#047857] w-full">
                  <div className="w-full max-w-md aspect-[4/3] perspective-1000 mx-auto cursor-pointer group" onClick={handleFlip}>
                    <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d shadow-2xl rounded-[2.5rem] ${isFlipped?'rotate-y-180':''}`}>
                      <div className="absolute inset-0 backface-hidden bg-white rounded-[2.5rem] border-8 border-slate-100 overflow-hidden flex items-center justify-center p-2">
                        {!currentLevel.hasFetched?<div className="w-12 h-12 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"/>:<SafeImage key={`f-${currentIndex}`} src={currentLevel.image} word={currentLevel.word}/>}
                        <div className="absolute bottom-5 right-5 bg-black/60 backdrop-blur-sm text-white px-5 py-2.5 rounded-full font-black text-sm flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shadow-lg">{RefreshCcw&&<RefreshCcw size={18}/>} FLIP</div>
                      </div>
                      <div className="absolute inset-0 backface-hidden bg-yellow-300 rounded-[2.5rem] border-8 border-yellow-400 flex flex-col items-center justify-center rotate-y-180 p-8 text-yellow-900 shadow-inner">
                        <h2 className="text-5xl sm:text-6xl font-black mb-6 tracking-wider lowercase text-center drop-shadow-sm">{currentLevel.word}</h2>
                        {currentLevel.translation&&<p className="text-2xl font-black bg-white/50 px-8 py-3 rounded-full border-4 border-yellow-400">{currentLevel.translation}</p>}
                        <button onClick={e=>{e.stopPropagation();snd.speak(currentLevel.word);}} className="mt-10 bg-white border-b-4 border-slate-300 text-blue-500 p-5 rounded-full shadow-md hover:bg-slate-50 active:border-b-0 active:translate-y-1 transition-all flex items-center gap-3 font-black px-8 text-lg">
                          {isMuted?(VolumeX&&<VolumeX size={24}/>):(Volume2&&<Volume2 size={24}/>)} Listen
                        </button>
                      </div>
                    </div>
                  </div>
                  <div className="flex w-full justify-between items-center mt-10 gap-4">
                    <button onClick={prevFlashcard} disabled={currentIndex===0} className="flex-1 bg-white text-slate-700 border-b-4 border-slate-300 hover:bg-slate-50 active:border-b-0 active:translate-y-1 transition-all py-5 rounded-2xl flex items-center justify-center gap-2 font-black text-lg disabled:opacity-50 disabled:border-none disabled:translate-y-1">
                      {ArrowLeft&&<ArrowLeft size={22}/>} Prev
                    </button>
                    <button onClick={shuffleFlashcards} className="bg-purple-500 text-white border-b-4 border-purple-700 hover:bg-purple-400 active:border-b-0 active:translate-y-1 transition-all p-5 px-8 rounded-2xl flex items-center justify-center gap-2 font-black text-lg shadow-sm">
                      {Shuffle&&<Shuffle size={22}/>} Shuffle
                    </button>
                    <button onClick={nextFlashcard} className="flex-1 bg-blue-500 text-white border-b-4 border-blue-700 hover:bg-blue-400 active:border-b-0 active:translate-y-1 transition-all py-5 rounded-2xl flex items-center justify-center gap-2 font-black text-lg shadow-sm">
                      {currentIndex+1===wordList.length?'Done 完成':'Next'}{ArrowRight&&<ArrowRight size={22}/>}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 遊戲模式（非閃卡）*/}
            {gameMode!=='flashcard'&&(
              <div className={`p-6 sm:p-10 rounded-[3rem] border-4 border-b-8 shadow-sm w-full flex flex-col items-center relative anim-slide 
                ${gameMode==='spelling'?'bg-sky-100 border-sky-300':
                  gameMode==='quiz'?'bg-pink-100 border-pink-300':
                  gameMode==='listening'?'bg-violet-100 border-violet-300':
                  'bg-orange-100 border-orange-300'}`}>
                
                {/* 題目圖片區 */}
                <div className="relative bg-white p-4 pb-12 sm:pb-16 rounded-[2.5rem] border-4 border-slate-200 shadow-[0_8px_0_0_#cbd5e1] w-full max-w-[300px] sm:max-w-sm mb-10 transform -rotate-1 hover:rotate-0 transition-transform duration-300 z-10">
                  <div className="bg-slate-50 rounded-2xl overflow-hidden aspect-square relative border-4 border-slate-200">
                    {gameMode==='listening'?(
                      <div className="absolute inset-0 flex flex-col items-center justify-center bg-violet-400 text-white cursor-pointer hover:bg-violet-500 transition-colors z-20" onClick={()=>snd.speak(currentLevel.word)}>
                        {Ear&&<Ear size={72} className="mb-5 animate-pulse drop-shadow-md"/>}
                        <span className="font-black text-xl bg-white/20 px-6 py-2 rounded-full border-2 border-white/50 backdrop-blur-sm">Click to Listen</span>
                      </div>
                    ):!currentLevel.hasFetched?(
                      <div className="absolute inset-0 flex items-center justify-center z-20"><div className="w-12 h-12 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin"/></div>
                    ):(
                      <SafeImage key={`g-${currentIndex}`} src={currentLevel.image} word={currentLevel.word}/>
                    )}
                  </div>
                  
                  <div className="absolute bottom-4 right-4 flex gap-3 z-30">
                    {gameMode==='spelling'&&<button onClick={giveHint} disabled={spellingOk} className="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 border-b-4 border-yellow-600 px-5 py-3 rounded-xl shadow-sm active:border-b-0 active:translate-y-1 transition-all disabled:opacity-50 disabled:border-none disabled:translate-y-1 flex items-center gap-2 font-black text-base"><span className="text-xl">💡</span> Hint</button>}
                    {gameMode!=='listening'&&gameMode!=='truefalse'&&<button onClick={()=>snd.speak(currentLevel.word)} className="bg-blue-500 hover:bg-blue-400 text-white border-b-4 border-blue-700 px-5 py-3 rounded-xl shadow-sm active:border-b-0 active:translate-y-1 transition-all flex items-center gap-2 font-black text-base">{isMuted?(VolumeX&&<VolumeX size={20}/>):(Volume2&&<Volume2 size={20}/>)} Speak</button>}
                  </div>
                  {currentLevel.translation&&<div className="absolute bottom-4 left-4 bg-slate-100 text-slate-600 border-2 border-slate-300 text-sm font-black px-4 py-2 rounded-xl max-w-[140px] truncate shadow-sm">{currentLevel.translation}</div>}
                </div>

                {/* 拼字 */}
                {gameMode==='spelling'&&(
                  <div className="w-full max-w-xl">
                    <div className="flex flex-wrap justify-center gap-3 sm:gap-4 mb-10 bg-white/50 border-4 border-white backdrop-blur-sm p-6 rounded-[2.5rem] shadow-inner w-full min-h-[7rem]">
                      {currentLevel.word.split('').map((_,i)=>{
                        const isErr=wrongSlotIdxs.includes(i),filled=selectedLetters[i]!==null,isActive=!filled&&i===firstEmptySpellingIdx&&!spellingOk;
                        let cls='flex items-center justify-center text-4xl font-black rounded-2xl transition-all duration-200 select-none ';
                        if(!filled){cls+='bg-slate-100 border-4 border-dashed text-transparent ';cls+=isActive?'border-blue-400 shadow-sm ':'border-slate-300 ';}
                        else{cls+='bg-white text-slate-800 border-4 border-slate-200 border-b-8 shadow-[0_2px_0_0_#cbd5e1] ';if(isErr)cls+='bg-red-100 text-red-600 border-red-300 border-b-8 anim-shake ';else if(spellingOk)cls+='anim-pop shadow-none border-b-4 ';else cls+='cursor-pointer hover:-translate-y-1 active:border-b-0 active:translate-y-2 ';}
                        return <div key={i} className={cls} style={{width:'60px',height:'70px'}} onClick={()=>filled&&!isErr&&!spellingOk&&unselectSlot(selectedLetters[i],i)}>{filled?selectedLetters[i].char.toLowerCase():''}</div>;
                      })}
                    </div>
                    <div className="flex flex-wrap justify-center gap-3 sm:gap-4 w-full">
                      {shuffledLetters.map(l=><button key={l.id} onClick={()=>clickTile(l)} disabled={spellingOk||isTransitioning} className="bg-white text-blue-600 border-4 border-slate-200 border-b-8 rounded-2xl text-4xl font-black hover:bg-slate-50 hover:-translate-y-1 active:border-b-0 active:translate-y-2 transition-all flex items-center justify-center select-none disabled:opacity-50 disabled:border-b-4 disabled:translate-y-1 shadow-[0_2px_0_0_#cbd5e1]" style={{width:'60px',height:'70px'}}>{l.char.toLowerCase()}</button>)}
                    </div>
                  </div>
                )}

                {/* 選擇題 / 聽力 */}
                {(gameMode==='quiz'||gameMode==='listening')&&(
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 w-full">
                    {quizOptions.map((opt,i)=>{
                      const isCorrect=opt===quizCorrectOpt,isWrong=wrongQuizOpts.includes(opt);
                      let cls='w-full py-6 px-8 bg-white text-slate-800 border-4 border-slate-200 border-b-8 rounded-[2rem] text-3xl font-black shadow-[0_2px_0_0_#cbd5e1] hover:-translate-y-2 active:border-b-0 active:translate-y-2 transition-all lowercase text-center flex items-center justify-center gap-4 disabled:opacity-60 disabled:border-b-4 disabled:translate-y-1 ';
                      if(isCorrect)cls+='quiz-correct !border-green-600 !border-b-8 ';else if(isWrong)cls+='quiz-wrong !border-red-400 !border-b-4 ';
                      return <button key={i} disabled={isTransitioning||isWrong||!!quizCorrectOpt} onClick={()=>handleQuizSelect(opt)} className={cls}><span className="text-slate-400 text-xl font-black bg-slate-100 rounded-xl px-4 py-2 shrink-0 border-2 border-slate-200">{i+1}</span>{opt}</button>;
                    })}
                  </div>
                )}

                {/* 是非 */}
                {gameMode==='truefalse'&&(
                  <div className="flex flex-col items-center w-full max-w-xl">
                    <div className="bg-white px-12 py-8 rounded-[2.5rem] border-4 border-slate-200 border-b-8 shadow-[0_2px_0_0_#cbd5e1] mb-10 text-center w-full"><h3 className="text-5xl sm:text-6xl font-black text-slate-800 lowercase tracking-wide drop-shadow-sm">{tfWord}</h3></div>
                    <div className="flex gap-6 w-full">
                      <button onClick={()=>handleTFSelect(true)} disabled={isTransitioning} className="flex-1 bg-green-500 hover:bg-green-400 text-white py-8 rounded-[2.5rem] text-3xl font-black border-b-8 border-green-700 shadow-md hover:-translate-y-2 active:border-b-0 active:translate-y-2 transition-all flex flex-col items-center gap-3 disabled:opacity-50 disabled:border-b-4 disabled:translate-y-1">{CheckCircle&&<CheckCircle size={56}/>}<span className="text-xl opacity-90 tracking-widest uppercase">True 正確</span></button>
                      <button onClick={()=>handleTFSelect(false)} disabled={isTransitioning} className="flex-1 bg-red-500 hover:bg-red-400 text-white py-8 rounded-[2.5rem] text-3xl font-black border-b-8 border-red-700 shadow-md hover:-translate-y-2 active:border-b-0 active:translate-y-2 transition-all flex flex-col items-center gap-3 disabled:opacity-50 disabled:border-b-4 disabled:translate-y-1">{XCircle&&<XCircle size={56}/>}<span className="text-xl opacity-90 tracking-widest uppercase">False 錯誤</span></button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ════════════ GAME OVER ════════════ */}
        {screen==='gameover'&&(
          <div className="bg-white p-10 sm:p-16 rounded-[3rem] border-4 border-slate-200 border-b-8 shadow-[0_8px_0_0_#cbd5e1] text-center w-full max-w-lg anim-slide">
            <div className="text-red-500 flex justify-center mb-6">{XCircle&&<XCircle size={100} className="drop-shadow-lg"/>}</div>
            <h2 className="text-5xl font-black mb-4 text-slate-800 tracking-widest">GAME OVER</h2>
            <p className="text-slate-600 mb-10 font-black text-xl bg-slate-50 py-4 rounded-2xl border-4 border-slate-200 inline-block px-8">愛心用盡！ Score: <span className="text-yellow-500 text-3xl ml-2">{score}</span></p>
            <div className="flex flex-col sm:flex-row gap-5 justify-center">
              <button onClick={()=>setScreen('home')} className="flex-1 bg-slate-100 text-slate-700 border-b-4 border-slate-300 font-black py-5 px-8 rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-200 active:border-b-0 active:translate-y-1 transition-all text-xl">{Home&&<Home size={24}/>}Home</button>
              <button onClick={()=>setScreen('selectMode')} className="flex-1 bg-blue-500 text-white border-b-4 border-blue-700 font-black py-5 px-8 rounded-2xl flex items-center justify-center gap-2 hover:bg-blue-400 active:border-b-0 active:translate-y-1 transition-all text-xl">{RefreshCcw&&<RefreshCcw size={24}/>}Retry</button>
            </div>
            <ResultsList/>
          </div>
        )}

        {/* ════════════ FINISHED ════════════ */}
        {screen==='finished'&&(
          <div className="bg-white p-10 sm:p-16 rounded-[3rem] border-4 border-yellow-300 border-b-8 shadow-[0_8px_0_0_#fde047] text-center w-full max-w-lg anim-slide">
            <div className="relative mb-8">{Trophy&&<Trophy size={120} className="text-yellow-400 mx-auto relative z-10 drop-shadow-xl animate-pulse"/>}</div>
            <h2 className="text-5xl font-black mb-8 text-yellow-500 tracking-wider">Well Done!</h2>
            {gameMode!=='flashcard'&&(
              <div className="bg-yellow-50 rounded-3xl p-8 mb-8 text-left space-y-5 border-4 border-yellow-200">
                {[[Star&&<Star className="text-yellow-500 fill-yellow-500" size={28}/>,'Score 得分',score,'text-yellow-600'],[Clock&&<Clock className="text-blue-500" size={28}/>,'Time 時間',fmt(timeElapsed),'text-blue-600'],[Heart&&<Heart className="text-red-500 fill-red-500" size={28}/>,'Lives 愛心',`×${lives}`,'text-red-600']].map(([icon,label,val,cls],i)=>(
                  <div key={i} className={`flex justify-between items-center font-black text-slate-700 ${i>0?'border-t-4 border-yellow-200 pt-5':''}`}><span className="flex items-center gap-3 text-xl">{icon}{label}</span><span className={`text-3xl ${cls}`}>{val}</span></div>
                ))}
              </div>
            )}
            <div className="flex flex-col sm:flex-row gap-5">
              <button onClick={()=>setScreen('home')} className="flex-1 bg-slate-100 text-slate-700 border-b-4 border-slate-300 font-black py-5 rounded-2xl hover:bg-slate-200 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2 text-xl">{Home&&<Home size={24}/>}Home</button>
              <button onClick={()=>setScreen('selectMode')} className="flex-1 bg-green-500 text-white border-b-4 border-green-700 font-black py-5 rounded-2xl hover:bg-green-400 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2 text-xl">{RefreshCcw&&<RefreshCcw size={24}/>}Change</button>
            </div>
            <ResultsList/>
          </div>
        )}

      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
