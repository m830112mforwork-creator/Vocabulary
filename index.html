<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Adventure | 雲端單字學習平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
  <style>
    body{margin:0;padding:0;-webkit-font-smoothing:antialiased;user-select:none}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px) rotate(-3deg)}40%,80%{transform:translateX(5px) rotate(3deg)}}
    .anim-shake{animation:shake .4s ease-in-out}
    @keyframes popOut{0%{transform:scale(1)}50%{transform:scale(1.15) translateY(-5px);background-color:#4ade80;color:white;border-color:#16a34a}100%{transform:scale(1);background-color:#4ade80;color:white;border-color:#16a34a}}
    .anim-pop{animation:popOut .5s ease-in-out forwards}
    @keyframes slideUp{0%{transform:translate(-50%,20px);opacity:0}100%{transform:translate(-50%,0);opacity:1}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .anim-slide{animation:fadeInUp .35s cubic-bezier(.16,1,.3,1)}
    @keyframes quizCorrect{0%{transform:scale(1)}50%{transform:scale(1.05);background-color:#4ade80;color:white}100%{transform:scale(1);background-color:#4ade80;color:white}}
    .quiz-correct{animation:quizCorrect .5s ease forwards;border-color:#16a34a!important}
    .quiz-wrong{background-color:#fee2e2!important;color:#ef4444!important;border-color:#fca5a5!important;opacity:.55;pointer-events:none;text-decoration:line-through}
    @keyframes floatUp{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-80%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-150%) scale(1)}}
    .anim-float-up{animation:floatUp 1.2s cubic-bezier(.16,1,.3,1) forwards;pointer-events:none}
    .wood-bg{background-color:#fef3c7;background-image:radial-gradient(#fde68a 2px,transparent 2px),radial-gradient(#fde68a 2px,transparent 2px);background-size:32px 32px;background-position:0 0,16px 16px}
    .perspective-1000{perspective:1000px}
    .transform-style-3d{transform-style:preserve-3d}
    .backface-hidden{backface-visibility:hidden}
    .rotate-y-180{transform:rotateY(180deg)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    textarea{user-select:text}input[type=text]{user-select:text}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc,updateDoc}from"https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const{useState,useEffect,useCallback,useRef}=React;
const{Upload,Volume2,RefreshCcw,Image:ImageIcon,Lightbulb,Star,Trophy,Heart,Clock,
  XCircle,CheckCircle,HelpCircle,Type,MousePointerClick,BookOpen,ArrowRight,ArrowLeft,
  Home,Shuffle,Edit3,ImagePlus,Ear,CheckSquare,VolumeX,Database,Settings,Trash2,
  Save,AlertTriangle,Plus,PenLine,Eye,Lock,ChevronRight,GraduationCap}=window.LucideReact||{};

// ── Firebase ──────────────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyDC-slEwIqWT6l8U8DubOChLIWQAOX_DKE",
  authDomain:"voc-test-e8783.firebaseapp.com",
  projectId:"voc-test-e8783",
  storageBucket:"voc-test-e8783.firebasestorage.app",
  messagingSenderId:"866197218174",
  appId:"1:866197218174:web:680acc4d9e643ec8c3c92f"
};
const APP_ID="voc-test-e8783";
const ADMIN_PWD="teacher123";

let app,auth,db;
try{app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app);}
catch(e){console.error("Firebase init failed:",e);}

// ── SafeImage ──────────────────────────────────────
const SafeImage=({src,word})=>{
  const[status,setStatus]=useState('loading');
  const[cur,setCur]=useState(src);
  useEffect(()=>{setStatus('loading');setCur(src);},[src]);
  const onError=()=>{
    const fb=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    if(cur!==fb){setCur(fb);setStatus('loading');}else setStatus('error');
  };
  return(
    <div className="absolute inset-0 w-full h-full bg-amber-50 overflow-hidden rounded-xl border border-slate-200 shadow-inner">
      <div className="absolute inset-0 flex items-center justify-center text-amber-300 z-0">{HelpCircle&&<HelpCircle size={56}/>}</div>
      {status==='loading'&&<div className="absolute inset-0 flex items-center justify-center bg-white/70 z-20"><div className="w-9 h-9 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"/></div>}
      {cur&&status!=='error'&&<img src={cur} alt={word} draggable="false" className={`w-full h-full object-cover absolute inset-0 z-10 transition-opacity duration-300 ${status==='loading'?'opacity-0':'opacity-100'}`} onLoad={()=>setStatus('ok')} onError={onError}/>}
    </div>
  );
};

// ── useSounds ─────────────────────────────────────────────────────
const useSounds=(isMuted)=>{
  const tone=useCallback((f,type='sine',dur=0.1,vol=0.1)=>{
    if(isMuted)return;
    try{const Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;
      const ctx=new Ctx(),osc=ctx.createOscillator(),g=ctx.createGain();
      osc.type=type;osc.frequency.setValueAtTime(f,ctx.currentTime);
      g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      osc.connect(g).connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+dur);}catch{}
  },[isMuted]);
  return{
    pop:    useCallback(()=>tone(600,'sine',.06),[tone]),
    drop:   useCallback(()=>tone(380,'triangle',.06),[tone]),
    success:useCallback(()=>{tone(523,'sine',.12);setTimeout(()=>tone(659,'sine',.15),100);setTimeout(()=>tone(784,'sine',.2),220);},[tone]),
    error:  useCallback(()=>tone(160,'sawtooth',.3,.09),[tone]),
    over:   useCallback(()=>{tone(200,'sawtooth',.3);setTimeout(()=>tone(150,'sawtooth',.5),300);},[tone]),
    speak:  useCallback((text)=>{if(isMuted)return;try{window.speechSynthesis?.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;window.speechSynthesis?.speak(u);}catch{}},[isMuted]),
  };
};

// ── App ───────────────────────────────────────────────────────────
const App=()=>{
  const[screen,setScreen]=useState('home');
  const[gameMode,setGameMode]=useState('spelling');
  const[user,setUser]=useState(null);
  const[cloudUnits,setCloudUnits]=useState([]);
  const[wordList,setWordList]=useState([]);
  const[currentUnitId,setCurrentUnitId]=useState(null);
  const[currentUnitName,setCurrentUnitName]=useState('');
  const[editPage,setEditPage]=useState(0);
  const[newUnitName,setNewUnitName]=useState('');
  const[adminUnit,setAdminUnit]=useState(null);
  const[adminUnitDraft,setAdminUnitDraft]=useState('');
  const[currentIndex,setCurrentIndex]=useState(0);
  const[shuffledLetters,setShuffledLetters]=useState([]);
  const[selectedLetters,setSelectedLetters]=useState([]);
  const[wrongSlotIdxs,setWrongSlotIdxs]=useState([]);
  const[spellingOk,setSpellingOk]=useState(false);
  const[quizOptions,setQuizOptions]=useState([]);
  const[wrongQuizOpts,setWrongQuizOpts]=useState([]);
  const[quizCorrectOpt,setQuizCorrectOpt]=useState(null);
  const[isFlipped,setIsFlipped]=useState(false);
  const[tfWord,setTfWord]=useState('');
  const[tfIsTrue,setTfIsTrue]=useState(true);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[maxCombo,setMaxCombo]=useState(0);
  const[lives,setLives]=useState(3);
  const[timeElapsed,setTimeElapsed]=useState(0);
  const[floatPts,setFloatPts]=useState(null);
  const[gameHistory,setGameHistory]=useState([]);
  const[qMistakes,setQMistakes]=useState(0);
  const[isMuted,setIsMuted]=useState(false);
  const[toast,setToast]=useState(null);
  const[wrongFlash,setWrongFlash]=useState(false);
  const[isTransitioning,setIsTransitioning]=useState(false);

  const snd=useSounds(isMuted);
  const S=useRef({});
  S.current={screen,gameMode,wordList,currentIndex,combo,lives,isTransitioning,
              spellingOk,wrongSlotIdxs,selectedLetters,shuffledLetters,gameHistory,qMistakes};
  const fetchedRef=useRef(new Set());
  const playingRef=useRef(false);
  const globalTimerRef=useRef(null);
  const currentLevel=wordList[currentIndex];

  const showToast=useCallback((msg,type='info')=>{setToast({msg,type});setTimeout(()=>setToast(null),3200);},[]);

  useEffect(()=>{
    if(!auth)return;
    signInAnonymously(auth).catch(console.error);
    return onAuthStateChanged(auth,setUser);
  },[]);

  useEffect(()=>{
    if(!user||!db)return;
    const ref=collection(db,'artifacts',APP_ID,'public','data','units');
    return onSnapshot(ref,(snap)=>{
      const list=[];
      snap.forEach(d=>list.push({id:d.id,...d.data()}));
      list.sort((a,b)=>a.createdAt-b.createdAt);
      setCloudUnits(list);
    },console.error);
  },[user]);

  const fetchImage=useCallback(async(idx,word)=>{
    if(fetchedRef.current.has(idx)||!word)return;
    fetchedRef.current.add(idx);
    let url=null;
    try{
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`);
      if(r.ok){const d=await r.json();url=d.originalimage?.source||d.thumbnail?.source||null;if(url)url=url.replace('http://','https://');}
    }catch{}
    if(!url)url=`https://picsum.photos/seed/${encodeURIComponent(word)}/400/400`;
    setWordList(prev=>{const next=[...prev];if(next[idx])next[idx]={...next[idx],image:url,hasFetched:true};return next;});
  },[]);

  useEffect(()=>{
    if(!wordList.length)return;
    [currentIndex,currentIndex+1,currentIndex+2].filter(i=>i<wordList.length)
      .forEach(i=>{if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);});
  },[currentIndex,wordList,fetchImage]);

  useEffect(()=>{
    if(screen!=='editImages')return;
    const s=editPage*20,e=Math.min(s+20,wordList.length);
    for(let i=s;i<e;i++){if(!wordList[i]?.hasFetched)fetchImage(i,wordList[i].word);}
  },[editPage,screen,wordList,fetchImage]);

  useEffect(()=>{playingRef.current=screen==='playing';},[screen]);

  useEffect(()=>{
    clearInterval(globalTimerRef.current);
    if(screen==='playing'&&gameMode!=='flashcard')
      globalTimerRef.current=setInterval(()=>setTimeElapsed(t=>t+1),1000);
    return()=>clearInterval(globalTimerRef.current);
  },[screen,gameMode]);

  const makeQuizOptions=useCallback((correctWord,list)=>{
    const opts=[correctWord];
    const pool=list.filter(w=>w.word!==correctWord).map(w=>w.word).sort(()=>Math.random()-.5);
    for(let i=0;i<3&&i<pool.length;i++)opts.push(pool[i]);
    const fb=['apple','cat','dog','sun','moon','car','bird','fish'];let fi=0;
    while(opts.length<4){if(!opts.includes(fb[fi]))opts.push(fb[fi]);fi++;}
    return opts.sort(()=>Math.random()-.5);
  },[]);

  const initLevel=useCallback((wordObj,mode,list)=>{
    if(!wordObj)return;
    setSpellingOk(false);setIsFlipped(false);setWrongSlotIdxs([]);
    setWrongQuizOpts([]);setQuizCorrectOpt(null);setWrongFlash(false);setIsTransitioning(false);
    setQMistakes(0);
    if(mode==='spelling'){
      let letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      const allSame=wordObj.word.split('').every(c=>c===wordObj.word[0]);
      if(!allSame&&wordObj.word.length>1){
        while(letters.map(l=>l.char).join('')===wordObj.word)
          letters=wordObj.word.split('').map((char,id)=>({char,id})).sort(()=>Math.random()-.5);
      }
      setShuffledLetters(letters);setSelectedLetters(new Array(wordObj.word.length).fill(null));
    }else if(mode==='quiz'||mode==='listening'){
      setQuizOptions(makeQuizOptions(wordObj.word,list));
    }else if(mode==='truefalse'){
      const isTrue=Math.random()>0.5||list.length<2;
      setTfIsTrue(isTrue);
      if(isTrue){setTfWord(wordObj.word);}
      else{const others=list.filter(w=>w.word!==wordObj.word);setTfWord(others[Math.floor(Math.random()*others.length)].word);}
    }
    if(mode!=='flashcard'&&mode!=='truefalse')setTimeout(()=>{if(playingRef.current)snd.speak(wordObj.word);},350);
  },[makeQuizOptions,snd]);

  const advance=useCallback((wList,idx,mode)=>{
    setIsTransitioning(true);
    setTimeout(()=>{
      if(!playingRef.current)return;
      if(idx+1<wList.length){setCurrentIndex(idx+1);initLevel(wList[idx+1],mode,wList);}
      else setScreen('finished');
    },1100);
  },[initLevel]);

  const handleCorrect=useCallback((wList,idx,mode)=>{
    const{isTransitioning:trans,combo:c,qMistakes:qm,gameHistory:hist}=S.current;
    if(trans)return;
    snd.success();
    const newCombo=c+1,pts=10+newCombo*5;
    setScore(s=>s+pts);setCombo(newCombo);setMaxCombo(m=>Math.max(m,newCombo));
    setFloatPts({val:pts,id:Date.now()});
    setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm,status:'success'}]);
    advance(wList,idx,mode);
  },[snd,advance]);

  const handleWrong=useCallback((wList,idx)=>{
    if(S.current.isTransitioning)return;
    snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);
    setQMistakes(m=>m+1);
    setLives(prev=>{
      const next=prev-1;
      if(next<=0){
        const{qMistakes:qm,gameHistory:hist}=S.current;
        setGameHistory([...hist,{word:wList[idx].word,translation:wList[idx].translation,mistakes:qm+1,status:'failed'}]);
        setTimeout(()=>{snd.over();setScreen('gameover');},800);
      }
      return next;
    });
  },[snd]);

  useEffect(()=>{
    const{screen:sc,gameMode:gm,spellingOk:ok,wrongSlotIdxs:bad,isTransitioning:trans,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||gm!=='spelling'||ok||bad.length>0||trans)return;
    if(!selectedLetters.length||!selectedLetters.every(l=>l!==null))return;
    const target=wl[ci]?.word;if(!target)return;
    const spelled=selectedLetters.map(l=>l.char).join('');
    if(spelled===target){
      setSpellingOk(true);handleCorrect(wl,ci,gm);
    }else{
      const badIdxs=selectedLetters.map((l,i)=>(l&&l.char!==target[i])?i:-1).filter(i=>i!==-1);
      setWrongSlotIdxs(badIdxs);snd.error();setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);setCombo(0);
      setQMistakes(m=>m+1);
      setLives(prev=>{
        const next=prev-1;
        if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},900);return next;}
        setTimeout(()=>{
          setWrongSlotIdxs([]);
          setSelectedLetters(prevSel=>{
            const ret=[];
            const next2=prevSel.map((l,i)=>{if(badIdxs.includes(i)&&l){ret.push(l);return null;}return l;});
            setShuffledLetters(p=>[...p,...ret].sort(()=>Math.random()-.5));return next2;
          });
        },750);
        return next;
      });
    }
  },[selectedLetters]);

  const clickTile=useCallback((tile)=>{
    const{spellingOk:ok,isTransitioning:trans,wrongSlotIdxs:bad,selectedLetters:sel}=S.current;
    if(ok||trans||bad.length>0)return;
    const fi=sel.findIndex(l=>l===null);if(fi===-1)return;
    snd.pop();
    setSelectedLetters(prev=>{const n=[...prev];n[fi]=tile;return n;});
    setShuffledLetters(prev=>prev.filter(t=>t.id!==tile.id));
  },[snd]);

  const unselectSlot=useCallback((letter,idx)=>{
    const{spellingOk:ok,isTransitioning:trans}=S.current;
    if(!letter||ok||trans)return;
    snd.drop();
    setSelectedLetters(prev=>{const n=[...prev];n[idx]=null;return n;});
    setShuffledLetters(prev=>[...prev,letter]);
  },[snd]);

  const giveHint=useCallback(()=>{
    const{screen:sc,spellingOk:ok,gameMode:gm,selectedLetters:sel,shuffledLetters:shuf,wordList:wl,currentIndex:ci}=S.current;
    if(sc!=='playing'||ok||gm!=='spelling')return;
    const target=wl[ci]?.word;if(!target)return;
    let ti=sel.findIndex((l,i)=>l===null||(l&&l.char!==target[i]));if(ti===-1)return;
    const cc=target[ti],curIn=sel[ti];
    let pool2=[...shuf];if(curIn)pool2.push(curIn);
    const fi=pool2.findIndex(t=>t.char===cc);if(fi===-1)return;
    const found=pool2[fi];pool2.splice(fi,1);
    snd.pop();setScore(s=>Math.max(0,s-5));setCombo(0);
    setShuffledLetters(pool2);setSelectedLetters(prev=>{const n=[...prev];n[ti]=found;return n;});
  },[snd]);

  const handleQuizSelect=useCallback((opt)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans||wrongQuizOpts.includes(opt)||quizCorrectOpt)return;
    const target=wl[ci]?.word;
    if(opt===target){setQuizCorrectOpt(opt);handleCorrect(wl,ci,gm);}
    else{
      snd.error();setCombo(0);setQMistakes(m=>m+1);
      setWrongFlash(true);setTimeout(()=>setWrongFlash(false),500);
      setWrongQuizOpts(prev=>[...prev,opt]);
      setLives(prev=>{const next=prev-1;if(next<=0){const{qMistakes:qm,gameHistory:hist}=S.current;setGameHistory([...hist,{word:target,mistakes:qm+1,status:'failed'}]);setTimeout(()=>{snd.over();setScreen('gameover');},800);}return next;});
    }
  },[wrongQuizOpts,quizCorrectOpt,handleCorrect,snd]);

  const handleTFSelect=useCallback((choice)=>{
    const{isTransitioning:trans,wordList:wl,currentIndex:ci,gameMode:gm}=S.current;
    if(trans)return;
    if(choice===tfIsTrue)handleCorrect(wl,ci,gm);else handleWrong(wl,ci);
  },[tfIsTrue,handleCorrect,handleWrong]);

  const handleFlip=useCallback(()=>{
    snd.pop();
    setIsFlipped(prev=>{if(!prev)setTimeout(()=>{if(playingRef.current)snd.speak(S.current.wordList[S.current.currentIndex]?.word);},150);return!prev;});
  },[snd]);

  const nextFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci,gameHistory:hist}=S.current;
    setGameHistory([...hist,{word:wl[ci].word,translation:wl[ci].translation,status:'viewed'}]);
    if(ci+1<wl.length){snd.drop();setCurrentIndex(ci+1);initLevel(wl[ci+1],'flashcard',wl);}else setScreen('finished');
  },[snd,initLevel]);

  const prevFlashcard=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    if(ci>0){snd.drop();setCurrentIndex(ci-1);initLevel(wl[ci-1],'flashcard',wl);}
  },[snd,initLevel]);

  const shuffleFlashcards=useCallback(()=>{
    const{wordList:wl,currentIndex:ci}=S.current;
    snd.pop();setIsFlipped(false);
    const cur=wl[ci],others=wl.filter((_,i)=>i!==ci).sort(()=>Math.random()-.5);
    const nl=[cur,...others];setWordList(nl);setCurrentIndex(0);initLevel(cur,'flashcard',nl);
    showToast('已重新洗牌！','info');
  },[snd,initLevel,showToast]);

  const startGame=useCallback((mode,wList)=>{
    const list=wList||S.current.wordList;
    setGameMode(mode);setCurrentIndex(0);
    setScore(0);setCombo(0);setMaxCombo(0);setLives(3);setTimeElapsed(0);
    setGameHistory([]);setIsTransitioning(false);
    initLevel(list[0],mode,list);setScreen('playing');
  },[initLevel]);

  const openUnit=useCallback((unit)=>{
    setCurrentUnitId(unit.id);setCurrentUnitName(unit.name);
    const list=unit.words.map(w=>({...w,hasFetched:!!w.image}));
    setWordList(list);fetchedRef.current.clear();setEditPage(0);setScreen('selectMode');
  },[]);

  useEffect(()=>{
    const handler=(e)=>{
      const{screen:sc,gameMode:gm,spellingOk:ok,isTransitioning:trans,selectedLetters:sel}=S.current;
      if(sc!=='playing')return;
      if(gm==='flashcard'){
        if(e.key===' '||e.key==='Enter'){e.preventDefault();handleFlip();}
        else if(e.key==='ArrowRight'){e.preventDefault();nextFlashcard();}
        else if(e.key==='ArrowLeft'){e.preventDefault();prevFlashcard();}
        return;
      }
      if((gm==='quiz'||gm==='listening')&&['1','2','3','4'].includes(e.key)){
        e.preventDefault();const opt=quizOptions[parseInt(e.key)-1];if(opt)handleQuizSelect(opt);return;
      }
      if(gm==='truefalse'){
        if(e.key==='ArrowLeft'||e.key.toLowerCase()==='o'){e.preventDefault();handleTFSelect(true);}
        else if(e.key==='ArrowRight'||e.key.toLowerCase()==='x'){e.preventDefault();handleTFSelect(false);}
        return;
      }
      if(gm==='spelling'){
        if(ok||trans)return;
        if(e.key==='Backspace'){e.preventDefault();const last=sel.map((l,i)=>l?i:-1).filter(i=>i!==-1).pop();if(last!==undefined)unselectSlot(sel[last],last);return;}
        const key=e.key.toLowerCase();
        if(/^[a-z]$/.test(key)){
          setShuffledLetters(prev=>{const found=prev.find(l=>l.char===key);if(!found)return prev;setSelectedLetters(ps=>{const fi=ps.findIndex(l=>l===null);if(fi===-1)return ps;snd.pop();const n=[...ps];n[fi]=found;return n;});return prev.filter(l=>l.id!==found.id);});
        }
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[quizOptions,handleFlip,nextFlashcard,prevFlashcard,handleQuizSelect,handleTFSelect,unselectSlot,snd]);

  const handleAdminLogin=useCallback(()=>{
    const pwd=window.prompt('🔒 請輸入教師專屬密碼：');
    if(pwd===ADMIN_PWD)setScreen('admin');

    let Lib=window.XLSX;
    if(!Lib){
      showToast('正在準備 Excel 解析引擎…','info');
      try{Lib=await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>res(window.XLSX);s.onerror=rej;document.head.appendChild(s);});}
      catch{showToast('解析套件載入失敗','error');e.target.value='';return;}
    }
    const reader=new FileReader();
    reader.onload=async(evt)=>{
      try{
        const wb=Lib.read(evt.target.result,{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]];
        const data=Lib.utils.sheet_to_json(ws,{header:1});
        const words=data.filter(r=>r&&typeof r[0]==='string'&&r[0].trim())
          .map(r=>({word:r[0].trim().toLowerCase(),translation:r[1]?String(r[1]).trim():'',image:null,hasFetched:false}))
          .filter(item=>/^[a-zA-Z\s\-'']+$/.test(item.word));
        if(!words.length){showToast('找不到有效的英文單字！','error');return;}
        if(!db){showToast('Firebase 未連線','error');return;}
        const uid='unit_'+Date.now();
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','units',uid),{name:newUnitName.trim(),words,createdAt:Date.now()});
        showToast(`單字庫「${newUnitName.trim()}」已上傳至雲端！`,'info');
        setNewUnitName('');
      }catch(err){showToast('讀取失敗：'+err.message,'error');}
      e.target.value='';
    };
    reader.readAsArrayBuffer(file);

            </div>
            <div className="flex flex-col sm:flex-row gap-4 mt-8 w-full max-w-md px-2">
              <button onClick={()=>setScreen('home')} className="flex-1 flex items-center justify-center gap-2 bg-white text-slate-700 border-2 border-slate-200 shadow-[0_4px_0_0_#e2e8f0] hover:-translate-y-1 hover:shadow-[0_6px_0_0_#e2e8f0] active:translate-y-1 active:shadow-none transition-all px-5 py-3.5 rounded-full font-bold">{Home&&<Home size={18}/>}返回大廳</button>
              <button onClick={()=>setScreen('editImages')} className="flex-1 flex items-center justify-center gap-2 bg-orange-100 hover:bg-orange-200 text-orange-700 shadow-[0_4px_0_0_#fdba74] hover:-translate-y-1 hover:shadow-[0_6px_0_0_#fdba74] active:translate-y-1 active:shadow-none transition-all px-5 py-3.5 rounded-full font-bold">{ImagePlus&&<ImagePlus size={18}/>}自訂圖片</button>
            </div>
          </div>
        )}

        {/* ════════════ EDIT IMAGES ════════════ */}
        {screen==='editImages'&&(
          <div className="w-full max-w-5xl flex flex-col items-center anim-slide py-4">
            <div className="w-full flex justify-between items-center mb-5 bg-white/90 backdrop-blur-md p-4 px-6 rounded-2xl shadow-sm gap-4 flex-wrap border-2 border-slate-100">
              <div>
                <h2 className="text-xl font-black text-slate-800 flex items-center gap-2">{ImagePlus&&<ImagePlus size={22} className="text-orange-500"/>}自訂題庫圖片</h2>
                <p className="text-slate-500 text-sm">更換圖片後請按「儲存至雲端」</p>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setScreen('selectMode')} className="bg-white text-slate-800 border-2 border-slate-200 shadow-[0_4px_0_0_#e2e8f0] hover:-translate-y-1 hover:shadow-[0_6px_0_0_#e2e8f0] active:translate-y-1 active:shadow-none transition-all px-5 py-2.5 rounded-full font-bold">取消</button>
                <button onClick={saveImages} className="bg-orange-500 text-white shadow-[0_4px_0_0_#c2410c] hover:bg-orange-400 hover:-translate-y-1 hover:shadow-[0_6px_0_0_#c2410c] active:translate-y-1 active:shadow-none transition-all px-6 py-2.5 rounded-full font-bold flex items-center gap-2">{Save&&<Save size={16}/>}儲存至雲端</button>
              </div>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 w-full">
              {wordList.slice(editPage*20,(editPage+1)*20).map((item,i)=>{
                const ai=editPage*20+i;
                return(
                  <div key={ai} className="bg-white p-3 rounded-2xl shadow-sm border-2 border-slate-100 flex flex-col items-center hover:border-orange-300 transition-colors">
                    <div className="w-full aspect-square bg-slate-50 rounded-xl mb-2 relative overflow-hidden border border-slate-200">
                      {item.hasFetched?<SafeImage src={item.image} word={item.word}/>:<div className="absolute inset-0 flex items-center justify-center"><div className="w-7 h-7 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"/></div>}
                    </div>
                    <h3 className="font-black text-slate-800 text-sm truncate w-full text-center lowercase">{item.word}</h3>
                    {item.translation&&<p className="text-xs text-slate-400 font-bold truncate w-full text-center mb-1">{item.translation}</p>}
                    <label className="cursor-pointer mt-auto w-full bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-200 py-2 rounded-xl text-xs font-bold text-center transition-colors flex items-center justify-center gap-1 active:scale-95">
                      {Upload&&<Upload size={12}/>}更換圖片
                      <input type="file" accept="image/*" className="hidden" onChange={e=>handleCustomImage(ai,e)}/>
                    </label>
                  </div>
                );
              })}
            </div>
            {wordList.length>20&&(
              <div className="flex gap-3 items-center mt-5 bg-white/90 px-6 py-3 rounded-full shadow-sm font-bold text-slate-700 border-2 border-white">
                <button onClick={()=>setEditPage(p=>Math.max(0,p-1))} disabled={editPage===0} className="p-2 hover:bg-slate-100 rounded-full disabled:opacity-30 disabled:hover:bg-transparent">{ArrowLeft&&<ArrowLeft size={20}/>}</button>
                <span className="text-sm">第 {editPage+1} / {Math.ceil(wordList.length/20)} 頁</span>
                <button onClick={()=>setEditPage(p=>Math.min(Math.ceil(wordList.length/20)-1,p+1))} disabled={editPage===Math.ceil(wordList.length/20)-1} className="p-2 hover:bg-slate-100 rounded-full disabled:opacity-30 disabled:hover:bg-transparent">{ArrowRight&&<ArrowRight size={20}/>}</button>
              </div>
            )}
          </div>
        )}

        {/* ════════════ PLAYING ════════════ */}
        {screen==='playing'&&currentLevel&&(
          <div className="flex flex-col items-center w-full max-w-2xl mx-auto">

            {/* 閃卡 */}
            {gameMode==='flashcard'&&(
              <div className="flex flex-col items-center w-full anim-slide">
                <div className="bg-purple-500/10 p-6 sm:p-10 rounded-[3rem] border-8 border-white/50 shadow-2xl w-full backdrop-blur-sm">
                  <div className="w-full max-w-sm aspect-[4/3] perspective-1000 mx-auto cursor-pointer group" onClick={handleFlip}>
                    <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d shadow-[0_8px_20px_-3px_rgba(0,0,0,0.2)] rounded-3xl ${isFlipped?'rotate-y-180':''}`}>
                      <div className="absolute inset-0 backface-hidden bg-white rounded-3xl border-8 border-white overflow-hidden flex items-center justify-center">
                        {!currentLevel.hasFetched?<div className="w-10 h-10 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"/>:<SafeImage key={`f-${currentIndex}`} src={currentLevel.image} word={currentLevel.word}/>}
                        <div className="absolute bottom-3 right-3 bg-slate-900/60 text-white px-3 py-1.5 rounded-full font-bold text-xs flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">{RefreshCcw&&<RefreshCcw size={13}/>}點擊翻轉</div>
                      </div>
                      <div className="absolute inset-0 backface-hidden bg-gradient-to-br from-sky-400 to-blue-600 rounded-3xl border-8 border-white flex flex-col items-center justify-center rotate-y-180 p-6 text-white">
                        <h2 className="text-4xl sm:text-5xl font-black mb-3 tracking-wider lowercase text-center">{currentLevel.word}</h2>
                        {currentLevel.translation&&<p className="text-xl font-bold bg-white/20 px-5 py-1.5 rounded-full shadow-inner">{currentLevel.translation}</p>}
                        <button onClick={e=>{e.stopPropagation();snd.speak(currentLevel.word);}} className="mt-6 bg-white text-blue-600 p-4 rounded-full shadow-lg hover:scale-110 active:scale-95 transition-transform">{isMuted?(VolumeX&&<VolumeX size={26}/>):(Volume2&&<Volume2 size={26}/>)}</button>
                      </div>
                    </div>
                  </div>
                  <div className="flex w-full justify-between items-center mt-10 gap-3">
                    <button onClick={prevFlashcard} disabled={currentIndex===0} className="flex-1 bg-white text-slate-800 border-2 border-slate-200 shadow-[0_6px_0_0_#e2e8f0] hover:-translate-y-1 hover:shadow-[0_10px_0_0_#e2e8f0] active:translate-y-1.5 active:shadow-none transition-all py-4 rounded-2xl flex items-center justify-center gap-1 font-bold disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-[0_6px_0_0_#e2e8f0] disabled:active:translate-y-0">{ArrowLeft&&<ArrowLeft size={18}/>}上一張</button>
                    <button onClick={shuffleFlashcards} className="bg-purple-100 text-purple-600 border-2 border-purple-200 shadow-[0_6px_0_0_#d8b4fe] hover:-translate-y-1 hover:shadow-[0_10px_0_0_#d8b4fe] active:translate-y-1.5 active:shadow-none transition-all p-4 rounded-2xl flex items-center justify-center">{Shuffle&&<Shuffle size={22}/>}</button>
                    <button onClick={nextFlashcard} className="flex-1 bg-purple-500 hover:bg-purple-400 text-white shadow-[0_6px_0_0_#7e22ce] hover:-translate-y-1 hover:shadow-[0_10px_0_0_#7e22ce] active:translate-y-1.5 active:shadow-none transition-all py-4 rounded-2xl flex items-center justify-center gap-1 font-bold">{currentIndex+1===wordList.length?'完成':'下一張'}{ArrowRight&&<ArrowRight size={18}/>}</button>
                  </div>
                </div>
              </div>
            )}

            {/* 遊戲模式（非閃卡）*/}
            {gameMode!=='flashcard'&&(
              <div className={`p-4 sm:p-8 rounded-[3rem] border-8 border-white/50 shadow-2xl w-full backdrop-blur-sm flex flex-col items-center relative anim-slide ${modeBg[gameMode]||'bg-sky-500/10'}`}>
                <div className="relative bg-white p-3 pb-10 sm:pb-14 rounded-xl shadow-[0_8px_20px_-3px_rgba(0,0,0,0.2)] w-full max-w-[280px] sm:max-w-xs mb-8 transform -rotate-1 hover:rotate-0 transition-transform duration-300 group">
                  <div className="absolute -top-4 left-1/2 -translate-x-1/2 w-8 h-8 bg-red-500 rounded-full shadow-[inset_-2px_-2px_4px_rgba(0,0,0,0.3),2px_4px_4px_rgba(0,0,0,0.3)] border border-red-700 z-30 flex items-center justify-center"><div className="w-3 h-3 bg-red-300 rounded-full opacity-60"/></div>
                  <div className="bg-white rounded-xl overflow-hidden aspect-square relative border border-slate-100">
                    {gameMode==='listening'?(
                      <div className="absolute inset-0 flex flex-col items-center justify-center bg-indigo-500 text-white cursor-pointer hover:bg-indigo-400 transition-colors z-20" onClick={()=>snd.speak(currentLevel.word)}>
                        {Ear&&<Ear size={64} className="mb-3 animate-pulse"/>}<span className="font-bold text-lg">點擊聆聽</span>
                      </div>
                    ):!currentLevel.hasFetched?(
                      <div className="absolute inset-0 flex items-center justify-center bg-slate-100 z-20"><div className="w-9 h-9 border-4 border-orange-300 border-t-orange-500 rounded-full animate-spin"/></div>
                    ):(
                      <SafeImage key={`g-${currentIndex}`} src={currentLevel.image} word={currentLevel.word}/>
                    )}
                  </div>
                  <div className="absolute bottom-3 right-3 flex gap-2 z-30">
                    {gameMode==='spelling'&&<button onClick={giveHint} disabled={spellingOk} className="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 p-3 rounded-full shadow-[0_4px_0_0_#a16207] active:shadow-none active:translate-y-1 transition-all disabled:opacity-50 disabled:active:translate-y-0 disabled:shadow-[0_4px_0_0_#a16207]" title="提示(-5分)">{Lightbulb&&<Lightbulb size={20}/>}</button>}
                    {gameMode!=='listening'&&gameMode!=='truefalse'&&<button onClick={()=>snd.speak(currentLevel.word)} className="bg-blue-500 hover:bg-blue-400 text-white p-3 rounded-full shadow-[0_4px_0_0_#1e3a8a] active:shadow-none active:translate-y-1 transition-all">{isMuted?(VolumeX&&<VolumeX size={20}/>):(Volume2&&<Volume2 size={20}/>)}</button>}
                  </div>
                  {currentLevel.translation&&<div className="absolute bottom-3 left-3 bg-orange-100 text-orange-700 text-sm font-bold px-3 py-1.5 rounded-full max-w-[120px] truncate shadow-sm">{currentLevel.translation}</div>}
                </div>

                {/* 拼字 */}
                {gameMode==='spelling'&&(
                  <>
                    <div className="flex flex-wrap justify-center gap-2 sm:gap-3 mb-8 bg-slate-900/10 p-5 rounded-[2rem] shadow-inner w-full min-h-[6rem]">
                      {currentLevel.word.split('').map((_,i)=>{
                        const isErr=wrongSlotIdxs.includes(i),filled=selectedLetters[i]!==null,isActive=!filled&&i===firstEmptySpellingIdx&&!spellingOk;
                        let cls='flex items-center justify-center text-3xl font-black rounded-xl transition-all duration-200 select-none ';
                        if(!filled){cls+='bg-slate-800/20 border-2 border-dashed text-transparent ';cls+=isActive?'border-orange-400 shadow-[0_0_15px_rgba(251,146,60,0.6)] bg-orange-400/30 ':'border-slate-800/25 shadow-inner ';}
                        else{cls+='bg-white text-slate-800 border-2 border-slate-300 shadow-[0_6px_0_0_#cbd5e1] ';if(isErr)cls+='bg-red-100 text-red-600 border-red-300 shadow-[0_6px_0_0_#f87171] anim-shake ';else if(spellingOk)cls+='anim-pop shadow-[0_6px_0_0_#16a34a] ';else cls+='cursor-pointer hover:-translate-y-1 active:translate-y-1.5 active:shadow-none ';}
                        return <div key={i} className={cls} style={{width:'50px',height:'60px'}} onClick={()=>filled&&!isErr&&!spellingOk&&unselectSlot(selectedLetters[i],i)}>{filled?selectedLetters[i].char.toLowerCase():''}</div>;
                      })}
                    </div>
                    <div className="flex flex-wrap justify-center gap-2 sm:gap-3 w-full min-h-[4rem]">
                      {shuffledLetters.map(l=><button key={l.id} onClick={()=>clickTile(l)} disabled={spellingOk||isTransitioning} className="bg-gradient-to-b from-orange-400 to-orange-500 text-white border-2 border-orange-300 rounded-xl text-3xl font-black shadow-[0_6px_0_0_#c2410c] hover:brightness-110 hover:-translate-y-1 hover:shadow-[0_8px_0_0_#c2410c] active:translate-y-1.5 active:shadow-none transition-all flex items-center justify-center select-none disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-[0_6px_0_0_#c2410c] disabled:active:translate-y-0" style={{width:'50px',height:'60px'}}>{l.char.toLowerCase()}</button>)}
                    </div>
                  </>
                )}

                {/* 選擇題 / 聽力 */}
                {(gameMode==='quiz'||gameMode==='listening')&&(
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                    {quizOptions.map((opt,i)=>{
                      const isCorrect=opt===quizCorrectOpt,isWrong=wrongQuizOpts.includes(opt);
                      let cls='w-full py-5 px-6 bg-white text-slate-800 border-4 border-slate-200 rounded-2xl text-2xl font-black shadow-[0_6px_0_0_#e2e8f0] hover:-translate-y-1 hover:shadow-[0_10px_0_0_#e2e8f0] active:translate-y-1.5 active:shadow-none transition-all lowercase text-center flex items-center justify-center gap-3 disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-[0_6px_0_0_#e2e8f0] disabled:active:translate-y-0 ';
                      if(isCorrect)cls+='quiz-correct !shadow-[0_6px_0_0_#16a34a] ';else if(isWrong)cls+='quiz-wrong !shadow-[0_6px_0_0_#fca5a5] ';
                      return <button key={i} disabled={isTransitioning||isWrong||!!quizCorrectOpt} onClick={()=>handleQuizSelect(opt)} className={cls}><span className="text-slate-400 text-base font-bold bg-slate-100 rounded-lg px-3 py-1 shrink-0">{i+1}</span>{opt}</button>;
                    })}
                  </div>
                )}

                {/* 是非 */}
                {gameMode==='truefalse'&&(
                  <div className="flex flex-col items-center w-full">
                    <div className="bg-white px-10 py-5 rounded-3xl shadow-sm border-4 border-slate-200 mb-6 text-center w-full max-w-md"><h3 className="text-4xl sm:text-5xl font-black text-slate-800 lowercase tracking-wide">{tfWord}</h3></div>
                    <div className="flex gap-4 w-full">
                      <button onClick={()=>handleTFSelect(true)} disabled={isTransitioning} className="flex-1 bg-green-500 hover:bg-green-400 text-white py-6 rounded-[2rem] text-3xl font-black shadow-[0_8px_0_0_#15803d] hover:-translate-y-1 hover:shadow-[0_12px_0_0_#15803d] active:translate-y-2 active:shadow-none transition-all flex flex-col items-center gap-2 disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-[0_8px_0_0_#15803d] disabled:active:translate-y-0">{CheckCircle&&<CheckCircle size={52}/>}<span className="text-lg opacity-90 tracking-widest">正確</span></button>
                      <button onClick={()=>handleTFSelect(false)} disabled={isTransitioning} className="flex-1 bg-red-500 hover:bg-red-400 text-white py-6 rounded-[2rem] text-3xl font-black shadow-[0_8px_0_0_#b91c1c] hover:-translate-y-1 hover:shadow-[0_12px_0_0_#b91c1c] active:translate-y-2 active:shadow-none transition-all flex flex-col items-center gap-2 disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-[0_8px_0_0_#b91c1c] disabled:active:translate-y-0">{XCircle&&<XCircle size={52}/>}<span className="text-lg opacity-90 tracking-widest">錯誤</span></button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ════════════ GAME OVER ════════════ */}
        {screen==='gameover'&&(
          <div className="bg-slate-900/90 backdrop-blur-md p-8 sm:p-12 rounded-[3rem] shadow-2xl text-center border-4 border-slate-700 w-full max-w-lg text-white anim-slide">
            <div className="text-red-500 flex justify-center mb-5">{XCircle&&<XCircle size={90} className="drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]"/>}</div>
            <h2 className="text-4xl font-black mb-3 text-red-400 tracking-widest">GAME OVER</h2>
            <p className="text-slate-300 mb-8 font-medium text-lg">愛心用盡！本次獲得 <span className="text-yellow-400 font-bold text-2xl">{score}</span> 分</p>
            <div className="flex flex-col sm:flex-row gap-4 justify-center">
              <button onClick={()=>setScreen('home')} className="flex-1 bg-white text-slate-900 font-black py-4 px-7 rounded-full flex items-center justify-center gap-2 shadow-[0_6px_0_0_#cbd5e1] hover:-translate-y-1 hover:shadow-[0_8px_0_0_#cbd5e1] active:translate-y-1.5 active:shadow-none transition-all">{Home&&<Home size={20}/>}回大廳</button>
              <button onClick={()=>setScreen('selectMode')} className="flex-1 bg-sky-500 hover:bg-sky-400 text-white font-black py-4 px-7 rounded-full flex items-center justify-center gap-2 shadow-[0_6px_0_0_#0369a1] hover:-translate-y-1 hover:shadow-[0_8px_0_0_#0369a1] active:translate-y-1.5 active:shadow-none transition-all">{RefreshCcw&&<RefreshCcw size={20}/>}重新挑戰</button>
            </div>
            <ResultsList/>
          </div>
        )}

        {/* ════════════ FINISHED ════════════ */}
        {screen==='finished'&&(
          <div className="bg-white/95 backdrop-blur-sm p-8 sm:p-12 rounded-[3rem] shadow-2xl text-center border-8 border-yellow-400 w-full max-w-lg anim-slide">
            <div className="relative mb-6"><div className="absolute inset-0 bg-yellow-300 blur-3xl opacity-40 rounded-full"/>{Trophy&&<Trophy size={110} className="text-yellow-500 mx-auto relative z-10 drop-shadow-md"/>}</div>
            <h2 className="text-4xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-yellow-500 tracking-wider">大功告成！</h2>
            {gameMode!=='flashcard'&&(
              <div className="bg-slate-50 rounded-2xl p-6 mb-6 text-left space-y-4 shadow-inner border border-slate-200">
                {[[Star&&<Star className="text-yellow-500 fill-yellow-500" size={20}/>,'總得分',score,'text-orange-600'],[Clock&&<Clock className="text-sky-500" size={20}/>,'花費時間',fmt(timeElapsed),'text-sky-600'],[Heart&&<Heart className="text-red-500 fill-red-500" size={20}/>,'剩餘愛心',`×${lives}`,'text-red-600']].map(([icon,label,val,cls],i)=>(
                  <div key={i} className={`flex justify-between items-center font-bold text-slate-700 ${i>0?'border-t border-slate-200 pt-4':''}`}><span className="flex items-center gap-2 text-base">{icon}{label}</span><span className={`text-xl ${cls}`}>{val}</span></div>
                ))}
              </div>
            )}
            <div className="flex flex-col sm:flex-row gap-4">
              <button onClick={()=>setScreen('home')} className="flex-1 bg-white text-slate-700 font-black py-4 rounded-full border-2 border-slate-200 shadow-[0_6px_0_0_#e2e8f0] hover:-translate-y-1 hover:shadow-[0_8px_0_0_#e2e8f0] active:translate-y-1.5 active:shadow-none transition-all flex items-center justify-center gap-2">{Home&&<Home size={20}/>}大廳</button>
              <button onClick={()=>setScreen('selectMode')} className="flex-1 bg-sky-500 hover:bg-sky-400 text-white font-black py-4 rounded-full shadow-[0_6px_0_0_#0369a1] hover:-translate-y-1 hover:shadow-[0_8px_0_0_#0369a1] active:translate-y-1.5 active:shadow-none transition-all flex items-center justify-center gap-2">{RefreshCcw&&<RefreshCcw size={20}/>}換玩法</button>
            </div>
            <ResultsList/>
          </div>
        )}

      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
